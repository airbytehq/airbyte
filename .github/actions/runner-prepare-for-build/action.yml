name: "Prepare Runner for Building"
description: "Prepare Runner for Building project"
inputs:
  install_java:
    description: ""
    required: false
    default: "true"
  install_node:
    description: ""
    required: false
    default: "true"
  install_python:
    description: ""
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - if: inputs.install_java == 'true'
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: "zulu"
        java-version: "21"

    - if: inputs.install_node == 'true'
      uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
      with:
        node-version: "lts/*"

    - if: inputs.install_python == 'true'
      uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4.9.1
      with:
        python-version: "3.9"

    - if: inputs.install_java == 'true'
      name: Set up CI Gradle Properties
      run: |
        mkdir -p ~/.gradle/
        cat > ~/.gradle/gradle.properties <<EOF
        org.gradle.jvmargs=-Xmx8g -Xss4m --add-exports jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED \
          --add-exports jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED \
          --add-exports jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED \
          --add-exports jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED \
          --add-exports jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED
        org.gradle.vfs.watch=false
        EOF
      shell: bash
