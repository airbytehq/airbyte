name: Publish Bulk CDK Pre-release
# This workflow publishes pre-release CDK artifacts from a PR branch.
# Pre-release versions are tagged with the format: {version}-preview.{7-char-git-sha}
# These versions are published to CloudRepo and can be referenced by connectors
# via cdkVersion=X.Y.Z-preview.abc1234 in their gradle.properties.
#
# This allows testing CDK changes in downstream connectors without merging to master.
#
# Usage (via workflow_dispatch):
#   - Provide the PR number to build from
#   - Optionally select which package(s) to publish: all, base, extract, or load
#
# Usage (via slash command or MCP tool):
#   /publish-bulk-cdk-prerelease pr=12345 package=all

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "The repository name"
        required: false
        default: "airbytehq/airbyte"
        type: string
      gitref:
        description: "The git reference (ignored; workflow uses refs/pull/{pr}/head)"
        required: false
        type: string
      comment-id:
        description: "The ID of the comment triggering the workflow"
        required: false
        type: number
      pr:
        description: "The pull request number (required)"
        required: true
        type: number
      package:
        description: "Which CDK package(s) to publish: all, base, extract, or load"
        required: false
        default: "all"
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.pr || github.run_id }}
  cancel-in-progress: false

env:
  S3_BUILD_CACHE_ACCESS_KEY_ID: ${{ secrets.SELF_RUNNER_AWS_ACCESS_KEY_ID }}
  S3_BUILD_CACHE_SECRET_KEY: ${{ secrets.SELF_RUNNER_AWS_SECRET_ACCESS_KEY }}

jobs:
  init:
    name: Initialize Pre-release
    runs-on: ubuntu-24.04
    outputs:
      run-url: ${{ steps.job-vars.outputs.run-url }}
      short-sha: ${{ steps.get-sha.outputs.short-sha }}
      prerelease-suffix: ${{ steps.get-sha.outputs.prerelease-suffix }}
      publish-base: ${{ steps.resolve-package.outputs.publish-base }}
      publish-extract: ${{ steps.resolve-package.outputs.publish-extract }}
      publish-load: ${{ steps.resolve-package.outputs.publish-load }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          repository: ${{ inputs.repo || github.repository }}
          ref: refs/pull/${{ inputs.pr }}/head
          fetch-depth: 0

      - name: Get short SHA
        id: get-sha
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "short-sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "prerelease-suffix=preview.$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Get job variables
        id: job-vars
        run: |
          echo "run-url=https://github.com/${{ github.repository }}/actions/runs/$GITHUB_RUN_ID" >> $GITHUB_OUTPUT

      - name: Resolve package selection
        id: resolve-package
        run: |
          PACKAGE="${{ inputs.package || 'all' }}"
          if [[ "$PACKAGE" == "all" || "$PACKAGE" == "base" ]]; then
            echo "publish-base=true" >> $GITHUB_OUTPUT
          else
            echo "publish-base=false" >> $GITHUB_OUTPUT
          fi
          if [[ "$PACKAGE" == "all" || "$PACKAGE" == "extract" ]]; then
            echo "publish-extract=true" >> $GITHUB_OUTPUT
          else
            echo "publish-extract=false" >> $GITHUB_OUTPUT
          fi
          if [[ "$PACKAGE" == "all" || "$PACKAGE" == "load" ]]; then
            echo "publish-load=true" >> $GITHUB_OUTPUT
          else
            echo "publish-load=false" >> $GITHUB_OUTPUT
          fi

      - name: Read version files
        id: versions
        run: |
          BASE_VERSION=$(grep -E '^version=' airbyte-cdk/bulk/core/base/version.properties | cut -d= -f2)
          EXTRACT_VERSION=$(grep -E '^version=' airbyte-cdk/bulk/core/extract/version.properties | cut -d= -f2)
          LOAD_VERSION=$(grep -E '^version=' airbyte-cdk/bulk/core/load/version.properties | cut -d= -f2)
          echo "base-version=${BASE_VERSION}-preview.$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
          echo "extract-version=${EXTRACT_VERSION}-preview.$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
          echo "load-version=${LOAD_VERSION}-preview.$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Post start comment
        if: inputs.comment-id != '' || inputs.pr != ''
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          comment-id: ${{ inputs.comment-id }}
          issue-number: ${{ inputs.pr }}
          reactions: "+1"
          body: |
            > **Bulk CDK Pre-release Publish Started**
            >
            > Publishing pre-release CDK artifacts from PR [#${{ inputs.pr }}](https://github.com/${{ inputs.repo || github.repository }}/pull/${{ inputs.pr }}).
            > Package selection: `${{ inputs.package || 'all' }}`
            >
            > Pre-release versions:
            > - Base: `${{ steps.versions.outputs.base-version }}`
            > - Extract: `${{ steps.versions.outputs.extract-version }}`
            > - Load: `${{ steps.versions.outputs.load-version }}`
            >
            > [View workflow run](${{ steps.job-vars.outputs.run-url }})

  publish-base:
    name: Publish Base Pre-release
    needs: [init]
    if: needs.init.outputs.publish-base == 'true'
    runs-on: linux-24.04-large
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          repository: ${{ inputs.repo || github.repository }}
          ref: refs/pull/${{ inputs.pr }}/head

      - name: Setup Java
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3.14.1
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Docker login
        uses: docker/login-action@dd4fa0671be5250ee6f50aedf4cb05514abda2c7 # v1.14.1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Check Base Version (skipped for pre-release)
        uses: burrunan/gradle-cache-action@3bf23b8dd95e7d2bacf2470132454fe893a178a1 # v1
        env:
          CI: true
        with:
          job-id: bulk-cdk-base-prerelease
          concurrent: true
          gradle-distribution-sha-256-sum-warning: false
          arguments: --scan -PprereleaseSuffix=${{ needs.init.outputs.prerelease-suffix }} :airbyte-cdk:bulk:checkBaseVersion

      - name: Build Base CDK
        uses: burrunan/gradle-cache-action@3bf23b8dd95e7d2bacf2470132454fe893a178a1 # v1
        env:
          CI: true
        with:
          job-id: bulk-cdk-base-prerelease
          concurrent: true
          gradle-distribution-sha-256-sum-warning: false
          arguments: --scan -PprereleaseSuffix=${{ needs.init.outputs.prerelease-suffix }} :airbyte-cdk:bulk:baseCdkBuild

      - name: Publish Base CDK to CloudRepo
        uses: burrunan/gradle-cache-action@3bf23b8dd95e7d2bacf2470132454fe893a178a1 # v1
        env:
          CI: true
          CLOUDREPO_USER: ${{ secrets.CLOUDREPO_USER }}
          CLOUDREPO_PASSWORD: ${{ secrets.CLOUDREPO_PASSWORD }}
        with:
          job-id: bulk-cdk-base-prerelease
          read-only: true
          concurrent: true
          execution-only-caches: true
          gradle-distribution-sha-256-sum-warning: false
          arguments: --scan -PprereleaseSuffix=${{ needs.init.outputs.prerelease-suffix }} :airbyte-cdk:bulk:baseCdkPublish

  publish-extract:
    name: Publish Extract Pre-release
    needs: [init, publish-base]
    if: needs.init.outputs.publish-extract == 'true'
    runs-on: linux-24.04-large
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          repository: ${{ inputs.repo || github.repository }}
          ref: refs/pull/${{ inputs.pr }}/head

      - name: Setup Java
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3.14.1
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Docker login
        uses: docker/login-action@dd4fa0671be5250ee6f50aedf4cb05514abda2c7 # v1.14.1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Check Extract Version (skipped for pre-release)
        uses: burrunan/gradle-cache-action@3bf23b8dd95e7d2bacf2470132454fe893a178a1 # v1
        env:
          CI: true
        with:
          job-id: bulk-cdk-extract-prerelease
          concurrent: true
          gradle-distribution-sha-256-sum-warning: false
          arguments: --scan -PprereleaseSuffix=${{ needs.init.outputs.prerelease-suffix }} :airbyte-cdk:bulk:checkExtractVersion

      - name: Build Extract CDK
        uses: burrunan/gradle-cache-action@3bf23b8dd95e7d2bacf2470132454fe893a178a1 # v1
        env:
          CI: true
        with:
          job-id: bulk-cdk-extract-prerelease
          concurrent: true
          gradle-distribution-sha-256-sum-warning: false
          arguments: --scan -PprereleaseSuffix=${{ needs.init.outputs.prerelease-suffix }} :airbyte-cdk:bulk:extractCdkBuild

      - name: Publish Extract CDK to CloudRepo
        uses: burrunan/gradle-cache-action@3bf23b8dd95e7d2bacf2470132454fe893a178a1 # v1
        env:
          CI: true
          CLOUDREPO_USER: ${{ secrets.CLOUDREPO_USER }}
          CLOUDREPO_PASSWORD: ${{ secrets.CLOUDREPO_PASSWORD }}
        with:
          job-id: bulk-cdk-extract-prerelease
          read-only: true
          concurrent: true
          execution-only-caches: true
          gradle-distribution-sha-256-sum-warning: false
          arguments: --scan -PprereleaseSuffix=${{ needs.init.outputs.prerelease-suffix }} :airbyte-cdk:bulk:extractCdkPublish

  publish-load:
    name: Publish Load Pre-release
    needs: [init, publish-base]
    if: needs.init.outputs.publish-load == 'true'
    runs-on: linux-24.04-large
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          repository: ${{ inputs.repo || github.repository }}
          ref: refs/pull/${{ inputs.pr }}/head

      - name: Setup Java
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3.14.1
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Docker login
        uses: docker/login-action@dd4fa0671be5250ee6f50aedf4cb05514abda2c7 # v1.14.1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Check Load Version (skipped for pre-release)
        uses: burrunan/gradle-cache-action@3bf23b8dd95e7d2bacf2470132454fe893a178a1 # v1
        env:
          CI: true
        with:
          job-id: bulk-cdk-load-prerelease
          concurrent: true
          gradle-distribution-sha-256-sum-warning: false
          arguments: --scan -PprereleaseSuffix=${{ needs.init.outputs.prerelease-suffix }} :airbyte-cdk:bulk:checkLoadVersion

      - name: Build Load CDK
        uses: burrunan/gradle-cache-action@3bf23b8dd95e7d2bacf2470132454fe893a178a1 # v1
        env:
          CI: true
        with:
          job-id: bulk-cdk-load-prerelease
          concurrent: true
          gradle-distribution-sha-256-sum-warning: false
          arguments: --scan -PprereleaseSuffix=${{ needs.init.outputs.prerelease-suffix }} :airbyte-cdk:bulk:loadCdkBuild

      - name: Publish Load CDK to CloudRepo
        uses: burrunan/gradle-cache-action@3bf23b8dd95e7d2bacf2470132454fe893a178a1 # v1
        env:
          CI: true
          CLOUDREPO_USER: ${{ secrets.CLOUDREPO_USER }}
          CLOUDREPO_PASSWORD: ${{ secrets.CLOUDREPO_PASSWORD }}
        with:
          job-id: bulk-cdk-load-prerelease
          read-only: true
          concurrent: true
          execution-only-caches: true
          gradle-distribution-sha-256-sum-warning: false
          arguments: --scan -PprereleaseSuffix=${{ needs.init.outputs.prerelease-suffix }} :airbyte-cdk:bulk:loadCdkPublish

  post-completion:
    name: Post Completion Status
    needs: [init, publish-base, publish-extract, publish-load]
    runs-on: ubuntu-24.04
    if: always() && (inputs.comment-id != '' || inputs.pr != '')
    steps:
      - name: Checkout PR branch (for version files)
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          repository: ${{ inputs.repo || github.repository }}
          ref: refs/pull/${{ inputs.pr }}/head

      - name: Read version files
        id: versions
        run: |
          SHORT_SHA="${{ needs.init.outputs.short-sha }}"
          BASE_VERSION=$(grep -E '^version=' airbyte-cdk/bulk/core/base/version.properties | cut -d= -f2)
          EXTRACT_VERSION=$(grep -E '^version=' airbyte-cdk/bulk/core/extract/version.properties | cut -d= -f2)
          LOAD_VERSION=$(grep -E '^version=' airbyte-cdk/bulk/core/load/version.properties | cut -d= -f2)
          echo "base-version=${BASE_VERSION}-preview.${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "extract-version=${EXTRACT_VERSION}-preview.${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "load-version=${LOAD_VERSION}-preview.${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Determine overall status
        id: status
        run: |
          BASE_RESULT="${{ needs.publish-base.result }}"
          EXTRACT_RESULT="${{ needs.publish-extract.result }}"
          LOAD_RESULT="${{ needs.publish-load.result }}"

          if [[ "$BASE_RESULT" == "success" || "$BASE_RESULT" == "skipped" ]] && \
             [[ "$EXTRACT_RESULT" == "success" || "$EXTRACT_RESULT" == "skipped" ]] && \
             [[ "$LOAD_RESULT" == "success" || "$LOAD_RESULT" == "skipped" ]]; then
            echo "status_emoji=:white_check_mark:" >> $GITHUB_OUTPUT
            echo "status_text=SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "status_emoji=:x:" >> $GITHUB_OUTPUT
            echo "status_text=FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Post completion comment
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          comment-id: ${{ inputs.comment-id }}
          issue-number: ${{ inputs.pr }}
          body: |
            > **Bulk CDK Pre-release Publish: ${{ steps.status.outputs.status_text }}** ${{ steps.status.outputs.status_emoji }}
            >
            > **Published pre-release versions:**
            > | Package | Version | Status |
            > |---------|---------|--------|
            > | Base | `${{ steps.versions.outputs.base-version }}` | ${{ needs.publish-base.result }} |
            > | Extract | `${{ steps.versions.outputs.extract-version }}` | ${{ needs.publish-extract.result }} |
            > | Load | `${{ steps.versions.outputs.load-version }}` | ${{ needs.publish-load.result }} |
            >
            > **To use in a connector**, set in `gradle.properties`:
            > ```
            > cdkVersion=${{ steps.versions.outputs.extract-version }}
            > ```
            > (Use the extract or load version depending on connector type)
            >
            > [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
