name: Resolve Stale Metadata

on:
  workflow_dispatch:
    inputs:
      gitref:
        description: "The git ref to check out from the repository"
        required: false
        type: string
  schedule:
    - cron: "0 */2 * * *" # Run every 2 hours

permissions:
  contents: read
  issues: write

jobs:
  generate-connector-registries:
    name: Generate Connector Registries
    uses: ./.github/workflows/generate-connector-registries.yml
    secrets: inherit

  check-stale-metadata:
    name: Check for Stale Metadata
    needs: [generate-connector-registries]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Airbyte
        uses: actions/checkout@8edcb1bdb4e267140fa742c62e395cd74f332709 # v4.2.2
        with:
          ref: ${{ github.event.inputs.gitref || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0

      - name: Check for unpublished connector versions
        id: check-unpublished
        continue-on-error: true
        env:
          GCS_CREDENTIALS: ${{ secrets.METADATA_SERVICE_PROD_GCS_CREDENTIALS }}
        shell: bash
        # TK-TODO: Revert to GA version of airbyte-internal-ops before merging. # IGNORE:TK
        run: |
          uvx --from "airbyte-internal-ops @ git+https://github.com/airbytehq/airbyte-ops-mcp@devin/1772263418-compile-with-secrets-mask" \
            airbyte-ops local connector list \
            --repo-path "${{ github.workspace }}" \
            --unpublished \
            --bucket prod \
            --assert-none \
            2>&1 | tee /tmp/unpublished-report.txt

      - name: Create or update tracking issue
        if: steps.check-unpublished.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: "[Automated] Unpublished connector versions detected"
          ISSUE_LABEL: auto-audit
        shell: bash
        run: |
          # Search for existing open issue by label
          EXISTING=$(gh issue list --repo "${{ github.repository }}" \
            --label "${ISSUE_LABEL}" --state open --json number -q '.[0].number')

          BODY="The following connector versions exist on master but are not published to GCS:

          \`\`\`
          $(cat /tmp/unpublished-report.txt)
          \`\`\`

          _Updated by [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_"

          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
            echo "Updated existing issue #${EXISTING}"
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "${ISSUE_TITLE}" --label "${ISSUE_LABEL}" --body "$BODY"
            echo "Created new tracking issue"
          fi
