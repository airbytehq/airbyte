name: Resolve Stale Metadata

on:
  workflow_dispatch:
    inputs:
      gitref:
        description: "The git ref to check out from the repository"
        required: false
        type: string
  schedule:
    - cron: "0 */2 * * *" # Run every 2 hours

permissions:
  contents: read

jobs:
  generate-connector-registries:
    name: Generate Connector Registries
    uses: ./.github/workflows/generate-connector-registries.yml
    secrets: inherit

  check-stale-metadata:
    name: Check for Stale Metadata
    needs: [generate-connector-registries]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Airbyte
        uses: actions/checkout@8edcb1bdb4e267140fa742c62e395cd74f332709 # v4.2.2
        with:
          ref: ${{ github.event.inputs.gitref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@9322b3ca74000aeb2c01eb777b646334015ddd72 # v5.6.0
        with:
          python-version: "3.11"
          check-latest: true
          update-environment: true

      - name: Publish stale metadata report
        env:
          GCS_CREDENTIALS: ${{ secrets.METADATA_SERVICE_PROD_GCS_CREDENTIALS }}
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN_AIRBYTE_TEAM }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        # TK-TODO: Revert to GA version of airbyte-internal-ops before merging. # IGNORE:TK
        run: |
          uvx --from 'git+https://github.com/airbytehq/airbyte-ops-mcp.git@devin/1772263418-compile-with-secrets-mask' \
            airbyte-internal-ops registry publish-stale-metadata-report \
            --bucket prod-airbyte-cloud-connector-metadata-service
