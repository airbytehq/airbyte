name: AI Resolve Conflicts Command

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "Pull request number (if triggered from a PR)"
        type: number
        required: false
      comment-id:
        description: "The comment-id of the slash command. Used to update the comment with the status."
        required: false
      repo:
        description: "Repo (passed by slash command dispatcher)"
        required: false
        default: "airbytehq/airbyte"
      gitref:
        description: "Git ref (passed by slash command dispatcher)"
        required: false

run-name: "AI Resolve Conflicts for PR #${{ github.event.inputs.pr }}"

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  ai-resolve-conflicts:
    runs-on: ubuntu-latest
    steps:
      - name: Get job variables
        id: job-vars
        run: |
          echo "run-url=https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate as GitHub App
        uses: actions/create-github-app-token@v3.0.0
        id: get-app-token
        with:
          owner: "airbytehq"
          repositories: "airbyte,oncall"
          app-id: ${{ secrets.OCTAVIA_BOT_APP_ID }}
          private-key: ${{ secrets.OCTAVIA_BOT_PRIVATE_KEY }}

      - name: Require PR context
        if: inputs.pr == '' && inputs.comment-id
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          token: ${{ steps.get-app-token.outputs.token }}
          comment-id: ${{ inputs.comment-id }}
          body: |
            > `/ai-resolve-conflicts` can only be run on a pull request. Please run it from a PR comment.

      - name: Stop if not running on a PR
        if: inputs.pr == ''
        run: exit 1

      - name: Post start comment
        if: inputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          token: ${{ steps.get-app-token.outputs.token }}
          comment-id: ${{ inputs.comment-id }}
          issue-number: ${{ inputs.pr }}
          body: |
            > **AI Resolve Conflicts Started**
            >
            > Merging the latest `master` into the PR branch and resolving conflicts.
            > Once resolved and pushed, hands-free resumes the PR at its correct next stage.
            > [View workflow run](${{ steps.job-vars.outputs.run-url }})

      - name: Run AI Resolve Conflicts
        uses: aaronsteers/devin-action@main
        with:
          comment-id: ${{ inputs.comment-id }}
          issue-number: ${{ inputs.pr }}
          playbook-macro: "!resolve_merge_conflicts"
          devin-token: ${{ secrets.DEVIN_AI_API_KEY }}
          github-token: ${{ steps.get-app-token.outputs.token }}
          api-version: v3
          org-id: ${{ vars.DEVIN_AI_ORG_ID }}
          start-message: "🔀 **AI Resolve Conflicts session starting...** Merging the latest `master` into the PR branch and resolving conflicts, then pushing the resolved branch. The next hands-free pass resumes the PR at its correct stage. [View playbook](https://github.com/airbytehq/ai-skills/blob/main/devin/playbooks/resolve_merge_conflicts.md)"
          tags: |
            ai-oncall
            conflict-resolution
