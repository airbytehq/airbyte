name: AI Ready Command

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repo (passed by slash command dispatcher)"
        required: false
        default: "airbytehq/airbyte"
        type: string
      gitref:
        description: "Git ref (passed by slash command dispatcher)"
        required: false
        type: string
      comment-id:
        description: "The comment-id of the slash command. Used to update the comment with status. Optional for programmatic triggers."
        required: false
        type: string
      pr:
        description: "PR number, if triggered from a PR"
        required: false
        type: string
      dry-run:
        description: "If 'true', evaluate only -- do not approve or merge"
        required: false
        default: ""
        type: string

run-name: "AI Ready for #${{ inputs.pr || inputs.comment-id }}"

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Authenticate as GitHub App
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: get-app-token
        with:
          owner: "airbytehq"
          repositories: "airbyte"
          app-id: ${{ secrets.OCTAVIA_BOT_APP_ID }}
          private-key: ${{ secrets.OCTAVIA_BOT_PRIVATE_KEY }}

      - name: Require PR context
        if: inputs.pr == '' && inputs.comment-id
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          token: ${{ steps.get-app-token.outputs.token }}
          comment-id: ${{ inputs.comment-id }}
          body: |
            > `/ai-ready` can only be run on a pull request. Please run it from a PR comment.

      - name: Stop if not running on a PR
        if: inputs.pr == ''
        run: exit 1

      - name: Apply ready label
        if: inputs.pr != ''
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
          PR_NUMBER: ${{ inputs.pr }}
        run: gh issue edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label hyd-ready

  hydra-automerge:
    needs: validate
    uses: ./.github/workflows/hydra-automerge.yml
    with:
      pr: ${{ inputs.pr }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
