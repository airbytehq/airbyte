name: Generate Connector Registries

on:
  workflow_dispatch:
    inputs:
      gitref:
        description: "The git ref to check out from the repository"
        required: false
        type: string
  workflow_call:

permissions:
  contents: read

concurrency:
  # Only allow one active run, and one pending run.
  # This prevents race conditions between multiple runs of this workflow.
  group: generate-connector-registry
  # If a new run is triggered while there's already one in-progress,
  # allow the in-progress run to finish.
  cancel-in-progress: false

jobs:
  compile-registries:
    name: Compile Connector Registries (Cloud + OSS)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Airbyte
        uses: actions/checkout@8edcb1bdb4e267140fa742c62e395cd74f332709 # v4.2.2
        with:
          ref: ${{ github.event.inputs.gitref || github.ref }}
          submodules: true # Required for the enterprise repo since it uses a submodule that needs to exist for this workflow to run successfully.

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0

      - name: Compile Registries
        env:
          GCS_CREDENTIALS: ${{ secrets.METADATA_SERVICE_PROD_GCS_CREDENTIALS }}
        shell: bash
        run: |
          # TK-TODO: Revert to GA version before merging: # IGNORE:TK
          #   uvx --from airbyte-internal-ops airbyte-ops registry store compile --store coral:prod --with-secrets-mask
          uvx --from "airbyte-internal-ops @ git+https://github.com/airbytehq/airbyte-ops-mcp@main" \
            airbyte-ops registry store compile --store coral:prod --with-secrets-mask

