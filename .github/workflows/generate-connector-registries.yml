name: Generate Connector Registries

on:
  workflow_dispatch:
    inputs:
      gitref:
        description: "The git ref to check out from the repository"
        required: false
        type: string
  workflow_call:

permissions:
  contents: read

concurrency:
  # Only allow one active run, and one pending run.
  # This prevents race conditions between multiple runs of this workflow.
  group: generate-connector-registry
  # If a new run is triggered while there's already one in-progress,
  # allow the in-progress run to finish.
  cancel-in-progress: false

jobs:
  compile-registries:
    name: Compile Connector Registries (Cloud + OSS)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Airbyte
        uses: actions/checkout@8edcb1bdb4e267140fa742c62e395cd74f332709 # v4.2.2
        with:
          ref: ${{ github.event.inputs.gitref || github.ref }}
          submodules: true # Required for the enterprise repo since it uses a submodule that needs to exist for this workflow to run successfully.

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0

      - name: Compile Registries
        env:
          GCS_CREDENTIALS: ${{ secrets.METADATA_SERVICE_PROD_GCS_CREDENTIALS }}
        shell: bash
        run: |
          # TK-TODO: Revert to GA version before merging: # IGNORE:TK
          #   uvx --from airbyte-internal-ops airbyte-ops registry compile --bucket prod
          uvx --from "airbyte-internal-ops @ git+https://github.com/airbytehq/airbyte-ops-mcp@main" \
            airbyte-ops registry compile --bucket prod

  post-registry-generation:
    name: Post registry generation steps
    runs-on: ubuntu-24.04
    needs: [compile-registries]

    steps:
      - name: Checkout Airbyte
        uses: actions/checkout@8edcb1bdb4e267140fa742c62e395cd74f332709 # v4.2.2
        with:
          ref: ${{ github.event.inputs.gitref || github.ref }}
          submodules: true # Required for the enterprise repo since it uses a submodule that needs to exist for this workflow to run successfully.

      - name: Install Poetry
        # TODO: Remove Poetry once generate-specs-secrets-mask and generate-registry-report
        # are migrated to the ops CLI (airbyte-internal-ops).
        uses: snok/install-poetry@d526ede1e27960b7b181a5ac53044f552afdaa38 # v1.4.1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install metadata_service
        # TODO: Remove once generate-specs-secrets-mask and generate-registry-report
        # are migrated to the ops CLI (airbyte-internal-ops).
        working-directory: airbyte-ci/connectors/metadata_service/lib
        run: poetry install

      - name: Generate Specs Secrets Mask
        # TODO: Migrate to ops CLI once specs_secrets_mask regeneration is added to
        # `airbyte-ops registry compile` (tracked in ops repo compile.py).
        env:
          GCS_CREDENTIALS: ${{ secrets.METADATA_SERVICE_PROD_GCS_CREDENTIALS }}
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN_AIRBYTE_TEAM }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_METADATA_SERVICE }}
          SENTRY_TRACES_SAMPLE_RATE: 1.0
          SENTRY_ENVIRONMENT: production
        working-directory: airbyte-ci/connectors/metadata_service/lib
        shell: bash
        run: |
          poetry run metadata_service generate-specs-secrets-mask prod-airbyte-cloud-connector-metadata-service

      - name: Generate connector registry report
        # TODO: Migrate to ops CLI once generate-registry-report is added to
        # airbyte-internal-ops.
        shell: bash
        env:
          GCS_CREDENTIALS: ${{ secrets.METADATA_SERVICE_PROD_GCS_CREDENTIALS }}
        # Note: --project because we're on poetry 2.x
        run: poetry run --project airbyte-ci/connectors/metadata_service/lib metadata_service generate-registry-report prod-airbyte-cloud-connector-metadata-service
