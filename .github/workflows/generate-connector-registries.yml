name: Generate Connector Registries

on:
  workflow_dispatch:
    inputs:
      gitref:
        description: "The git ref to check out from the repository"
        required: false
        type: string
      force:
        description: "Force resync of all latest/ directories even if version markers are current. Useful when metadata changes without a version bump."
        required: false
        type: boolean
        default: false
      connector-name:
        description: "Comma-separated list of connector names to limit the latest/ resync scope (e.g. 'source-faker,source-github'). Leave empty to compile all connectors."
        required: false
        type: string
  workflow_call:

permissions:
  contents: read

concurrency:
  # Only allow one active run, and one pending run.
  # This prevents race conditions between multiple runs of this workflow.
  group: generate-connector-registry
  # If a new run is triggered while there's already one in-progress,
  # allow the in-progress run to finish.
  cancel-in-progress: false

jobs:
  compile-registries:
    name: Compile Registries (ops CLI)
    runs-on: ubuntu-24.04
    env:
      REGISTRY_STORE: "coral:prod"

    steps:
      - name: Checkout Airbyte
        uses: actions/checkout@8edcb1bdb4e267140fa742c62e395cd74f332709 # v4.2.2
        with:
          ref: ${{ github.event.inputs.gitref || github.ref }}
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0

      - name: Install Ops CLI
        run: uv tool install airbyte-internal-ops

      - name: Compile Registries
        env:
          GCS_CREDENTIALS: ${{ secrets.METADATA_SERVICE_PROD_GCS_CREDENTIALS }}
        shell: bash
        run: |
          COMPILE_ARGS="airbyte-ops registry store compile"
          COMPILE_ARGS="${COMPILE_ARGS} --store ${REGISTRY_STORE}"
          COMPILE_ARGS="${COMPILE_ARGS} --with-secrets-mask"
          COMPILE_ARGS="${COMPILE_ARGS} --with-legacy-migration v1"
          if [[ "${{ inputs.force }}" == "true" ]]; then
            COMPILE_ARGS="${COMPILE_ARGS} --force"
          fi
          if [[ -n "${{ inputs.connector-name }}" ]]; then
            IFS=',' read -ra CONNECTORS <<< "${{ inputs.connector-name }}"
            for c in "${CONNECTORS[@]}"; do
              COMPILE_ARGS="${COMPILE_ARGS} --connector-name $(echo "$c" | xargs)"
            done
          fi
          echo "Running: ${COMPILE_ARGS}"
          ${COMPILE_ARGS}
