permissions:
  issues: write
  discussions: write

jobs:
  ai-unpin:
    name: Unpin previously pinned versions
    permissions:
      contents: read
      issues: write
      pull-requests: write
#    if: if_merged == false
    runs-on: ubuntu-24.04
    steps:
      - name: Post comment
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## AI Unpinning
            >
            > The following live connections will be unpinned upon approval:
            > - XXXXX
            > - XXXXX            
            >
            > [Check job output.](${{ steps.job-vars.outputs.run-url }})

