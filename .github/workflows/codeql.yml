name: "CodeQL"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 0 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      actions: ${{ steps.changes.outputs.actions }}
      java: ${{ steps.changes.outputs.java }}
      javascript: ${{ steps.changes.outputs.javascript }}
      python: ${{ steps.changes.outputs.python }}
    steps:
      - name: Checkout repository
        if: github.event_name == 'push'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed ecosystems
        id: changes
        if: github.event_name != 'schedule'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            actions:
              - '.github/actions/**/action.yml'
              - '.github/actions/**/action.yaml'
              - '.github/codeql/**'
              - '.github/workflows/**/*.yml'
              - '.github/workflows/**/*.yaml'
            java:
              - '**/*.gradle'
              - '**/*.gradle.kts'
              - '**/*.java'
              - '**/*.kt'
              - '**/*.kts'
              - '.github/codeql/**'
              - '.github/workflows/codeql.yml'
              - 'buildSrc/**'
              - 'gradle/**'
              - 'gradle.properties'
              - 'settings.gradle'
              - 'settings.gradle.kts'
            javascript:
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.ts'
              - '**/*.tsx'
              - '.github/codeql/**'
              - '.github/workflows/codeql.yml'
            python:
              - '**/*.py'
              - '.github/codeql/**'
              - '.github/workflows/codeql.yml'

  analyze-java-kotlin:
    name: Analyze Java/Kotlin
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.java == 'true'
    runs-on: linux-24.04-large # Custom runner, defined in GitHub org settings
    timeout-minutes: 120
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Java environment
        uses: ./.github/actions/install-java-environment
        with:
          gradle_cache_read_only: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: java-kotlin
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build (compile only, continue past failures)
        # Preserve partial extraction when an unrelated monorepo module fails.
        continue-on-error: true
        run: |
          ./gradlew compileJava compileKotlin \
            --continue \
            -x test \
            -x integrationTestJava \
            -x performanceTestJava \
            -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:java-kotlin"

  analyze-python:
    name: Analyze Python
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.python == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: python
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:python"

  analyze-javascript-typescript:
    name: Analyze JavaScript/TypeScript
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.javascript == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: javascript-typescript
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:javascript-typescript"

  analyze-actions:
    name: Analyze GitHub Actions
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.actions == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: actions
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:actions"
