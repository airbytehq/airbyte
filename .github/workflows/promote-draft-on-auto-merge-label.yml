name: Auto-merge label lifecycle

# Two complementary automations for PRs with auto-merge labels:
#
# 1. When an auto-merge label is added to a draft PR, promote it to ready
#    for review. This complements the enforce-draft-pr-status workflow.
#
# 2. When native auto-merge is disabled on a PR (e.g. a human holds it),
#    remove the auto-merge labels so the scheduled auto_merge.yml cron
#    no longer re-processes the PR.

on:
  pull_request_target:
    types:
      - labeled
      - auto_merge_disabled

jobs:
  # ---------- Job 1: Promote draft -> ready when label is added ----------
  promote-draft:
    name: Mark PR as Ready for Review
    if: >
      github.event.action == 'labeled'
      && github.event.pull_request.draft == true
      && (
        github.event.label.name == 'auto-merge'
        || github.event.label.name == 'auto-merge/bypass-ci-checks'
      )
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
      - name: Authenticate as GitHub App
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
        id: get-app-token
        with:
          owner: "airbytehq"
          repositories: "airbyte"
          app-id: ${{ secrets.OCTAVIA_BOT_APP_ID }}
          private-key: ${{ secrets.OCTAVIA_BOT_PRIVATE_KEY }}

      - name: Mark PR as ready for review
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr ready "$PR_NUMBER" --repo "${{ github.repository }}"

  # ---------- Job 2: Remove labels when native auto-merge is disabled ----------
  remove-labels:
    name: Remove auto-merge labels
    if: >
      github.event.action == 'auto_merge_disabled'
      && (
        contains(github.event.pull_request.labels.*.name, 'auto-merge')
        || contains(github.event.pull_request.labels.*.name, 'auto-merge/bypass-ci-checks')
      )
    permissions: {}
    runs-on: ubuntu-24.04
    steps:
      - name: Authenticate as 'octavia-bot-hoard' GitHub App
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
        id: get-app-token
        with:
          owner: "airbytehq"
          repositories: "airbyte"
          app-id: ${{ secrets.OCTAVIA_BOT_HOARD_APP_ID }}
          private-key: ${{ secrets.OCTAVIA_BOT_HOARD_PRIVATE_KEY }}

      - name: Remove auto-merge label
        if: contains(github.event.pull_request.labels.*.name, 'auto-merge')
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: >
          gh pr edit "$PR_NUMBER"
          --repo "${{ github.repository }}"
          --remove-label "auto-merge"

      - name: Remove bypass-ci-checks label
        if: contains(github.event.pull_request.labels.*.name, 'auto-merge/bypass-ci-checks')
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: >
          gh pr edit "$PR_NUMBER"
          --repo "${{ github.repository }}"
          --remove-label "auto-merge/bypass-ci-checks"

      - name: Post notice comment
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: >
          gh pr comment "$PR_NUMBER"
          --repo "${{ github.repository }}"
          --body "Auto-merge labels removed because native auto-merge was disabled on this PR. Re-add the label to re-enable."
