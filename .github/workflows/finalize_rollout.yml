name: Finalize connector rollout

on:
  repository_dispatch:
    types: [finalize-connector-rollout]
  workflow_dispatch:
    inputs:
      connector_name:
        description: "Connector name"
        required: true
      action:
        description: "Action to perform"
        required: true
        options: ["promote", "rollback"]
jobs:
  finalize_rollout:
    name: Finalize connector rollout for ${{ github.event.inputs.connector_name }}
    runs-on: ubuntu-24.04
    env:
      ACTION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action || github.event.client_payload.action }}
      CONNECTOR_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.connector_name || github.event.client_payload.connector_name }}
    steps:
      - name: Check action value
        run: |
          if [[ "${ACTION}" != "promote" && "${ACTION}" != "rollback" ]]; then
            echo "Invalid action: ${ACTION}"
            exit 1
          fi
        shell: bash
      - name: Checkout Airbyte
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      # Authenticate as the GitHub App to ensure CI can run.  This is necessary because
      # commits created with the built-in GitHub token will not trigger workflows.
      - name: Authenticate as GitHub App
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        id: get-app-token
        with:
          owner: "airbytehq"
          repositories: "airbyte"
          app-id: ${{ secrets.OCTAVIA_BOT_APP_ID }}
          private-key: ${{ secrets.OCTAVIA_BOT_PRIVATE_KEY }}

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          github-token: ${{ steps.get-app-token.outputs.token }}

      - name: Promote ${{ env.CONNECTOR_NAME }} release candidate
        id: promote-release-candidate
        if: ${{ env.ACTION == 'promote' }}
        shell: bash
        env:
          GCS_CREDENTIALS: ${{ secrets.METADATA_SERVICE_PROD_GCS_CREDENTIALS }}
        run: |
          # TK-TODO: Revert to GA version before merging: # IGNORE:TK
          #   uvx --from airbyte-internal-ops airbyte-ops registry rc promote ...
          uvx --from "airbyte-internal-ops @ git+https://github.com/airbytehq/airbyte-ops-mcp@main" \
            airbyte-ops registry rc promote \
            --name "${CONNECTOR_NAME}" \
            --bucket prod

      - name: Rollback ${{ env.CONNECTOR_NAME }} release candidate
        id: rollback-release-candidate
        if: ${{ env.ACTION == 'rollback' }}
        shell: bash
        env:
          GCS_CREDENTIALS: ${{ secrets.METADATA_SERVICE_PROD_GCS_CREDENTIALS }}
        run: |
          # TK-TODO: Revert to GA version before merging: # IGNORE:TK
          #   uvx --from airbyte-internal-ops airbyte-ops registry rc rollback ...
          uvx --from "airbyte-internal-ops @ git+https://github.com/airbytehq/airbyte-ops-mcp@main" \
            airbyte-ops registry rc rollback \
            --name "${CONNECTOR_NAME}" \
            --bucket prod
