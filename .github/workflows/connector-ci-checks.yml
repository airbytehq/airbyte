name: Connector CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited

  # Available as a reusable workflow
  # (https://docs.github.com/en/actions/sharing-automations/reusing-workflows)
  workflow_call:
    inputs:
      repo:
        type: string
        required: false
        description: "The repository name"
      gitref:
        type: string
        required: false
        description: "The git reference (branch or tag)"
      comment-id:
        type: string
        required: false
        description: "The ID of the comment triggering the workflow. Unused as of now."
      pr:
        type: string
        required: false
        description: "The pull request number, if applicable. Unused as of now."
    outputs:
      result:
        description: "The result of the checks, e.g. 'success' if successful."
        value: ${{ jobs.connector-ci-checks-summary.outputs.result }}
      commit-sha:
        description: "The commit SHA of the current branch, used to report test results."
        value: ${{ jobs.generate-matrix.outputs.commit-sha }}

permissions:
  # Allow the workflow to read contents
  # and to read/write checks, PR comments, and PR descriptions.
  contents: read
  checks: write
  issues: write
  pull-requests: write

jobs:
  generate-matrix:
    name: Generate Connector Matrix
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Current Branch
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo || github.event.pull_request.head.repo.full_name }}
          ref: ${{ inputs.gitref || github.head_ref || github.ref_name }}
          submodules: true # Needed for airbyte-enterprise connectors (no-op otherwise)
          # Use fetch-depth: 0 to ensure we can access the full commit history
          fetch-depth: 0

      - name: Add upstream remote (forks only)
        # This step only runs from forks.
        # It ensures the `upstream` ref is properly declared before proceeding
        # to the step of determining which connectors are modified.
        if: >
          (inputs.repo != '' &&
           ! startswith(inputs.repo, 'airbytehq/')
          ) ||
          (github.event.pull_request.head.repo.full_name != '' &&
           ! startswith(github.event.pull_request.head.repo.full_name, 'airbytehq/')
          )
        run: |
          # only add upstream if it doesn't already exist
          if ! git remote | grep -q upstream; then
            git remote add upstream https://github.com/airbytehq/airbyte.git
          fi
          # fetch the default branch from upstream
          git fetch --quiet upstream master

      - id: cdk-changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          # Note: expressions within a filter are OR'ed
          filters: |
            java-cdk:
              - 'airbyte-cdk/java/**/**/src/main/**/*'
              - 'airbyte-cdk/bulk/**/**/src/main/**/*'

      - name: Generate Connector Matrix from Changes
        id: generate-matrix
        run: |
          # Get the list of modified connectors
          echo "connectors_matrix=$(./poe-tasks/get-modified-connectors.sh --json)" | tee -a $GITHUB_OUTPUT

          # If local-cdk-changed is true, get Java connectors with useLocalCdk = true
          # Otherwise, get modified Java connectors
          if [[ "${{ steps.cdk-changes.outputs.java-cdk == 'true' }}" == "true" ]]; then
            echo "jvm_connectors_matrix=$(./poe-tasks/get-modified-connectors.sh --json --local-cdk)" | tee -a $GITHUB_OUTPUT
          else
            echo "jvm_connectors_matrix=$(./poe-tasks/get-modified-connectors.sh --json --java)" | tee -a $GITHUB_OUTPUT
          fi

          echo "non_jvm_connectors_matrix=$(./poe-tasks/get-modified-connectors.sh --json --no-java)" | tee -a $GITHUB_OUTPUT

      - name: Set JVM Runner Type
        id: set-jvm-runner-type
        run: |
          # Default to ubuntu-24.04 for all connectors
          echo "jvm-runner-type=ubuntu-24.04" >> $GITHUB_OUTPUT
          if [[ "${{ github.repository }}" == "airbytehq/airbyte" || "${{ github.repository }}" == "airbytehq/airbyte-enterprise" ]]; then
            # Within our own repo, we can use the custom (larger) runner
            echo "jvm-runner-type=linux-24.04-large" | tee -a "$GITHUB_OUTPUT"
          fi

    outputs:
      connectors-matrix: ${{ steps.generate-matrix.outputs.connectors_matrix }}
      jvm-connectors-matrix: ${{ steps.generate-matrix.outputs.jvm_connectors_matrix }}
      non-jvm-connectors-matrix: ${{ steps.generate-matrix.outputs.non_jvm_connectors_matrix }}
      jvm-runner-type: ${{ steps.set-jvm-runner-type.outputs.jvm-runner-type }}
      # The commit SHA of the current branch, used to report test results:
      commit-sha: ${{ steps.checkout.outputs.commit }}
      creds-available: ${{ (secrets.GCP_PROJECT_ID == '') && (vars.GCP_PROJECT_ID == '') && 'false' || 'true' }}

  jvm-connectors-test:
    needs: [generate-matrix]
    runs-on: ${{ needs.generate-matrix.outputs.jvm-runner-type }} # Custom runner, defined in GitHub org settings
    env:
      GCP_GSM_CREDENTIALS: ${{ secrets.GCP_GSM_CREDENTIALS }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
      DD_TAGS: "connector.name:${{ matrix.connector }}"
      DOCKER_API_VERSION: "1.44"

    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.jvm-connectors-matrix) }}
      max-parallel: 5 # Limit number of parallel jobs
      fail-fast: false # Don't stop on first failure
    name: Test ${{ matrix.connector }} Connector ${{ ! matrix.connector && ' (no JVM-based connectors modified)' || ( needs.generate-matrix.outputs.creds-available == 'false' && ' [No Creds]' || '') }}
    steps:
      - name: Checkout Airbyte
        if: matrix.connector
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo || github.event.pull_request.head.repo.full_name }}
          ref: ${{ inputs.gitref || github.head_ref || github.ref_name }}
          submodules: true # Needed for airbyte-enterprise connectors (no-op otherwise)
          fetch-depth: 1

      # Java deps
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        if: matrix.connector
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      # The default behaviour is read-only on PR branches and read/write on master.
      # See https://github.com/gradle/actions/blob/main/docs/setup-gradle.md#using-the-cache-read-only.
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        if: matrix.connector
        with:
          gradle-version: "8.14"

      # TODO: We can delete this step once Airbyte-CI is removed from Java integration tests.
      - name: Set up Python (For Airbyte-CI)
        if: matrix.connector
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          check-latest: true
          update-environment: true

      - name: Install the latest version of uv
        if: matrix.connector
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install Poe
        if: matrix.connector
        run: |
          # Install Poe so we can run the connector tasks:
          uv tool install poethepoet

      - name: Install connector dependencies
        if: matrix.connector
        working-directory: airbyte-integrations/connectors/${{ matrix.connector }}
        run: poe install

      - name: Fetch connector secrets
        # This will be skipped if the repo or fork does not set GCP_PROJECT_ID, or if it is set to an empty value.
        # Later integration tests will likely fail in this case, but we at least let them run.
        if: matrix.connector && needs.generate-matrix.outputs.creds-available == 'true'
        run: |
          airbyte-ops secrets fetch ${{ matrix.connector }} \
            --print-ci-secrets-masks

      - name: Run Unit Tests ${{ needs.generate-matrix.outputs.creds-available == 'false' && '[Non-Blocking (Unprivileged) Test From Fork, pls run `/run-connector-tests`]' || '' }}
        if: matrix.connector
        working-directory: airbyte-integrations/connectors/${{ matrix.connector }}
        run: poe test-unit-tests

      - name: Run Integration Tests ${{ needs.generate-matrix.outputs.creds-available == 'false' && '[Non-Blocking (Unprivileged) Test From Fork, pls run `/run-connector-tests`]' || '' }}
        if: matrix.connector
        working-directory: airbyte-integrations/connectors/${{ matrix.connector }}
        run: poe test-integration-tests

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@3a74b2957438d0b6e2e61d67b05318aa25c9e6c6 # v2.20.0
        # Skip if cancelled, if no connector is specified, or if running from a fork.
        if: always() && !cancelled() && matrix.connector && github.repository == 'airbytehq/airbyte'
        with:
          check_name: "`${{ matrix.connector }}` Connector Test Results"
          commit: ${{ steps.checkout.outputs.commit }}
          large_files: true
          files: |
            airbyte-integrations/connectors/${{ matrix.connector }}/build/test-results/**/*.xml

  non-jvm-connectors-test:
    needs: [generate-matrix]
    runs-on: ubuntu-24.04
    env:
      GCP_GSM_CREDENTIALS: ${{ secrets.GCP_GSM_CREDENTIALS }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}

    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.non-jvm-connectors-matrix) }}
      max-parallel: 5 # Limit number of parallel jobs
      fail-fast: false # Don't stop on first failure
    name: Test ${{ matrix.connector }} Connector ${{ ! matrix.connector && ' (no non-JVM-based connectors modified)' || ( needs.generate-matrix.outputs.creds-available == 'false' && ' [No Creds]' || '') }}
    steps:
      - name: Checkout Airbyte
        if: matrix.connector
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo || github.event.pull_request.head.repo.full_name }}
          ref: ${{ inputs.gitref || github.head_ref || github.ref_name }}
          submodules: true # Needed for airbyte-enterprise connectors (no-op otherwise)
          fetch-depth: 1

      - name: Get connector support level
        if: matrix.connector
        id: support-level
        working-directory: airbyte-integrations/connectors/${{ matrix.connector }}
        run: |
          SUPPORT_LEVEL=$(yq -r '.data.supportLevel // "community"' metadata.yaml 2>/dev/null || echo "community")
          echo "support_level=${SUPPORT_LEVEL}" | tee -a $GITHUB_OUTPUT
          if [[ "$SUPPORT_LEVEL" != "certified" ]]; then
            echo "is_community=true" | tee -a $GITHUB_OUTPUT
          else
            echo "is_community=false" | tee -a $GITHUB_OUTPUT
          fi

      # Python deps
      - name: Set up Python
        if: matrix.connector
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          check-latest: true
          update-environment: true

      - name: Install and configure Poetry
        if: matrix.connector
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: 1.8.5

      - name: Install the latest version of uv
        if: matrix.connector
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install system dependencies
        if: matrix.connector
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libffi-dev \
            python3-dev

      - name: Install Poe and Dev Dependencies
        if: matrix.connector
        run: |
          # Install Poe so we can run the connector tasks:
          uv tool install poethepoet

          # These should be included as dev dependencies in the connector, but
          # for many connectors they are undeclared:
          uv tool install ruff
          uv tool install pytest
          uv tool install mypy

      - name: Install connector dependencies
        if: matrix.connector
        working-directory: airbyte-integrations/connectors/${{ matrix.connector }}
        run: poe install

      - name: Fetch connector secrets
        id: fetch-secrets
        # This will be skipped if the repo or fork does not set GCP_PROJECT_ID, or if it is set to an empty value.
        # Later integration tests will likely fail in this case, but we at least let them run.
        if: matrix.connector && env.GCP_PROJECT_ID != ''
        continue-on-error: true
        run: |
          airbyte-ops secrets fetch ${{ matrix.connector }} \
            --print-ci-secrets-masks

      - name: Run Unit Tests ${{ needs.generate-matrix.outputs.creds-available == 'false' && '[Non-Blocking (Unprivileged) Test From Fork, pls run `/run-connector-tests`]' || '' }}
        if: matrix.connector
        working-directory: airbyte-integrations/connectors/${{ matrix.connector }}
        run: poe test-unit-tests

      - name: Run Integration Tests ${{ needs.generate-matrix.outputs.creds-available == 'false' && '[Non-Blocking (Unprivileged) Test From Fork, pls run `/run-connector-tests`]' || '' }}
        if: matrix.connector
        continue-on-error: ${{ steps.support-level.outputs.is_community == 'true' && steps.fetch-secrets.outcome != 'success' }}
        working-directory: airbyte-integrations/connectors/${{ matrix.connector }}
        run: poe test-integration-tests

      - name: Container Tests
        if: matrix.connector
        continue-on-error: ${{ steps.support-level.outputs.is_community == 'true' && steps.fetch-secrets.outcome != 'success' }}
        working-directory: airbyte-integrations/connectors/${{ matrix.connector }}
        run: |
          airbyte-cdk image test

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@3a74b2957438d0b6e2e61d67b05318aa25c9e6c6 # v2.20.0
        # Skip if cancelled, if no connector is specified, or if the repository is a fork.
        if: always() && !cancelled() && matrix.connector && github.repository == 'airbytehq/airbyte'
        with:
          check_name: "`${{ matrix.connector }}` Connector Test Results"
          commit: ${{ steps.checkout.outputs.commit }}
          large_files: true
          files: |
            airbyte-integrations/connectors/${{ matrix.connector }}/build/test-results/**/*.xml

  # Lint and format checks

  connectors-lint:
    needs: [generate-matrix]
    runs-on: ubuntu-24.04
    if: ${{ needs.generate-matrix.outputs.connectors-matrix }}
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.connectors-matrix) }}
      max-parallel: 10 # Limit number of parallel jobs
    name: Lint ${{ matrix.connector }} Connector ${{ ! matrix.connector && ' (no connectors modified)' || '' }}
    steps:
      - name: Checkout Airbyte
        if: matrix.connector
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo || github.event.pull_request.head.repo.full_name }}
          ref: ${{ inputs.gitref || github.head_ref || github.ref_name }}
          submodules: true # Needed for airbyte-enterprise connectors (no-op otherwise)
          fetch-depth: 1

      # Java deps
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        if: matrix.connector
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        if: matrix.connector
        with:
          cache-read-only: false
          cache-write-only: false
          gradle-version: "8.14"

      # Python deps
      - name: Set up Python
        if: matrix.connector
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          check-latest: true
          update-environment: true
      - name: Install and configure Poetry
        if: matrix.connector
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: 1.8.5

      - name: Install the latest version of uv
        if: matrix.connector
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install system dependencies
        if: matrix.connector
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libffi-dev \
            python3-dev

      - name: Install Poe and Dev Dependencies
        if: matrix.connector
        run: |
          # Install Poe so we can run the connector tasks:
          uv tool install poethepoet

          # These should be included as dev dependencies in the connector, but
          # for many connectors they are undeclared:
          uv tool install ruff
          uv tool install pytest
          uv tool install mypy

      - name: Install connector dependencies
        if: matrix.connector
        working-directory: airbyte-integrations/connectors/${{ matrix.connector }}
        run: poe install

      - name: Run format-check
        if: matrix.connector
        working-directory: airbyte-integrations/connectors/${{ matrix.connector }}
        run: poe format-check

      - name: Run lint check (info only)
        if: matrix.connector
        working-directory: airbyte-integrations/connectors/${{ matrix.connector }}
        run: poe lint-check
        # Most connectors can't pass lint checks, so this is non-blocking for now
        continue-on-error: true

  progressive-rollout-gate:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    needs: [generate-matrix]
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.connectors-matrix) }}
      max-parallel: 10
      fail-fast: false
    name: ${{ matrix.connector || 'No-Op' }} Progressive Rollout Gate
    runs-on: ubuntu-24.04
    env:
      ACK_CHECKBOX_TEXT: "(Click to Approve:) Bypass the active progressive rollout warning in the PR comment"
      GCP_PROD_DB_ACCESS_CREDENTIALS: ${{ secrets.GCP_GSM_CREDENTIALS_FOR_TESTING_TOOL }}
      GITHUB_TOKEN: ${{ github.token }}
      USE_CLOUD_SQL_PROXY: "1"
      DB_PORT: "15432"
    steps:
      - name: Checkout Airbyte
        if: matrix.connector
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo || github.event.pull_request.head.repo.full_name }}
          ref: ${{ inputs.gitref || github.head_ref || github.ref_name }}
          submodules: true # Needed for airbyte-enterprise connectors (no-op otherwise)
          fetch-depth: 1

      - name: Install uv
        if: matrix.connector
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install Ops CLI
        if: matrix.connector
        run: uv tool install airbyte-internal-ops

      - name: Install Cloud SQL Proxy
        if: matrix.connector
        env:
          CLOUD_SQL_PROXY_VERSION: v2.15.0
          CLOUD_SQL_PROXY_SHA256: cf3e9d069ea0d09cdfddce77daa36811bb0b963b1169e9c3f1586433ca7325fa
        run: |
          set -euo pipefail
          BINARY_NAME="cloud-sql-proxy.linux.amd64"
          BASE_URL="https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/${CLOUD_SQL_PROXY_VERSION}"

          curl -fsSLO "${BASE_URL}/${BINARY_NAME}"
          echo "${CLOUD_SQL_PROXY_SHA256}  ${BINARY_NAME}" | sha256sum -c -
          chmod +x "${BINARY_NAME}"
          sudo mv "${BINARY_NAME}" /usr/local/bin/cloud-sql-proxy
          cloud-sql-proxy --version

      - name: Start Cloud SQL Proxy
        if: matrix.connector
        run: airbyte-ops cloud db start-proxy --port 15432

      - name: Get rollout status
        if: matrix.connector
        id: rollout-status
        env:
          CONNECTOR_NAME: ${{ matrix.connector }}
        run: |
          echo "json<<EOF" >> $GITHUB_OUTPUT
          airbyte-ops registry progressive-rollout status "$CONNECTOR_NAME" --repo-path . >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get master connector version
        if: matrix.connector
        id: master-version
        env:
          CONNECTOR_NAME: ${{ matrix.connector }}
        run: echo "version=$(airbyte-ops gh connector get-version --name "$CONNECTOR_NAME" --ref master)" | tee -a $GITHUB_OUTPUT

      - name: Detect rollout bypass checkbox
        if: matrix.connector
        id: rollout-bypass
        uses: AhmedBaset/checklist@ecbf0bacb0d5d1fe41131db29a44984fec266017 # v3
        with:
          token: ${{ github.token }}

      - name: Resolve rollout bypass checkbox state
        if: matrix.connector
        id: bypass-state
        env:
          APPROVED: ${{ contains(steps.rollout-bypass.outputs.checked, env.ACK_CHECKBOX_TEXT) }}
          EXISTS: ${{ contains(steps.rollout-bypass.outputs.checked, env.ACK_CHECKBOX_TEXT) || contains(steps.rollout-bypass.outputs.unchecked, env.ACK_CHECKBOX_TEXT) }}
        run: |
          echo "approved=${APPROVED}" | tee -a $GITHUB_OUTPUT
          echo "exists=${EXISTS}" | tee -a $GITHUB_OUTPUT

      - name: Find progressive rollout gate comment
        if: matrix.connector
        id: find-rollout-comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- progressive-rollout-gate:${{ matrix.connector }} -->"

      - name: Create progressive rollout gate placeholder comment
        if: >
          matrix.connector &&
          steps.find-rollout-comment.outputs.comment-id == '' &&
          (fromJSON(steps.rollout-status.outputs.json).has_active_rollout ||
           contains(steps.master-version.outputs.version, '-rc.'))
        id: create-rollout-comment
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- progressive-rollout-gate:${{ matrix.connector }} -->
            > **Progressive rollout gate for `${{ matrix.connector }}`**
            >
            > Checking for active rollouts.
            >
            > [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Resolve rollout comment link
        if: matrix.connector
        id: rollout-comment
        env:
          EXISTING_COMMENT_ID: ${{ steps.find-rollout-comment.outputs.comment-id }}
          CREATED_COMMENT_ID: ${{ steps.create-rollout-comment.outputs.comment-id }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          COMMENT_ID="${EXISTING_COMMENT_ID:-${CREATED_COMMENT_ID}}"
          echo "id=${COMMENT_ID}" | tee -a $GITHUB_OUTPUT
          echo "url=https://github.com/${REPOSITORY}/pull/${PR_NUMBER}#issuecomment-${COMMENT_ID}" | tee -a $GITHUB_OUTPUT

      - name: Add rollout bypass checkbox to PR description
        if: >
          matrix.connector &&
          steps.bypass-state.outputs.exists != 'true' &&
          (fromJSON(steps.rollout-status.outputs.json).has_active_rollout ||
           contains(steps.master-version.outputs.version, '-rc.'))
        uses: bcgov/action-pr-description-add@14338bfe0278ead273b3c1189e5aa286ff6709c4 # v2.0.0
        with:
          github_token: ${{ github.token }}
          add_markdown: |
            > [!IMPORTANT]
            > Active progressive rollout warning.

            - [ ] (Click to Approve:) Bypass the active progressive rollout warning in the PR comment [here](${{ steps.rollout-comment.outputs.url }}).

      - name: Update progressive rollout gate comment
        if: >
          matrix.connector &&
          steps.rollout-comment.outputs.id != '' &&
          (steps.find-rollout-comment.outputs.comment-id != '' ||
           fromJSON(steps.rollout-status.outputs.json).has_active_rollout ||
           contains(steps.master-version.outputs.version, '-rc.'))
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          comment-id: ${{ steps.rollout-comment.outputs.id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- progressive-rollout-gate:${{ matrix.connector }} -->
            > **Progressive rollout gate for `${{ matrix.connector }}`**
            >
            > Active rollout: `${{ fromJSON(steps.rollout-status.outputs.json).has_active_rollout }}`
            > Master version: `${{ steps.master-version.outputs.version }}`
            > Master RC marker: `${{ contains(steps.master-version.outputs.version, '-rc.') }}`
            > Bypass ACK checked: `${{ steps.bypass-state.outputs.approved }}`
            >
            > To bypass this warning, check this box in the PR description:
            > `- [ ] (Click to Approve:) Bypass the active progressive rollout warning in the PR comment [here](${{ steps.rollout-comment.outputs.url }}).`
            >
            > [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Fail if active rollout is not acknowledged
        if: matrix.connector && fromJSON(steps.rollout-status.outputs.json).has_active_rollout && steps.bypass-state.outputs.approved != 'true'
        run: |
          echo "::error::${{ matrix.connector }} has an active progressive rollout. Check the bypass box in the PR description to acknowledge and rerun this workflow."
          exit 1

      - name: Fail if master has RC marker and is not acknowledged
        if: matrix.connector && contains(steps.master-version.outputs.version, '-rc.') && steps.bypass-state.outputs.approved != 'true'
        run: |
          echo "::error::${{ matrix.connector }} has an RC marker on master (${{ steps.master-version.outputs.version }}). Check the bypass box in the PR description to acknowledge and rerun this workflow."
          exit 1

  pre-release-checks:
    if: github.event.pull_request.draft == false
    needs: [generate-matrix]
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.connectors-matrix) }}
      max-parallel: 10 # Limit number of parallel jobs
      fail-fast: false # Don't stop on first failure
    name: ${{ matrix.connector || 'No-Op' }} Pre-Release Checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Airbyte
        if: matrix.connector
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo || github.event.pull_request.head.repo.full_name }}
          ref: ${{ inputs.gitref || github.head_ref || github.ref_name }}
          submodules: true # Needed for airbyte-enterprise connectors (no-op otherwise)
          fetch-depth: 0
      - name: Install uv
        if: matrix.connector
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install Poe
        if: matrix.connector
        run: |
          # Install Poe so we can run the connector tasks:
          uv tool install poethepoet

      - name: Install Ops CLI
        if: matrix.connector
        run: |
          uv tool install airbyte-internal-ops

      - name: Run QA Checks
        if: matrix.connector
        # remove "-strict-encrypt" suffix, if present, for parity with the previous version of this workflow
        run: |
          connector_name=${{ matrix.connector }}
          airbyte-ops local connector qa --name ${connector_name%-strict-encrypt}

      - name: Detect Python CDK Prerelease Versions
        if: matrix.connector
        working-directory: airbyte-integrations/connectors/${{ matrix.connector }}
        run: |
          # Exit with code 1 if the CDK is not pinned to a standard version.
          # This is a no-op for non-Python connectors.
          if [[ $(poe -qq get-language) == "python" ]]; then
            poe detect-cdk-prerelease
          else
            echo "Skipping CDK pre-release check for non-Python connector."
          fi

  # --- Soft launch: ops CLI artifact generation + validation (parallel job) ---
  # Runs alongside existing pre-release checks to validate the new ops CLI path.
  # continue-on-error: true ensures this does not block the CI pipeline.
  # Tracking: https://github.com/airbytehq/airbyte-ops-mcp/issues/504
  build-and-verify-artifacts:
    if: github.event.pull_request.draft == false
    needs: [generate-matrix]
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.connectors-matrix) }}
      max-parallel: 10
      fail-fast: false
    name: "Build and Verify Artifacts (${{ matrix.connector || 'No-Op' }})"
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - name: Checkout Airbyte
        if: matrix.connector
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo || github.event.pull_request.head.repo.full_name }}
          ref: ${{ inputs.gitref || github.head_ref || github.ref_name }}
          submodules: true
          fetch-depth: 0

      - name: Install uv
        if: matrix.connector
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      # Java deps (needed for JVM connector Docker image builds via Gradle)
      # TODO: Consider making this conditional on connector language to skip for non-JVM connectors.
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        if: matrix.connector
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        if: matrix.connector
        with:
          gradle-version: "8.14"

      - name: Install Poe
        if: matrix.connector
        run: uv tool install poethepoet

      - name: Install Ops CLI
        if: matrix.connector
        run: uv tool install airbyte-internal-ops

      - name: Install Airbyte CDK
        if: matrix.connector
        run: uv tool install "airbyte-cdk[dev]"

      - name: Get connector metadata
        if: matrix.connector
        id: connector-metadata
        working-directory: airbyte-integrations/connectors/${{ matrix.connector }}
        run: |
          set -euo pipefail
          CONNECTOR_VERSION="$(poe -qq get-version)"
          DOCKER_REPO=$(yq -r '.data.dockerRepository' metadata.yaml)
          echo "connector-version=${CONNECTOR_VERSION}" | tee -a $GITHUB_OUTPUT
          echo "docker-image=${DOCKER_REPO}:${CONNECTOR_VERSION}" | tee -a $GITHUB_OUTPUT

      - name: Build connector Docker image
        if: matrix.connector && steps.connector-metadata.outcome == 'success'
        working-directory: airbyte-integrations/connectors/${{ matrix.connector }}
        run: >
          airbyte-cdk image build
          --tag ${{ steps.connector-metadata.outputs.connector-version }}

      - name: Generate and Validate Registry Artifacts (ops CLI)
        if: matrix.connector && steps.connector-metadata.outcome == 'success'
        shell: bash
        env:
          CONNECTOR_DIR: airbyte-integrations/connectors/${{ matrix.connector }}
        run: >
          airbyte-ops registry connector-version artifacts generate
          --metadata-file "${CONNECTOR_DIR}/metadata.yaml"
          --docker-image "${{ steps.connector-metadata.outputs.docker-image }}"
          --output-dir ./registry-artifacts
          --with-validate

      - name: Upload Registry CI Artifacts
        if: matrix.connector && steps.connector-metadata.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: registry-artifacts-${{ matrix.connector }}-${{ steps.connector-metadata.outputs.connector-version }}
          path: ./registry-artifacts/
          retention-days: 7
          if-no-files-found: ignore

  connector-ci-checks-summary:
    name: Aggregate Results
    if: always()
    needs:
      - generate-matrix
      - jvm-connectors-test
      - non-jvm-connectors-test
      - pre-release-checks
      - progressive-rollout-gate
      - connectors-lint
    runs-on: ubuntu-24.04
    outputs:
      result: ${{ steps.evaluate-status.outputs.result || steps.evaluate-failure-status.outputs.result }}
    steps:
      - name: Evaluate Status
        id: evaluate-status
        if: >
          needs.jvm-connectors-test.result == 'success' &&
          needs.non-jvm-connectors-test.result == 'success' &&
          (needs.progressive-rollout-gate.result == 'success' ||
           needs.progressive-rollout-gate.result == 'skipped') &&
          needs.connectors-lint.result == 'success'
        run: echo "result=success" | tee -a $GITHUB_OUTPUT

      - name: Evaluate Failure Status
        id: evaluate-failure-status
        if: >
          needs.jvm-connectors-test.result != 'success' ||
          needs.non-jvm-connectors-test.result != 'success' ||
          (needs.progressive-rollout-gate.result != 'success' &&
           needs.progressive-rollout-gate.result != 'skipped') ||
          needs.connectors-lint.result != 'success'
        run: echo "result=failure" | tee -a $GITHUB_OUTPUT

      # In slash commands and when not running within a fork, we want to upload
      # a check status report to the PR.

      # If we are not running from the airbytehq/airbyte repo, the secrets won't
      # be available, so the following steps will be a no-op.

      - name: Authenticate as GitHub App
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: get-app-token
        if: always() && !cancelled()
        continue-on-error: true
        with:
          app-id: ${{ secrets.OCTAVIA_BOT_APP_ID }}
          private-key: ${{ secrets.OCTAVIA_BOT_PRIVATE_KEY }}

      - name: Create Check Status
        if: >
          always() && !cancelled() &&
          steps.get-app-token.outcome == 'success'
        uses: LouisBrunner/checks-action@dfcbcf801bff1ea7f1414824fc28f2cd697b35da # v3.0.0
        with:
          name: "Connector CI Checks Summary" # << Name of the 'Required' check
          sha: ${{ needs.generate-matrix.outputs.commit-sha }}
          status: completed
          conclusion: ${{ steps.evaluate-status.outputs.result || steps.evaluate-failure-status.outputs.result }}
          token: ${{ steps.get-app-token.outputs.token }}
          details_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
