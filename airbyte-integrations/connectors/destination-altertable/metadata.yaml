data:
  connectorBuildOptions:
    baseImage: docker.io/airbyte/python-connector-base:4.1.0@sha256:1d1aa21d34e851df4e8a87b391c27724c06e2597608e7161f4d167be853bd7b6
  connectorSubtype: database
  connectorType: destination
  definitionId: a8978f1d-1a81-4ca5-b637-0fa01a417faf
  dockerImageTag: 0.1.0
  dockerRepository: airbyte/destination-altertable
  documentationUrl: https://docs.airbyte.com/integrations/destinations/altertable
  githubIssueLabel: destination-altertable
  icon: icon.svg
  license: ELv2
  name: Altertable
  registryOverrides:
    cloud:
      enabled: true
    oss:
      enabled: true
  releaseStage: alpha
  resourceRequirements:
    jobSpecific:
      - jobType: check_connection
        resourceRequirements:
          memory_limit: 800Mi
          memory_request: 800Mi
      - jobType: sync
        resourceRequirements:
          memory_limit: 2Gi
          memory_request: 2Gi
  supportLevel: community
  tags:
    - language:python
    - cdk:python
  ab_internal:
    sl: 100
    ql: 100
  connectorTestSuitesOptions:
    - suite: unitTests
    - suite: integrationTests
      testSecrets:
        - name: SECRET_DESTINATION_ALTERTABLE_CREDS
          fileName: config.json
          secretStore:
            type: GSM
            alias: airbyte-connector-testing-secret-store
    - suite: acceptanceTests
      testSecrets:
        - name: SECRET_DESTINATION_ALTERTABLE_CREDS
          fileName: config.json
          secretStore:
            type: GSM
            alias: airbyte-connector-testing-secret-store
  externalDocumentationUrls:
    - title: Altertable documentation
      url: https://altertable.ai/docs
      type: api_reference
metadataSpecVersion: "1.0"
