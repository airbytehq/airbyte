version: 6.41.5

type: DeclarativeSource

description: >-
  Sync subscription and billing data from Hyperline into your data warehouse.

  This source connector syncs customers, quotes, subscriptions, products,
  invoices, companies, coupons and price configurations.

  Configuration requires your Hyperline API key and a start date from which to
  sync data.

check:
  type: CheckStream
  stream_names:
    - products

definitions:
