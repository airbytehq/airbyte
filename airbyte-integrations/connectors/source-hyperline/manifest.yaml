          page_size_option:
            type: RequestOption
            field_name: take
            inject_into: request_parameter
          page_token_option:
            type: RequestOption
            field_name: skip
            inject_into: request_parameter
          pagination_strategy:
            type: OffsetIncrement
            page_size: 100
        requester:
          $ref: "#/definitions/base_requester"
          path: v1/quotes
          http_method: GET
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - data
      primary_key:
        - id
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: "#/schemas/quotes"
      incremental_sync:
        type: DatetimeBasedCursor
        step: P1M
        cursor_field: updated_at
        end_datetime:
          type: MinMaxDatetime
          datetime: "{{ now_utc().strftime(\"%Y-%m-%dT%H:%M:%SZ\") }}"
          datetime_format: "%Y-%m-%dT%H:%M:%SZ"
        start_datetime:
