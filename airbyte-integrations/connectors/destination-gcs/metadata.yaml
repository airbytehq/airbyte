data:
  ab_internal:
    ql: 300
    sl: 100
    requireVersionIncrementsInPullRequests: false
  connectorBuildOptions:
    baseImage: docker.io/airbyte/java-connector-base:2.0.1@sha256:ec89bd1a89e825514dd2fc8730ba299a3ae1544580a078df0e35c5202c2085b3
  connectorSubtype: file
  # High-throughput SOCKET/PROTOBUF data channel (mirrors the GA object-storage destinations),
  # with STDIO/JSONL as the negotiated fallback.
  connectorIPCOptions:
    dataChannel:
      version: 0.0.2
      supportedSerialization:
        - JSONL
        - PROTOBUF
      supportedTransport:
        - SOCKET
        - STDIO
  connectorTestSuitesOptions:
    - suite: unitTests
    - suite: integrationTests
      testSecrets:
        - fileName: gcs_dest_v2_avro_snappy_config.json
          name: SECRET_DESTINATION-GCS-V2-AVRO-SNAPPY
          secretStore:
            alias: airbyte-connector-testing-secret-store
            type: GSM
        - fileName: gcs_dest_v2_avro_config.json
          name: SECRET_DESTINATION-GCS-V2-AVRO
          secretStore:
            alias: airbyte-connector-testing-secret-store
            type: GSM
        - fileName: gcs_dest_v2_jsonl_config.json
          name: SECRET_DESTINATION-GCS-V2-JSONL
          secretStore:
            alias: airbyte-connector-testing-secret-store
            type: GSM
        - fileName: gcs_dest_v2_csv_config.json
          name: SECRET_DESTINATION-GCS-V2-CSV
          secretStore:
            alias: airbyte-connector-testing-secret-store
            type: GSM
        - fileName: gcs_dest_v2_csv_uncompressed_config.json
          name: SECRET_DESTINATION-GCS-V2-CSV-UNCOMPRESSED
          secretStore:
            alias: airbyte-connector-testing-secret-store
            type: GSM
        - fileName: gcs_dest_v2_parquet_snappy_config.json
          name: SECRET_DESTINATION-GCS-V2-PARQUET-SNAPPY
          secretStore:
            alias: airbyte-connector-testing-secret-store
            type: GSM
  connectorType: destination
  # KEEP the existing GCS definitionId so this replaces destination-gcs in-place (drop-in upgrade).
  definitionId: ca8f6566-e555-4b40-943a-545bf123117a
  # v0.4.x -> 1.0.0: CDK swap (old Java CDK -> Bulk Load CDK) + spec/layout revision is a major bump,
  # mirroring how destination-s3 shipped its 1.0.0.
  dockerImageTag: 1.0.0
  dockerRepository: airbyte/destination-gcs
  documentationUrl: https://docs.airbyte.com/integrations/destinations/gcs
  githubIssueLabel: destination-gcs
  icon: googlecloudstorage.svg
  license: ELv2
  name: Google Cloud Storage (GCS)
  registryOverrides:
    cloud:
      enabled: true
    oss:
      enabled: true
  releaseStage: beta
  releases:
    breakingChanges:
      1.0.0:
        message: >
          This release migrates destination-gcs to the Bulk Load CDK for significantly higher
          throughput. HMAC-key authentication, output formats (incl. AVRO+snappy) and the per-stream
          output paths and file names are preserved. Streams larger than ~200 MB are now split into
          multiple objects using the S3-style part-number suffix (`..._0`, `..._1`, …), so consumers
          should read all objects under a stream's prefix; CSV and JSONL are GZIP-compressed by
          default. Review the migration guide before upgrading.
        upgradeDeadline: "2026-12-01"
        deadlineAction: "auto_upgrade"
    rolloutConfiguration:
      enableProgressiveRollout: false
  resourceRequirements:
    jobSpecific:
      - jobType: sync
        # Raised from 1Gi -> 2Gi to match destination-s3 (the memory-reserving part queue is sized off the heap).
        resourceRequirements:
          memory_request: 2Gi
  supportLevel: community
  supportsRefreshes: true
  tags:
    - language:java
  externalDocumentationUrls:
    - title: Cloud Storage documentation
      url: https://cloud.google.com/storage/docs
      type: api_reference
    - title: Google Cloud Release Notes
      url: https://cloud.google.com/release-notes
      type: api_release_history
    - title: HMAC keys for Cloud Storage
      url: https://cloud.google.com/storage/docs/authentication/hmackeys
      type: authentication_guide
    - title: Access control
      url: https://cloud.google.com/storage/docs/access-control
      type: permissions_scopes
    - title: Quotas and limits
      url: https://cloud.google.com/storage/quotas
      type: rate_limits
    - title: Google Cloud Status
      url: https://status.cloud.google.com/
      type: status_page
metadataSpecVersion: "1.0"
