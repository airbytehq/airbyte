  dockerImageTag: 0.4.0
  dockerRepository: airbyte/source-clickhouse
  documentationUrl: https://docs.airbyte.com/integrations/sources/clickhouse
  githubIssueLabel: source-clickhouse
  icon: clickhouse.svg
  license: ELv2
  name: ClickHouse
  registryOverrides:
    cloud:
      enabled: true
    oss:
      enabled: true
  releases:
    breakingChanges:
      0.4.0:
        message: >-
          This release formally declares the temporal column typing introduced in version 0.3.1
          as breaking. Streams containing Date, Date32, DateTime, or DateTime64 columns emit
          Airbyte date or timestamp types instead of unformatted strings. Refresh the source
          schema and clear data for affected streams before syncing.
        upgradeDeadline: "2026-07-24"
