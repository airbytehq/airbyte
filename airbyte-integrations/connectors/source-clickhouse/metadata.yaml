data:
  ab_internal:
    ql: 200
    sl: 100
  allowedHosts:
    hosts:
      - ${host}
      - ${tunnel_method.tunnel_host}
  connectorBuildOptions:
    baseImage: docker.io/airbyte/java-connector-base:2.0.0@sha256:5a1a21c75c5e1282606de9fa539ba136520abe2fbd013058e988bb0297a9f454
  connectorSubtype: database
  connectorTestSuitesOptions:
    - suite: integrationTests
    - suite: acceptanceTests
  connectorType: source
  definitionId: bad83517-5e54-4a3d-9b53-63e85fbd4d7c
  dockerImageTag: 0.4.0-rc.1
  dockerRepository: airbyte/source-clickhouse
  documentationUrl: https://docs.airbyte.com/integrations/sources/clickhouse
  githubIssueLabel: source-clickhouse
  icon: clickhouse.svg
  license: ELv2
  name: ClickHouse
  registryOverrides:
    cloud:
      enabled: true
    oss:
      enabled: true
  releases:
    rolloutConfiguration:
      enableProgressiveRollout: true
    breakingChanges:
      0.4.0:
        message: >-
          This release upgrades the ClickHouse JDBC driver from 0.3.2-patch10 to 0.9.8.
          The 0.9.7+ driver decodes Date/Date32 columns as LocalDate without timezone adjustment.
          Users syncing Date/Date32 columns may see changed values if their data relied on the
          previous timezone-adjusted behavior. A full refresh of affected streams is recommended.
        upgradeDeadline: "2026-04-07"
  releaseStage: alpha
  supportLevel: community
  tags:
    - language:java
  externalDocumentationUrls:
    - title: ClickHouse HTTP interface
      url: https://clickhouse.com/docs/en/interfaces/http
      type: api_reference
    - title: Changelog
      url: https://clickhouse.com/docs/whats-new/changelog
      type: api_release_history
    - title: ClickHouse authentication
      url: https://clickhouse.com/docs/en/operations/access-rights
      type: authentication_guide
    - title: ClickHouse SQL reference
      url: https://clickhouse.com/docs/en/sql-reference
      type: sql_reference
metadataSpecVersion: "1.0"
