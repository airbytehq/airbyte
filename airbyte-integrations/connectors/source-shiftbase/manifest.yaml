version: 6.5.0

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
  - departments

definitions:
  account_partition_router:
    type: ListPartitionRouter
    values: "{{ config.accounts }}"
    cursor_field: account

  base_requester:
    type: HttpRequester
    url_base: https://api.shiftbase.com/api/
    http_method: GET
    request_headers:
      Content-Type: application/json
      Accept: application/json
      Authorization: "API {{ stream_partition.account.access_token }}"
    error_handler:
      type: DefaultErrorHandler
      backoff_strategies:
      - type: WaitTimeFromHeader
        header: Retry-After
      - type: ExponentialBackoffStrategy
      response_filters:
      - type: HttpResponseFilter
        action: RETRY
        http_codes:
        - 429
        - 500
        - 502
        - 503
        - 504

  add_account_fields_transformation:
    type: AddFields
    fields:
    - path:
      - account_name
      value: "{{ stream_partition.account.account_name }}"
    - path:
      - account_id
      value: "{{ stream_partition.account.account_id }}"

  departments_stream:
    type: DeclarativeStream
    name: departments
    primary_key:
    - - id
    - - account_id
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: departments
        request_parameters:
          min_date: "{{ config.start_date }}"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
          - data
          - "*"
          - Department
      paginator:
        type: NoPagination
      partition_router:
        $ref: "#/definitions/account_partition_router"
    transformations:
    - $ref: "#/definitions/add_account_fields_transformation"
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $ref: '#/definitions/schemas/departments_stream'
  employees_stream:
    type: DeclarativeStream
    name: employees
    primary_key:
    - - id
    - - department_id
    - - account_id
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: "hr/departments/{{ stream_partition.department_id }}/employeeList"
        request_headers:
          Content-Type: application/json
          Accept: application/json
          Authorization: "API {{ stream_partition.parent_slice.account.access_token }}"
        request_parameters:
          min_date: "{{ config.start_date }}"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
          - data
      paginator:
        type: NoPagination
      partition_router:
        type: SubstreamPartitionRouter
        parent_stream_configs:
        - type: ParentStreamConfig
          parent_key: id
          partition_field: department_id
          extra_fields:
          - - account_id
          stream:
            $ref: "#/definitions/departments_stream"
    transformations:
    - type: AddFields
      fields:
      - path:
        - department_id
        value: "{{ stream_partition.department_id }}"
      - path:
        - account_name
        value: "{{ stream_partition.parent_slice.account.account_name }}"
      - path:
        - account_id
        value: "{{ stream_partition.extra_fields.account_id }}"
      - path:
        - team_id
        value: "{{ record.teamId }}"
    - type: RemoveFields
      field_pointers:
      - - teamId
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $ref: '#/definitions/schemas/employees_stream'
  employee_time_distribution_stream:
    type: DeclarativeStream
    name: employee_time_distribution
    primary_key:
    - - employeeId
    - - year
    - - account_id
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: "employees/{{ stream_partition.employee_id }}/time_distribution"
        request_headers:
          Content-Type: application/json
          Accept: application/json
          Authorization: "API {{ stream_partition.parent_slice.parent_slice.account.access_token }}"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
          - data
      paginator:
        type: NoPagination
      partition_router:
        type: SubstreamPartitionRouter
        parent_stream_configs:
        - type: ParentStreamConfig
          parent_key: id
          partition_field: employee_id
          extra_fields:
          - - account_id
          stream:
            $ref: "#/definitions/employees_stream"
    incremental_sync:
      type: DatetimeBasedCursor
      # year is a synthetic cursor field used to partition API requests by year.
      # It does not exist in the API response but is added via transformation to enable year-by-year iteration.
      cursor_field: year
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ config.start_date }}"
        datetime_format: "%Y-%m-%d"
      datetime_format: "%Y"
      cursor_datetime_formats:
      - "%Y"
      step: P1Y
      cursor_granularity: P1Y
      start_time_option:
        type: RequestOption
        inject_into: request_parameter
        field_name: year
      is_data_feed: true
    transformations:
    - type: AddFields
      fields:
      - path:
        - account_name
        value: "{{ stream_partition.parent_slice.parent_slice.account.account_name }}"
      - path:
        - account_id
        value: "{{ stream_partition.extra_fields.account_id }}"
      - path:
        - employee_id
        value: "{{ stream_partition.employee_id }}"
      - path:
        - year
        value: "{{ stream_slice.start_time }}"
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $ref: '#/definitions/schemas/employee_time_distribution_stream'
  absentees_stream:
    type: DeclarativeStream
    name: absentees
    primary_key:
    - - id
