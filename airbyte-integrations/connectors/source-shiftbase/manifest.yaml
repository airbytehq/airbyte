spec:
  type: Spec
  connection_specification:
    $schema: http://json-schema.org/draft-07/schema#
    title: Shiftbase Spec
    type: object
    required:
    - accounts
    - start_date
    properties:
      accounts:
        type: array
        title: Accounts
        description: List of Shiftbase accounts to sync data from.
        minItems: 1
        order: 0
        items:
          type: object
          required:
          - access_token
          - account_name
          - account_id
          properties:
            access_token:
              type: string
              title: Access Token
              description: Access Token generated from Shiftbase App Center.
              airbyte_secret: true
              minLength: 1
              order: 0
            account_name:
              type: string
              title: Account Name
              description: Account name for tracking purposes.
              minLength: 1
              order: 1
            account_id:
              type: string
              title: Account ID
              description: Shiftbase Account ID used to uniquely identify records across accounts.
              minLength: 1
              order: 2
      start_date:
        type: string
        title: Start Date
        description: Start date for historical data sync in YYYY-MM-DD format.
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        format: date
        order: 1
        examples:
        - "2024-01-01"
      schedule_report_end_date:
        type: string
        title: Schedule Report End Date
        description: >-
          End date for the Scheduled Detail Report stream in YYYY-MM-DD format.
          Defaults to 1 month into the future from the current date if not provided.
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        format: date
        order: 2
        examples:
        - "2025-06-01"
  documentation_url: https://docs.airbyte.com/integrations/sources/shiftbase
