      partition_router:
        $ref: "#/definitions/account_partition_router"
    incremental_sync:
      type: DatetimeBasedCursor
      cursor_field: updated
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ config.start_date }}"
        datetime_format: "%Y-%m-%d"
      datetime_format: "%Y-%m-%d %H:%M:%S"
      cursor_datetime_formats:
      - "%Y-%m-%d %H:%M:%S"
      - "%Y-%m-%d"
      start_time_option:
        type: RequestOption
        inject_into: request_parameter
        field_name: min_date
      is_data_feed: true
    transformations:
    - $ref: "#/definitions/add_account_fields_transformation"
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $ref: '#/definitions/schemas/absentees_stream'
  availabilities_stream:
    type: DeclarativeStream
