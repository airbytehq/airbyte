[build-system]
requires = [ "poetry-core>=1.0.0",]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
version = "4.2.5"
name = "source-google-ads"
description = "Source implementation for Google Ads."
authors = [ "Airbyte <contact@airbyte.io>",]
license = "Elv2"
readme = "README.md"
documentation = "https://docs.airbyte.com/integrations/sources/google-ads"
homepage = "https://airbyte.com"
repository = "https://github.com/airbytehq/airbyte"
[[tool.poetry.packages]]
include = "source_google_ads"

[tool.poetry.dependencies]
python = "^3.10,<3.12"
google-ads = "==27.0.0"
protobuf = "==4.25.2"
pendulum = "<3.0.0"
airbyte-cdk = "7.17.2.post3.dev24730905870"

[tool.poetry.scripts]
source-google-ads = "source_google_ads.run:run"

[tool.poetry.group.dev.dependencies]
pytest-mock = "^3.12.0"
requests-mock = "^1.11.0"
freezegun = "^1.4.0"
pytest = "^8.0.0"


[tool.poe]
include = [
    # Shared tasks definition file(s) can be imported here.
    # Run `poe` or `poe --help` to see the list of available tasks.
    "${POE_GIT_DIR}/poe-tasks/poetry-connector-tasks.toml",
]

[tool.poe.tasks]
# Override the default `install-cdk-cli` task to pin the CDK CLI (used by the
# Docker acceptance-test harness) to the same prerelease build as the poetry
# dependency above. This is required to validate
# https://github.com/airbytehq/airbyte-python-cdk/pull/991 end-to-end —
# otherwise the CLI tool would be installed from the latest released CDK
# version and the fix under test would not run.
install-cdk-cli = "uv tool install --force 'airbyte-cdk[dev]==7.17.2.post3.dev24730905870'"
