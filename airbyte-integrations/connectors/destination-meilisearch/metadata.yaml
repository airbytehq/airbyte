data:
  connectorSubtype: api
  connectorType: destination
  definitionId: af7c921e-5892-4ff2-b6c1-4a5ab258fb7e
  dockerImageTag: 2.0.0
  dockerRepository: airbyte/destination-meilisearch
  githubIssueLabel: destination-meilisearch
  icon: meilisearch.svg
  license: ELv2
  name: MeiliSearch
  registryOverrides:
    cloud:
      enabled: false
    oss:
      enabled: true
  releaseStage: alpha
  documentationUrl: https://docs.airbyte.com/integrations/destinations/meilisearch
  tags:
    - language:python
    - cdk:python
  ab_internal:
    sl: 100
    ql: 100
  supportLevel: community
  releases:
    breakingChanges:
      2.0.0:
        message:
          "Version 2.0.0 changes how documents are identified in Meilisearch: streams with a single
          top-level primary key now use that field as the index primary key instead of the internal
          `_ab_pk` field. Meilisearch cannot change an index's primary key once documents exist, so
          syncs into indexes created by version 1.x will fail until the index is reset. See the
          migration guide for the required steps."
        upgradeDeadline: "2026-07-20"
  connectorBuildOptions:
    baseImage: docker.io/airbyte/python-connector-base:4.0.0@sha256:d9894b6895923b379f3006fa251147806919c62b7d9021b5cd125bb67d7bbe22
  connectorTestSuitesOptions:
    - suite: unitTests
    - suite: integrationTests
      testSecrets:
        - name: SECRET_DESTINATION_MEILISEARCH_CREDS
          fileName: config.json
          secretStore:
            type: GSM
            alias: airbyte-connector-testing-secret-store
  externalDocumentationUrls:
    - title: Meilisearch documentation
      url: https://www.meilisearch.com/docs
      type: api_reference
    - title: Authentication
      url: https://www.meilisearch.com/docs/learn/security/master_api_keys
      type: authentication_guide
metadataSpecVersion: "1.0"
