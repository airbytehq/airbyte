name: meili-dest-e2e

services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "55432:5432"
    environment:
      POSTGRES_PASSWORD: e2e-password
      POSTGRES_DB: sales
    volumes:
      - ./seed/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sales"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "57017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.48
    ports:
      - "7770:7700"
    environment:
      MEILI_MASTER_KEY: e2eMasterKey
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:7700/health | grep -q available"]
      interval: 5s
      timeout: 5s
      retries: 10
