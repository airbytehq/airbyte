name: meili-dest-e2e

services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "55432:5432"
    environment:
      POSTGRES_PASSWORD: e2e-password
      POSTGRES_DB: sales
    volumes:
      - ./seed/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sales"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "57017:27017"
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    ports:
      - "59200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -s http://localhost:9200/_cluster/health | grep -qE ''"status":"(yellow|green)"''',
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "59092:9092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rpk cluster info -X brokers=localhost:9092 >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  meilisearch:
    image: getmeili/meilisearch:v1.48
    ports:
      - "7770:7700"
    environment:
      MEILI_MASTER_KEY: e2eMasterKey
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:7700/health | grep -q available",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
