  releases:
    breakingChanges:
      1.0.0:
        message:
          "The `extensiveCalls` stream schema has changed: the `context` field type
          changed from `object` to `array`, and the `value` field within
          `context.objects.fields` now accepts `string`, `number`, `boolean`,
          `object`, and `array` types instead of only `object`. Users syncing the
          `extensiveCalls` stream must refresh the source schema and reset the
          stream after upgrading. For more information, see the
          [Gong migration guide](https://docs.airbyte.com/integrations/sources/gong-migrations)."
        upgradeDeadline: "2026-04-13"
        deadlineAction: "auto_upgrade"
        scopedImpact:
          - scopeType: stream
            impactedScopes:
              - "extensiveCalls"
