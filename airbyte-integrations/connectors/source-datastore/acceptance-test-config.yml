connector_image: airbyte/source-datastore:dev
test_strictness_level: low
acceptance_tests:
  spec:
    tests:
      - spec_path: source_datastore/spec.yaml
  connection:
    tests:
      - config_path: secrets/config.json
        status: succeed
      - config_path: integration_tests/invalid_config.json
        status: failed
  discovery:
    tests:
      - config_path: secrets/config.json
  basic_read:
    tests:
      - config_path: secrets/config.json
        timeout_seconds: 120
