[build-system]
requires = [ "poetry-core>=1.0.0",]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
version = "0.1.0"
name = "source-datastore"
description = "Source implementation for Google Cloud Datastore. Exports entities from any Kind to a destination of your choice."
authors = [ "Airbyte <contact@airbyte.io>",]
license = "ELv2"
readme = "README.md"
documentation = "https://docs.airbyte.com/integrations/sources/google-cloud-datastore"
homepage = "https://airbyte.com"
repository = "https://github.com/airbytehq/airbyte"
[[tool.poetry.packages]]
include = "source_datastore"

[tool.poetry.dependencies]
python = "^3.11,<3.12"
airbyte-cdk = "^2"
google-cloud-datastore = "^2.19"
google-auth = "^2.28"

[tool.poetry.scripts]
source-datastore = "source_datastore.run:run"

[tool.poetry.group.dev.dependencies]
mock = "^5.1.0"
pytest-mock = "^3.6"
pytest = "^8.0"


[tool.poe]
include = [
    # Shared tasks definition file(s) can be imported here.
    # Run `poe` or `poe --help` to see the list of available tasks.
    "${POE_GIT_DIR}/poe-tasks/poetry-connector-tasks.toml",
]
