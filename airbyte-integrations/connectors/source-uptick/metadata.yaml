metadataSpecVersion: "1.0"
data:
  allowedHosts:
    hosts:
      - "*"
  registryOverrides:
    oss:
      enabled: true
    cloud:
      enabled: true
  remoteRegistries:
    pypi:
      enabled: false
      packageName: airbyte-source-uptick
  connectorBuildOptions:
    baseImage: docker.io/airbyte/source-declarative-manifest:7.23.5@sha256:e18095bba3f7852bb7ae0a50d13fe532cee803cf8f273f5e8faf51fd93e401e4
  connectorTestSuitesOptions:
    - suite: unitTests
    - suite: integrationTests
      testSecrets:
        - name: SECRET_SOURCE-UPTICK__CREDS
          fileName: config.json
          secretStore:
            type: GSM
            alias: airbyte-connector-testing-secret-store
    - suite: acceptanceTests
      testSecrets:
        - name: SECRET_SOURCE-UPTICK__CREDS
          fileName: config.json
          secretStore:
            type: GSM
            alias: airbyte-connector-testing-secret-store
  connectorSubtype: api
  connectorType: source
  definitionId: 54c75c42-df4a-4f3e-a5f3-d50cf80f1649
  dockerImageTag: 1.0.0
  dockerRepository: airbyte/source-uptick
  githubIssueLabel: source-uptick
  icon: icon.svg
  license: ELv2
  name: Uptick
  releaseDate: 2025-06-10
  releaseStage: generally_available
  releases:
    breakingChanges:
      1.0.0:
        message: "This release upgrades the Uptick API from v2.14 to v2.15 and removes fields from the `branches`, `defectquotelineitems`, `servicetasks`, and `tasksessions` streams. Users syncing these streams must update downstream references and refresh the source schema after upgrading. See the [Uptick migration guide](https://docs.airbyte.com/integrations/sources/uptick-migrations#upgrading-to-100) for details and replacement fields."
        upgradeDeadline: "2026-08-20"
        deadlineAction: "auto_upgrade"
        scopedImpact:
          - scopeType: stream
            impactedScopes:
              - branches
              - defectquotelineitems
              - servicetasks
              - tasksessions
      0.4.0:
        message: "Breaking changes: The assets stream no longer includes floorplan_location_id. The tasksessions stream has removed hours (use duration_hours instead), sell_hours, appointment_attendance, is_suspicious_started, and is_suspicious_finished fields. See migration guide for details."
        upgradeDeadline: "2025-12-23"
  supportLevel: community
  documentationUrl: https://docs.airbyte.com/integrations/sources/uptick
  tags:
    - language:manifest-only
    - cdk:low-code
  ab_internal:
    ql: 100
    sl: 100
  externalDocumentationUrls:
    - title: Uptick API documentation
      url: https://developer.uptick.com/
      type: api_reference
