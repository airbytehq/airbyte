version: 7.17.1

type: DeclarativeSource

description: Greenhouse v3 connection

check:
  type: CheckStream
  stream_names:
    - applications
  dynamic_streams_check_configs: []

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: OAuthAuthenticator
        scopes:
          - harvest:applications:list
        client_id: "{{ config[\"client_id\"] }}"
        grant_type: client_credentials
        client_secret: "{{ config[\"client_secret\"] }}"
        client_id_name: client_id
        grant_type_name: grant_type
        access_token_name: access_token
        client_secret_name: client_secret
        refresh_token_name: refresh_token
        use_profile_assertion: false
        token_refresh_endpoint: https://auth.greenhouse.io/token
      request_parameters:
        updated_at: "{{ stream_slice.start_time if not next_page_token else '' }}"
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_token_option:
          type: RequestPath
        pagination_strategy:
          type: CursorPagination
          cursor_value: "{{ headers.link.next.url }}"
          stop_condition: "{{ not headers.get(\"link\") }}"

streams:
  - type: DeclarativeStream
    name: applications
    retriever:
      type: SimpleRetriever
      paginator:
        type: DefaultPaginator
        page_token_option:
          type: RequestPath
        pagination_strategy:
          type: CursorPagination
          cursor_value: "{{ headers.link.next.url }}"
          stop_condition: "{{ not headers.get(\"link\") }}"
      requester:
        type: HttpRequester
        url: https://harvest.greenhouse.io/v3/applications
        http_method: GET
        authenticator:
          type: OAuthAuthenticator
          scopes:
            - harvest:applications:list
          client_id: "{{ config[\"client_id\"] }}"
          grant_type: client_credentials
          client_secret: "{{ config[\"client_secret\"] }}"
          client_id_name: client_id
          grant_type_name: grant_type
          access_token_name: access_token
          client_secret_name: client_secret
          refresh_token_name: refresh_token
          use_profile_assertion: false
          token_refresh_endpoint: https://auth.greenhouse.io/token
        request_parameters:
          updated_at: "{{ stream_slice.start_time if not next_page_token else '' }}"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: []
    primary_key:
      - id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/draft-07/schema#
        properties: {}
        additionalProperties: true
    incremental_sync:
      type: DatetimeBasedCursor
      cursor_field: updated_at
      is_data_feed: false
      start_datetime: gt|2020-01-01T00:00:00.000Z
      datetime_format: gt|%Y-%m-%dT%H:%M:%S.%fZ
      cursor_datetime_formats:
        - "%Y-%m-%dT%H:%M:%S.%fZ"
      partition_field_end: ""
