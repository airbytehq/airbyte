version: 7.17.1

type: DeclarativeSource

description: >-
  Reprise is the demo creation platform enterprise sales and marketing teams
  trust to build no-code, interactive product demos that win more deals.

check:
  type: CheckStream
  stream_names:
    - replay_session_activity

definitions:
  linked:
    HttpRequester:
      error_handler:
        type: DefaultErrorHandler
        max_retries: 5
        response_filters:
          - type: HttpResponseFilter
            action: RETRY
            http_codes:
              - 408
              - 429
              - 500
              - 502
              - 503
              - 504
        backoff_strategies:
          - type: ExponentialBackoffStrategy
            factor: 2
      request_headers:
        Authorization: Bearer {{ config['api_token'] }}
      authenticator:
        type: SessionTokenAuthenticator
        login_requester:
          type: HttpRequester
          url: https://app.getreprise.com/api/warehouse/token
          http_method: POST
          error_handler:
            $ref: "#/definitions/linked/HttpRequester/error_handler"
          request_headers:
            $ref: "#/definitions/linked/HttpRequester/request_headers"
        session_token_path:
          - token
        expiration_duration: PT55M
        request_authentication:
          type: ApiKey
          inject_into:
            type: RequestOption
            field_name: token
            inject_into: request_parameter
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: limit
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: offset
          inject_into: request_parameter
        pagination_strategy:
          type: OffsetIncrement
          page_size: 10000
          inject_on_first_request: true
    WarehouseTokenAuthenticator:
      type: SessionTokenAuthenticator
      login_requester:
        type: HttpRequester
        url: https://app.getreprise.com/api/warehouse/token
        http_method: POST
        error_handler:
          type: DefaultErrorHandler
          max_retries: 5
          response_filters:
            - type: HttpResponseFilter
              action: RETRY
              http_codes:
                - 408
                - 429
                - 500
                - 502
                - 503
                - 504
          backoff_strategies:
            - type: ExponentialBackoffStrategy
              factor: 2
        request_headers:
          Authorization: Bearer {{ config['api_token'] }}
      session_token_path:
        - token
      expiration_duration: PT55M
      request_authentication:
        type: ApiKey
        inject_into:
          type: RequestOption
          field_name: token
          inject_into: request_parameter
    ClientClockSinceCreatedAtField:
      type: AddedFieldDefinition
      path:
        - since_created_at
      value: >-
        {%- set raw = record['create_at'] -%} {%- set now_str =
        now_utc().strftime('%Y-%m-%d %H:%M:%S') -%} {%- if raw and raw[:19] >
        now_str -%} {{- now_str -}} {%- else -%} {{- raw -}} {%- endif -%}

