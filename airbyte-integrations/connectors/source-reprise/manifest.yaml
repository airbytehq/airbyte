spec:
  type: Spec
  documentation_url: https://reprise.zendesk.com/hc/en-us/articles/18940321925659-Replay-Data-API
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - api_token
      - start_time
    properties:
      api_token:
        type: string
        description: >-
          Reprise portal API key (Settings > API Management). Exchanged for a
          scoped warehouse JWT via POST
          https://app.getreprise.com/api/warehouse/token before each replay /
          replicate sync.
        name: api_token
        order: 0
        title: API Token
        airbyte_secret: true
      start_time:
        type: string
        order: 2
        title: start_time
        default: "2022-01-01 00:00:00"
    additionalProperties: true

