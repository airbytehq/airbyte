plugins {
    id 'application'
    id 'airbyte-java-connector'
}

airbyteJavaConnector {
    cdkVersionRequired = '0.44.23'
    features = ['db-destinations']
    useLocalCdk = false
}

//remove once upgrading the CDK version to 0.4.x or later
java {
    compileJava {
        options.compilerArgs.remove("-Werror")
    }
}

airbyteJavaConnector.addCdkDependencies()

application {
    mainClass = 'io.airbyte.integrations.destination.iceberg.IcebergDestinationRunner'
    // Spark 4 / Iceberg run embedded in-process (local mode), so the connector's own JVM must be
    // launched with the JPMS --add-opens that Spark on Java 17+ and Iceberg's Arrow vectorized
    // reader require. Without java.base/java.nio opened, Arrow's MemoryUtil fails to initialize and
    // any vectorized Iceberg read aborts the write ("Failed to initialize MemoryUtil ... must start
    // Java with --add-opens=java.base/java.nio=ALL-UNNAMED"). These flags are baked into the
    // generated start script (bin/destination-iceberg) used by the Docker image entrypoint.
    applicationDefaultJvmArgs = [
        '--add-opens=java.base/java.lang=ALL-UNNAMED',
        '--add-opens=java.base/java.lang.invoke=ALL-UNNAMED',
        '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED',
        '--add-opens=java.base/java.io=ALL-UNNAMED',
        '--add-opens=java.base/java.net=ALL-UNNAMED',
        '--add-opens=java.base/java.nio=ALL-UNNAMED',
        '--add-opens=java.base/java.util=ALL-UNNAMED',
        '--add-opens=java.base/java.util.concurrent=ALL-UNNAMED',
        '--add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED',
        '--add-opens=java.base/sun.nio.ch=ALL-UNNAMED',
        '--add-opens=java.base/sun.nio.cs=ALL-UNNAMED',
        '--add-opens=java.base/sun.security.action=ALL-UNNAMED',
        '--add-opens=java.base/sun.util.calendar=ALL-UNNAMED',
        '--add-opens=java.base/jdk.internal.ref=ALL-UNNAMED'
    ]
}

dependencies {

    implementation('org.apache.spark:spark-sql_2.13:4.0.0') {
        exclude(group: 'org.apache.hadoop', module: 'hadoop-common')
    }
    implementation('org.apache.spark:spark-hive_2.13:4.0.0') {
        exclude(group: 'org.apache.hadoop', module: 'hadoop-common')
    }
    implementation 'org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.0'

    // Downgrade AWS SDK to 2.29.52 to avoid chunked encoding checksum issues
    // AWS SDK 2.30.0+ changed default checksum behavior to WHEN_SUPPORTED
    // which causes compatibility issues with S3-compatible storage (OSS, MinIO, etc.)
    implementation "software.amazon.awssdk:utils:2.29.52"
    implementation "software.amazon.awssdk:url-connection-client:2.29.52"
    implementation "software.amazon.awssdk:s3:2.29.52"
    implementation "software.amazon.awssdk:glue:2.29.52"
    implementation "software.amazon.awssdk:dynamodb:2.29.52"
    implementation "software.amazon.awssdk:kms:2.29.52"
    implementation "software.amazon.awssdk:sts:2.29.52"
    implementation "software.amazon.awssdk:sdk-core:2.29.52"
    implementation "software.amazon.awssdk:aws-core:2.29.52"

    implementation "org.apache.hadoop:hadoop-aws:3.3.2"
    implementation "org.apache.hadoop:hadoop-client-api:3.3.2"
    implementation "org.apache.hadoop:hadoop-client-runtime:3.3.2"
    implementation "org.postgresql:postgresql:42.5.0"
    implementation "commons-collections:commons-collections:3.2.2"

    testImplementation 'org.testcontainers:postgresql:1.19.0'
    integrationTestJavaImplementation 'org.testcontainers:postgresql:1.19.0'

    testImplementation 'org.mockito:mockito-inline:4.7.0'
}

test {
    jvmArgs = ['--add-opens=java.base/sun.nio.ch=ALL-UNNAMED', '--add-opens=java.base/java.nio=ALL-UNNAMED']
}

// ---------------------------------------------------------------------------
// Local Docker image build that bypasses airbyte-ci / Dagger.
//
// The stock `buildConnectorImage` task routes through airbyte-ci, which starts
// a Dagger engine container. On networks that cannot reach the Dagger engine
// registry that fails with "start engine: context deadline exceeded".
//
// This task replicates what airbyte-ci would do with a plain `docker build`
// against the shared java-connector Dockerfile, so it needs only Java + Docker
// (no Python, no Dagger).
//
// Usage:
//   ./gradlew :airbyte-integrations:connectors:destination-iceberg:buildDockerImage
//   ./gradlew :airbyte-integrations:connectors:destination-iceberg:buildDockerImage -PimageTag=dedup1
// ---------------------------------------------------------------------------
tasks.register('buildDockerImage', Exec) {
    group = 'docker'
    description = 'Build the connector image locally using plain docker build (bypasses airbyte-ci/Dagger).'
    dependsOn tasks.named('distTar')

    def contextDir = layout.buildDirectory.dir('docker-context').get().asFile
    def distDir = layout.buildDirectory.dir('distributions').get().asFile
    def sharedDockerfile = rootProject.file('docker-images/Dockerfile.java-connector-non-airbyte-ci')
    def baseImage = 'airbyte/java-connector-base:2.0.0'
    def imageTag = (project.findProperty('imageTag') ?: 'dev').toString()
    def imageName = "airbyte/${project.name}:${imageTag}".toString()

    doFirst {
        contextDir.mkdirs()
        def tar = distDir.listFiles()?.find { it.name.endsWith('.tar') }
        if (tar == null) {
            throw new GradleException("No distribution tar found in ${distDir}. Did distTar run?")
        }
        copy {
            from tar
            into contextDir
            rename { 'airbyte-app.tar' }
        }
        copy {
            from sharedDockerfile
            into contextDir
            rename { 'Dockerfile' }
        }
        logger.lifecycle("Building ${imageName} from context ${contextDir}")
    }

    commandLine 'docker', 'build', '--provenance=false',
            '--build-arg', "BASE_IMAGE=${baseImage}",
            '--build-arg', "CONNECTOR_NAME=${project.name}",
            '-t', imageName,
            contextDir.absolutePath
}
