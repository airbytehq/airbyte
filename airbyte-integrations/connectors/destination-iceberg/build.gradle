plugins {
    id 'application'
    id 'airbyte-java-connector'
}

airbyteJavaConnector {
    cdkVersionRequired = '0.44.23'
    features = ['db-destinations']
    useLocalCdk = false
}

//remove once upgrading the CDK version to 0.4.x or later
java {
    compileJava {
        options.compilerArgs.remove("-Werror")
    }
}

airbyteJavaConnector.addCdkDependencies()

application {
    mainClass = 'io.airbyte.integrations.destination.iceberg.IcebergDestinationRunner'
}

dependencies {

    implementation('org.apache.spark:spark-sql_2.13:4.0.0') {
        exclude(group: 'org.apache.hadoop', module: 'hadoop-common')
    }
    implementation('org.apache.spark:spark-hive_2.13:4.0.0') {
        exclude(group: 'org.apache.hadoop', module: 'hadoop-common')
    }
    implementation 'org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.0'

    // Downgrade AWS SDK to 2.29.52 to avoid chunked encoding checksum issues
    // AWS SDK 2.30.0+ changed default checksum behavior to WHEN_SUPPORTED
    // which causes compatibility issues with S3-compatible storage (OSS, MinIO, etc.)
    implementation "software.amazon.awssdk:utils:2.29.52"
    implementation "software.amazon.awssdk:url-connection-client:2.29.52"
    implementation "software.amazon.awssdk:s3:2.29.52"
    implementation "software.amazon.awssdk:glue:2.29.52"
    implementation "software.amazon.awssdk:dynamodb:2.29.52"
    implementation "software.amazon.awssdk:kms:2.29.52"
    implementation "software.amazon.awssdk:sts:2.29.52"
    implementation "software.amazon.awssdk:sdk-core:2.29.52"
    implementation "software.amazon.awssdk:aws-core:2.29.52"

    implementation "org.apache.hadoop:hadoop-aws:3.3.2"
    implementation "org.apache.hadoop:hadoop-client-api:3.3.2"
    implementation "org.apache.hadoop:hadoop-client-runtime:3.3.2"
    implementation "org.postgresql:postgresql:42.5.0"
    implementation "commons-collections:commons-collections:3.2.2"

    testImplementation 'org.testcontainers:postgresql:1.19.0'
    integrationTestJavaImplementation 'org.testcontainers:postgresql:1.19.0'

    testImplementation 'org.mockito:mockito-inline:4.7.0'
}

test {
    jvmArgs = ['--add-opens=java.base/sun.nio.ch=ALL-UNNAMED', '--add-opens=java.base/java.nio=ALL-UNNAMED']
}
