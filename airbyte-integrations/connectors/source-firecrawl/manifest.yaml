spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - api_key
    properties:
      url:
        type: string
        description: URL to scrape or crawl (required for scrape/crawl/map streams)
        order: 2
        title: Target URL
      urls:
        type: array
        description: >-
          List of URLs for batch_scrape_stream. If set, batch_scrape_stream uses
          this; otherwise uses [url] when url is set.
        items:
          type: string
          format: uri
        order: 3
        title: Target URLs (Batch Scrape)
        minItems: 1
      proxy:
        type: string
        description: >-
          basic (fast), enhanced (anti-bot), auto (retry with enhanced if
          needed)
        enum:
          - basic
          - enhanced
          - auto
        order: 18
        title: Proxy Type
        default: auto
      mobile:
        type: boolean
        description: Emulate mobile device (e.g. for mobile screenshots)
        order: 16
        title: Mobile Emulation
        default: false
      api_key:
        type: string
        description: Firecrawl API key for authentication
        order: 0
        title: API Key
        airbyte_secret: true
      api_url:
        type: string
        description: "Firecrawl API base URL (default: https://api.firecrawl.dev)"
        order: 1
        title: API URL
        default: https://api.firecrawl.dev
      formats:
        type: array
        description: Content formats to extract (markdown, html, changeTracking, etc.)
        items:
          type: string
          enum:
            - markdown
            - html
            - rawHtml
            - screenshot
            - changeTracking
        order: 6
        title: Output Formats
        default:
          - markdown
      parsers:
        type: array
        order: 56
        title: parsers
        default:
          - pdf
      sitemap:
        type: string
        description: skip, include, or only (crawl). include = sitemap + discovery.
        enum:
          - skip
          - include
          - only
        order: 20
        title: Crawl Sitemap Mode
        default: include
      block_ads:
        type: boolean
        description: Enable ad-blocking and cookie popup blocking
        order: 17
        title: Block Ads
        default: true
      agent_urls:
        type: array
        description: Optional URLs to constrain agent to
        items:
          type: string
          format: uri
        order: 52
        title: Agent URLs
        default: []
      max_age_ms:
        type: number
        description: >-
          Use cached page if younger than this (ms). Default 172800000 (2 days).
          Speeds up scrapes.
        order: 15
        title: Cache Max Age (ms)
        default: 172800000
      search_tbs:
        type: string
        description: >-
          Time filter: qdr:h (hour), qdr:d (day), qdr:w (week), qdr:m (month),
          qdr:y (year)
        order: 29
        title: Search Time Range
      agent_model:
        type: string
        description: spark-1-mini (cheaper) or spark-1-pro (higher accuracy)
        enum:
          - spark-1-mini
          - spark-1-pro
        order: 54
        title: Agent Model
        default: spark-1-mini
      map_sitemap:
        type: string
        description: skip, include, or only for URL discovery
        enum:
          - skip
          - include
          - only
        order: 34
        title: Map Sitemap Mode
        default: include
      webhook_url:
        type: string
        description: >-
          Optional webhook URL to receive crawl events (started, page,
          completed)
        order: 8
        title: Webhook URL
      agent_job_id:
        type: string
        description: Job ID for agent_status_stream (from agent_stream response)
        order: 55
        title: Agent Job ID
      agent_prompt:
        type: string
        description: >-
          Prompt for agent_stream (agentic extraction). Required for
          agent_stream.
        order: 51
        title: Agent Prompt
        minLength: 1
      crawl_job_id:
        type: string
        description: >-
          Job ID for crawl_status_stream and crawl_errors_stream (from
          crawl_stream response)
        order: 48
        title: Crawl Job ID
      exclude_tags:
        type: array
        description: HTML tags to exclude from extraction
        items:
          type: string
        order: 12
        title: Exclude Tags
        default:
          - nav
          - footer
          - script
          - style
      extract_urls:
        type: array
        description: >-
          URLs to extract structured data from (required for extract_stream).
          Glob format supported.
        items:
          type: string
          format: uri
        order: 37
        title: Extract URLs
        minItems: 1
      include_tags:
        type: array
        description: HTML tags to include in extraction
        items:
          type: string
        order: 11
        title: Include Tags
        default:
          - article
          - main
      search_query:
        type: string
        description: Query for search endpoint (required for search_stream)
        order: 4
        title: Search Query
      exclude_paths:
        type: array
        description: URL path regex patterns to exclude (e.g. ["blog/.*"])
        items:
          type: string
        order: 25
        title: Exclude Paths (Crawl)
        default: []
      include_paths:
        type: array
        description: URL path regex patterns to include only (e.g. ["docs/.*"])
        items:
          type: string
        order: 26
        title: Include Paths (Crawl)
        default: []
      search_filter:
        type: string
        description: Optional search filter for map endpoint (relevance ordering)
        order: 14
        title: Search Filter
      extract_job_id:
        type: string
        description: >-
          Completed extract job ID from POST /v2/extract (required for
          extract_results_stream)
        order: 39
        title: Extract Job ID
      extract_prompt:
        type: string
        description: Prompt to guide LLM extraction (for extract_stream)
        order: 38
        title: Extract Prompt
      search_country:
        type: string
        description: ISO country code for search (e.g. US, DE, FR)
        order: 31
        title: Search Country
        default: US
      search_sources:
        type: array
        description: "Search sources: web, images, news"
        items:
          type: string
          enum:
            - web
            - images
            - news
        order: 27
        title: Search Sources
        default:
          - web
      store_in_cache:
        type: boolean
        description: Store scraped pages in Firecrawl cache
        order: 19
        title: Store in Cache
        default: true
      webhook_events:
        type: array
        description: Events to subscribe to (started, page, completed)
        items:
          type: string
          enum:
            - started
            - page
            - completed
        order: 9
        title: Webhook Events
        default:
          - completed
      search_location:
        type: string
        description: >-
          Geo-target for search (e.g. Germany, San Francisco California United
          States)
        order: 30
        title: Search Location
      map_ignore_cache:
        type: boolean
        description: Bypass sitemap cache for fresh URLs
        order: 36
        title: Map Ignore Cache
        default: false
      batch_scrape_urls:
        type: array
        description: >-
          URLs for batch_scrape_job_stream (POST /v2/batch/scrape). Falls back
          to urls if not set. Required for batch scraping operations.
        items:
          type: string
          format: uri
        order: 45
        title: Batch Scrape URLs (async)
        minItems: 1
      crawl_preview_url:
        type: string
        description: URL for crawl_params_preview_stream (natural language to params)
        order: 49
        title: Crawl Preview URL
      only_main_content:
        type: boolean
        description: >-
          Extract only main content, excluding navigation and footer (default:
          true)
        order: 10
        title: Only Main Content
        default: true
      search_categories:
        type: array
        description: "Filter by category: github, research, pdf"
        items:
          type: string
          enum:
            - github
            - research
            - pdf
        order: 28
        title: Search Categories
        default: []
      search_timeout_ms:
        type: number
        description: Timeout for search request
        order: 32
        title: Search Timeout (ms)
      include_subdomains:
        type: boolean
        description: "Whether to include subdomains when crawling (default: false)"
        order: 5
        title: Include Subdomains
        default: false
      batch_scrape_job_id:
        type: string
        description: >-
          Job ID for batch_scrape_status_stream and batch_scrape_errors_stream
          (from batch_scrape_job_stream response)
        order: 46
        title: Batch Scrape Job ID
      crawl_delay_seconds:
        type: number
        description: >-
          Delay in seconds between scrapes (rate limiting). Firecrawl API
          requires > 0; minimum 1.
        order: 24
        title: Crawl Delay (seconds)
      crawl_entire_domain:
        type: boolean
        description: Follow sibling/parent URLs, not just child paths
        order: 22
        title: Crawl Entire Domain
        default: false
      allow_external_links:
        type: boolean
        description: Follow links to external websites
        order: 23
        title: Allow External Links (Crawl)
        default: false
      crawl_preview_prompt:
        type: string
        description: Natural language prompt for crawl_params_preview_stream
        order: 50
        title: Crawl Preview Prompt
      extract_show_sources:
        type: boolean
        description: Include sources used for extraction in response
        order: 43
        title: Extract Show Sources
        default: false
      enable_change_tracking:
        type: boolean
        description: "Enable change tracking to detect website updates (default: false)"
        order: 7
        title: Enable Change Tracking
        default: false
      extract_ignore_sitemap:
        type: boolean
        description: Ignore sitemap.xml during website scanning
        order: 41
        title: Extract Ignore Sitemap
        default: false
      ignore_query_parameters:
        type: boolean
        description: Do not re-scrape same path with different query params
        order: 21
        title: Ignore Query Parameters (Crawl)
        default: false
      extract_enable_web_search:
        type: boolean
        description: Use web search to find additional data during extraction
        order: 40
        title: Extract Enable Web Search
        default: false
      extract_include_subdomains:
        type: boolean
        description: Scan subdomains of provided URLs
        order: 42
        title: Extract Include Subdomains
        default: true
      include_images_in_markdown:
        type: boolean
        description: >-
          Default false = no images (excluded). If true, markdown includes
          base64-encoded images; if false, images are removed and replaced with
          placeholders (alt text remains).
        order: 13
        title: Include Images in Markdown
        default: false
      search_ignore_invalid_urls:
        type: boolean
        description: Exclude URLs invalid for other Firecrawl endpoints
        order: 33
        title: Search Ignore Invalid URLs
        default: false
      extract_ignore_invalid_urls:
        type: boolean
        description: Skip invalid URLs and return them in invalidURLs instead of failing
        order: 44
        title: Extract Ignore Invalid URLs
        default: true
      map_ignore_query_parameters:
        type: boolean
        description: Do not return URLs with query parameters
        order: 35
        title: Map Ignore Query Parameters
        default: true
      agent_strict_constrain_to_urls:
        type: boolean
        description: If true, agent only visits provided URLs
        order: 53
        title: Agent Strict Constrain to URLs
        default: false
      batch_scrape_ignore_invalid_urls:
        type: boolean
        description: Skip invalid URLs in async batch
        order: 47
        title: Batch Scrape Ignore Invalid URLs
        default: true
    additionalProperties: true

