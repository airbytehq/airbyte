version: 7.0.4

type: DeclarativeSource

description: FireCrawl- Turn websites into LLM-ready data

check:
  type: CheckStream
  stream_names:
    - scrape_stream

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: BearerAuthenticator
        api_token: "{{ config['api_key'] }}"
      error_handler:
        type: CompositeErrorHandler
        error_handlers:
          - type: DefaultErrorHandler
            max_retries: 3
            backoff_strategies:
              - type: ExponentialBackoffStrategy
                factor: 2
                max_time: 60
      request_headers:
        Content-Type: application/json

streams:
  - type: DeclarativeStream
    name: scrape_stream
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url: "{{ config.get('api_url', 'https:/api.firecrawl.dev') }}/v2/scrape"
        http_method: POST
        request_body:
          type: RequestBodyJsonObject
          value:
            url: "{{ config['url'] }}"
            proxy: "{{ config.get('proxy', 'auto') }}"
            maxAge: "{{ config.get('max_age_ms', 172800000) }}"
            mobile: "{{ config.get('mobile', False) }}"
            formats: >-
              {{ config.get('formats', ['markdown']) + (['changeTracking'] if
              config.get('enable_change_tracking', False) else []) }}
            timeout: "{{ config.get('timeout_ms', 30000) }}"
            waitFor: "{{ config.get('wait_for_ms', 0) }}"
            blockAds: "{{ config.get('block_ads', True) }}"
            excludeTags: "{{ config.get('exclude_tags', []) }}"
            includeTags: "{{ config.get('include_tags', []) }}"
            storeInCache: "{{ config.get('store_in_cache', True) }}"
            onlyMainContent: "{{ config.get('only_main_content', False) }}"
            removeBase64Images: "{{ not config.get('include_images_in_markdown', False) }}"
        authenticator:
          type: BearerAuthenticator
          api_token: "{{ config['api_key'] }}"
        error_handler:
          type: CompositeErrorHandler
          error_handlers:
            - type: DefaultErrorHandler
              max_retries: 3
              backoff_strategies:
                - type: ExponentialBackoffStrategy
                  factor: 2
                  max_time: 60
        request_headers:
          Content-Type: application/json
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
    primary_key: []
  - type: DeclarativeStream
    name: batch_scrape_stream
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url: "{{ config.get('api_url', 'https:/api.firecrawl.dev') }}/v2/scrape"
        http_method: POST
        request_body:
          type: RequestBodyJsonObject
          value:
            url: "{{ stream_slice.url }}"
            proxy: "{{ config.get('proxy', 'auto') }}"
            maxAge: "{{ config.get('max_age_ms', 172800000) }}"
            mobile: "{{ config.get('mobile', False) }}"
            formats: >-
              {{ config.get('formats', ['markdown']) + (['changeTracking'] if
              config.get('enable_change_tracking', False) else []) }}
            timeout: "{{ config.get('timeout_ms', 30000) }}"
            waitFor: "{{ config.get('wait_for_ms', 0) }}"
            blockAds: "{{ config.get('block_ads', True) }}"
            excludeTags: "{{ config.get('exclude_tags', []) }}"
            includeTags: "{{ config.get('include_tags', []) }}"
            storeInCache: "{{ config.get('store_in_cache', True) }}"
            onlyMainContent: "{{ config.get('only_main_content', False) }}"
            removeBase64Images: "{{ not config.get('include_images_in_markdown', False) }}"
        authenticator:
          type: BearerAuthenticator
          api_token: "{{ config['api_key'] }}"
        error_handler:
          type: CompositeErrorHandler
          error_handlers:
            - type: DefaultErrorHandler
              max_retries: 3
              backoff_strategies:
                - type: ExponentialBackoffStrategy
                  factor: 2
                  max_time: 60
        request_headers:
          Content-Type: application/json
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
      partition_router:
        type: ListPartitionRouter
        values: >-
          {{ config.get('urls', [config.get('url')] if config.get('url') else
          []) }}
        cursor_field: url
    primary_key: []
  - type: DeclarativeStream
    name: crawl_stream
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url: "{{ config.get('api_url', 'https:/api.firecrawl.dev') }}/v2/crawl"
        http_method: POST
        request_body:
          type: RequestBodyJsonObject
          value:
            url: "{{ config['url'] }}"
            delay: "{{ config.get('crawl_delay_seconds', 1) }}"
            limit: "{{ config.get('limit', 100) }}"
            sitemap: "{{ config.get('sitemap', 'include') }}"
            excludePaths: "{{ config.get('exclude_paths', []) or [] }}"
            includePaths: "{{ config.get('include_paths', []) or [] }}"
            scrapeOptions:
              proxy: "{{ config.get('proxy', 'auto') }}"
              maxAge: "{{ config.get('max_age_ms', 172800000) }}"
              mobile: "{{ config.get('mobile', False) }}"
              formats: >-
                {{ config.get('formats', ['markdown']) + (['changeTracking'] if
                config.get('enable_change_tracking', False) else []) }}
              timeout: "{{ config.get('timeout_ms', 30000) }}"
              waitFor: "{{ config.get('wait_for_ms', 0) }}"
              blockAds: "{{ config.get('block_ads', True) }}"
              excludeTags: "{{ config.get('exclude_tags', []) }}"
              includeTags: "{{ config.get('include_tags', []) }}"
              storeInCache: "{{ config.get('store_in_cache', True) }}"
              onlyMainContent: "{{ config.get('only_main_content', False) }}"
              removeBase64Images: "{{ not config.get('include_images_in_markdown', False) }}"
            maxConcurrency: "{{ config.get('max_concurrency', 10) }}"
            allowSubdomains: "{{ config.get('include_subdomains', False) }}"
            crawlEntireDomain: "{{ config.get('crawl_entire_domain', False) }}"
            maxDiscoveryDepth: "{{ config.get('max_depth', 3) }}"
            allowExternalLinks: "{{ config.get('allow_external_links', False) }}"
            ignoreQueryParameters: "{{ config.get('ignore_query_parameters', False) }}"
        authenticator:
          type: BearerAuthenticator
          api_token: "{{ config['api_key'] }}"
        error_handler:
          type: CompositeErrorHandler
          error_handlers:
            - type: DefaultErrorHandler
              max_retries: 3
              backoff_strategies:
                - type: ExponentialBackoffStrategy
                  factor: 2
                  max_time: 60
        request_headers:
          Content-Type: application/json
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
            - "*"
    primary_key: []
  - type: DeclarativeStream
    name: search_stream
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url: "{{ config.get('api_url', 'https:/api.firecrawl.dev') }}/v2/search"
        http_method: POST
        request_body:
          type: RequestBodyGraphQL
          value:
            tbs: "{{ config.get('search_tbs', '') }}"
            limit: "{{ config.get('search_limit', 5) }}"
            query: "{{ config.get('search_query', 'web search') }}"
            country: "{{ config.get('search_country', 'US') }}"
            sources: "{{ config.get('search_sources', ['web']) }}"
            timeout: "{{ config.get('search_timeout_ms', 60000) }}"
            location: "{{ config.get('search_location', '') }}"
            categories: "{{ config.get('search_categories', []) or [] }}"
            scrapeOptions:
              formats: "{{ config.get('formats', ['markdown']) }}"
              onlyMainContent: "{{ config.get('only_main_content', True) }}"
              removeBase64Images: "{{ not config.get('include_images_in_markdown', False) }}"
            ignoreInvalidURLs: "{{ config.get('search_ignore_invalid_urls', False) }}"
        authenticator:
          type: BearerAuthenticator
          api_token: "{{ config['api_key'] }}"
        error_handler:
          type: CompositeErrorHandler
          error_handlers:
            - type: DefaultErrorHandler
              max_retries: 3
              backoff_strategies:
                - type: ExponentialBackoffStrategy
                  factor: 2
                  max_time: 60
        request_headers:
          Content-Type: application/json
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
            - web
            - "*"
    primary_key: []
  - type: DeclarativeStream
    name: map_stream
    retriever:
