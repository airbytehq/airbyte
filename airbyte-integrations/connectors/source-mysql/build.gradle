plugins {
    id 'airbyte-bulk-connector'
    id "io.airbyte.gradle.docker"
    id 'airbyte-connector-docker-convention'
}

application {
    mainClass = 'io.airbyte.integrations.source.mysql.MySqlSource'
}

airbyteBulkConnector {
    core = 'extract'
    toolkits = ['extract-jdbc', 'extract-cdc']
}

dependencies {
    // Force Debezium 3.4.2.Final to pick up null-safe MySqlGtidSet.UUIDSet handling (PR #75559).
    // Avoids NPE in CDK pre-flight UUIDSet comparison after RDS UUID drift / replica promotion / source-endpoint switch.
    api enforcedPlatform('io.debezium:debezium-bom:3.4.2.Final')
    api "com.google.protobuf:protobuf-java:4.27.5" // for fixing vulnerability of protobuf-java used by Debezium
    implementation 'com.mysql:mysql-connector-j:9.1.0'
    implementation 'io.debezium:debezium-connector-mysql'

    testImplementation 'org.testcontainers:mysql'
    testImplementation 'io.mockk:mockk:1.12.0'
}
