      - path: [repository]
        value: "{{ stream_slice.repository }}"
      - path: [user_id]
        value: "{{ record.get('user', {}).get('id') }}"
      - path: [user_login]
        value: "{{ record.get('user', {}).get('login') }}"
      - path: [milestone_id]
        value: "{{ record.get('milestone', {}).get('id') if record.get('milestone')
          else None }}"
      - path: [milestone_number]
        value: "{{ record.get('milestone', {}).get('number') if record.get('milestone')
          else None }}"
      - path: [milestone_title]
        value: "{{ record.get('milestone', {}).get('title') if record.get('milestone')
          else None }}"
      - path: [assignee_id]
        value: "{{ record.get('assignee', {}).get('id') if record.get('assignee')
          else None }}"
      - path: [assignee_ids]
        value: "{{ record.get('assignees', []) | map(attribute='id') | list }}"
      - path: [label_names]
        value: "{{ record.get('labels', []) | map(attribute='name') | list }}"
      - path: [is_pull_request]
        value: "{{ record.get('pull_request') is not none }}"
    - type: RemoveFields
      field_pointers: [[user], [milestone], [assignee], [assignees], [labels], [pull_request],
        [reactions], [performed_via_github_app]]
    schema:
      $schema: http://json-schema.org/schema#
      type: object
      properties:
        url:
          type:
          - string
          - 'null'
        repository_url:
          type:
          - string
          - 'null'
        labels_url:
          type:
          - string
          - 'null'
        comments_url:
          type:
          - string
          - 'null'
        events_url:
          type:
          - string
          - 'null'
        html_url:
          type:
          - string
          - 'null'
        id:
          type: number
        node_id:
          type:
          - string
          - 'null'
        number:
          type:
          - number
          - 'null'
        title:
          type:
          - string
          - 'null'
        state:
          type:
          - string
          - 'null'
        locked:
          type:
          - boolean
          - 'null'
        comments:
          type:
          - number
          - 'null'
        created_at:
          type:
          - string
          - 'null'
        updated_at:
          type: string
        author_association:
          type:
          - string
          - 'null'
        issue_field_values:
          type:
          - array
          - 'null'
        draft:
          type:
          - boolean
          - 'null'
        body:
          type:
          - string
          - 'null'
        timeline_url:
          type:
          - string
          - 'null'
        repository:
          type:
          - string
          - 'null'
        user_id:
          type:
          - number
          - 'null'
        user_login:
          type:
          - string
          - 'null'
        assignee_ids:
          type:
          - array
          - 'null'
        label_names:
          type:
          - array
          - 'null'
          items:
            type:
            - string
            - 'null'
        is_pull_request:
          type:
          - boolean
          - 'null'
      required:
      - id
      - updated_at

  commits_stream:
    type: DeclarativeStream
    name: commits
    primary_key: [sha]
    retriever:
      $ref: "#/definitions/base_repo_retriever"
      requester:
        $ref: "#/definitions/requester"
        path: "/repos/{{ stream_slice.repository }}/commits"
    incremental_sync:
      $ref: "#/definitions/incremental_sync_commits"
    transformations:
    - type: AddFields
      fields:
      - path: [repository]
        value: "{{ stream_slice.repository }}"
      - path: [author_id]
        value: "{{ record.get('author', {}).get('id') if record.get('author') else
          None }}"
      - path: [author_login]
        value: "{{ record.get('author', {}).get('login') if record.get('author') else
          None }}"
      - path: [committer_id]
        value: "{{ record.get('committer', {}).get('id') if record.get('committer')
          else None }}"
      - path: [committer_login]
        value: "{{ record.get('committer', {}).get('login') if record.get('committer')
          else None }}"
      - path: [commit_message]
        value: "{{ record.get('commit', {}).get('message') }}"
      - path: [commit_author_name]
        value: "{{ record.get('commit', {}).get('author', {}).get('name') }}"
      - path: [commit_author_email]
        value: "{{ record.get('commit', {}).get('author', {}).get('email') }}"
      - path: [commit_author_date]
        value: "{{ record.get('commit', {}).get('author', {}).get('date') }}"
      - path: [commit_committer_name]
        value: "{{ record.get('commit', {}).get('committer', {}).get('name') }}"
      - path: [commit_committer_email]
        value: "{{ record.get('commit', {}).get('committer', {}).get('email') }}"
      - path: [commit_committer_date]
        value: "{{ record.get('commit', {}).get('committer', {}).get('date') }}"
      - path: [commit_comment_count]
        value: "{{ record.get('commit', {}).get('comment_count') }}"
      - path: [commit_verified]
        value: "{{ record.get('commit', {}).get('verification', {}).get('verified')
          }}"
    - type: RemoveFields
      field_pointers: [[author], [committer], [commit], [parents]]
    schema:
      $schema: http://json-schema.org/schema#
      type: object
      properties:
        sha:
          type: string
        node_id:
          type:
          - string
          - 'null'
        url:
          type:
          - string
          - 'null'
        html_url:
          type:
          - string
          - 'null'
        comments_url:
          type:
          - string
          - 'null'
        repository:
          type:
          - string
          - 'null'
        author_id:
          type:
          - number
          - 'null'
        author_login:
          type:
          - string
          - 'null'
        committer_id:
          type:
          - number
          - 'null'
        committer_login:
          type:
          - string
          - 'null'
        commit_message:
          type:
          - string
          - 'null'
        commit_author_name:
          type:
          - string
          - 'null'
        commit_author_email:
          type:
          - string
          - 'null'
        commit_author_date:
          type:
          - string
          - 'null'
        commit_committer_name:
          type:
          - string
          - 'null'
        commit_committer_email:
          type:
          - string
          - 'null'
        commit_committer_date:
          type: string
        commit_comment_count:
          type:
          - number
          - 'null'
        commit_verified:
          type:
          - boolean
          - 'null'
      required:
      - sha
      - commit_committer_date

  comments_stream:
    type: DeclarativeStream
    name: comments
    primary_key: [id]
    retriever:
      $ref: "#/definitions/base_repo_retriever"
      requester:
        $ref: "#/definitions/requester"
        path: "/repos/{{ stream_slice.repository }}/issues/comments"
        request_parameters:
          sort: updated
          direction: asc
    incremental_sync:
      $ref: "#/definitions/incremental_sync_with_since"
    transformations:
    - type: AddFields
      fields:
      - path: [repository]
        value: "{{ stream_slice.repository }}"
      - path: [user_id]
        value: "{{ record.get('user', {}).get('id') }}"
      - path: [user_login]
        value: "{{ record.get('user', {}).get('login') }}"
      - path: [issue_number]
        value: "{{ record.get('issue_url', '').split('/')[-1] if record.get('issue_url')
          else None }}"
    - type: RemoveFields
      field_pointers: [[user], [performed_via_github_app], [reactions]]
    schema:
      $schema: http://json-schema.org/schema#
      type: object
      properties:
        url:
