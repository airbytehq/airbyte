spec:
  type: Spec
  documentation_url: "https://docs.airbyte.com/integrations/sources/github-gen2"
  connection_specification:
    $schema: "http://json-schema.org/draft-07/schema#"
    title: "GitHub (Beta, Gen-2)"
    type: object
    required: [access_token, repositories]
    additionalProperties: true
    properties:
      access_token:
        type: string
        title: "Personal Access Token"
        description: "GitHub Personal Access Token with repo scope."
        airbyte_secret: true
        order: 0
      repositories:
        type: array
        title: "Repositories"
        description: "List of GitHub repositories in owner/repo format."
        items: {type: string}
        examples: ["airbytehq/airbyte", "airbytehq/integration-test"]
        order: 1
      start_date:
        type: string
        title: "Start Date"
        description: "Start date for incremental streams (ISO 8601). Defaults to 2010-01-01."
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
        examples: ["2024-01-01T00:00:00Z"]
        order: 2
        format: date-time
      api_url:
        type: string
        title: "API URL"
        description: "GitHub API URL. Override for GitHub Enterprise."
        default: "api.github.com"
        examples: ["api.github.com"]
        order: 3
