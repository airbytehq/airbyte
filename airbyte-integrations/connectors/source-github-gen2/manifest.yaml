        line:
          type:
          - number
          - 'null'
        original_line:
          type:
          - number
          - 'null'
        side:
          type:
          - string
          - 'null'
        author_association:
          type:
          - string
          - 'null'
        original_position:
          type:
          - number
          - 'null'
        position:
          type:
          - number
          - 'null'
        subject_type:
          type:
          - string
          - 'null'
        repository:
          type:
          - string
          - 'null'
        user_id:
          type:
          - number
          - 'null'
        user_login:
          type:
          - string
          - 'null'
        pull_request_number:
          type:
          - number
          - 'null'
      required:
      - id
      - updated_at

  reviews_stream:
    type: DeclarativeStream
    name: reviews
    primary_key: [id]
    retriever:
      type: SimpleRetriever
      record_selector:
        $ref: "#/definitions/selector"
      requester:
        $ref: "#/definitions/requester"
        path: "/repos/{{ stream_slice.parent_slice_key.split('::')[0] }}/pulls/{{
          stream_slice.parent_slice_key.split('::')[1] }}/reviews"
      paginator:
        $ref: "#/definitions/paginator"
      partition_router:
        type: SubstreamPartitionRouter
        parent_stream_configs:
        - type: ParentStreamConfig
          stream:
            $ref: "#/definitions/pull_requests_stream"
          parent_key: _review_key
          partition_field: parent_slice_key
    transformations:
    - type: AddFields
      fields:
      - path: [repository]
        value: "{{ stream_slice.parent_slice_key.split('::')[0] }}"
      - path: [pull_request_number]
        value: "{{ stream_slice.parent_slice_key.split('::')[1] | int }}"
      - path: [user_id]
        value: "{{ record.get('user', {}).get('id') }}"
      - path: [user_login]
        value: "{{ record.get('user', {}).get('login') }}"
    - type: RemoveFields
      field_pointers: [[user], [_links]]
    schema:
      $schema: http://json-schema.org/schema#
      type: object
      properties:
        id:
          type: number
        node_id:
          type:
          - string
          - 'null'
        body:
          type:
          - string
          - 'null'
        state:
          type:
          - string
          - 'null'
        html_url:
          type:
          - string
          - 'null'
        pull_request_url:
          type:
          - string
          - 'null'
        author_association:
          type:
          - string
          - 'null'
        submitted_at:
          type:
          - string
          - 'null'
        commit_id:
          type:
          - string
          - 'null'
        repository:
          type:
          - string
          - 'null'
        pull_request_number:
          type:
          - number
          - 'null'
        user_id:
          type:
          - number
          - 'null'
        user_login:
          type:
          - string
          - 'null'
      required:
      - id

  stargazers_stream:
    type: DeclarativeStream
    name: stargazers
    primary_key: [user_id, repository]
    retriever:
      $ref: "#/definitions/base_repo_retriever"
      requester:
        $ref: "#/definitions/requester"
        path: "/repos/{{ stream_slice.repository }}/stargazers"
        request_headers:
          Accept: "application/vnd.github.star+json"
          X-GitHub-Api-Version: "2022-11-28"
    transformations:
    - type: AddFields
      fields:
      - path: [repository]
        value: "{{ stream_slice.repository }}"
      - path: [user_id]
        value: "{{ record.get('user', {}).get('id') }}"
      - path: [user_login]
        value: "{{ record.get('user', {}).get('login') }}"
      - path: [user_type]
        value: "{{ record.get('user', {}).get('type') }}"
    - type: RemoveFields
      field_pointers: [[user]]
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: "http://json-schema.org/draft-07/schema#"
        type: object
        additionalProperties: true
        properties:
          starred_at: {type: [string, "null"]}
          repository: {type: [string, "null"]}
          user_id: {type: integer}
          user_login: {type: [string, "null"]}
          user_type: {type: [string, "null"]}

  branches_stream:
    type: DeclarativeStream
    name: branches
    primary_key: [name, repository]
    retriever:
      $ref: "#/definitions/base_repo_retriever"
      requester:
        $ref: "#/definitions/requester"
        path: "/repos/{{ stream_slice.repository }}/branches"
    transformations:
    - type: AddFields
      fields:
      - path: [repository]
        value: "{{ stream_slice.repository }}"
      - path: [commit_sha]
        value: "{{ record.get('commit', {}).get('sha') }}"
    - type: RemoveFields
      field_pointers: [[commit], [protection]]
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: "http://json-schema.org/draft-07/schema#"
        type: object
        additionalProperties: true
        properties:
          name: {type: string}
          repository: {type: string}
          commit_sha: {type: [string, "null"]}
          protected: {type: [boolean, "null"]}

  tags_stream:
    type: DeclarativeStream
    name: tags
    primary_key: [name, repository]
    retriever:
      $ref: "#/definitions/base_repo_retriever"
      requester:
        $ref: "#/definitions/requester"
        path: "/repos/{{ stream_slice.repository }}/tags"
    transformations:
    - type: AddFields
      fields:
      - path: [repository]
        value: "{{ stream_slice.repository }}"
      - path: [commit_sha]
        value: "{{ record.get('commit', {}).get('sha') }}"
    - type: RemoveFields
      field_pointers: [[commit]]
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: "http://json-schema.org/draft-07/schema#"
        type: object
        additionalProperties: true
        properties:
          name: {type: string}
          repository: {type: string}
          commit_sha: {type: [string, "null"]}
          zipball_url: {type: [string, "null"]}
          tarball_url: {type: [string, "null"]}
          node_id: {type: [string, "null"]}

  releases_stream:
    type: DeclarativeStream
    name: releases
    primary_key: [id]
    retriever:
      $ref: "#/definitions/base_repo_retriever"
      requester:
        $ref: "#/definitions/requester"
        path: "/repos/{{ stream_slice.repository }}/releases"
    transformations:
    - type: AddFields
      fields:
      - path: [repository]
        value: "{{ stream_slice.repository }}"
      - path: [author_id]
        value: "{{ record.get('author', {}).get('id') }}"
      - path: [author_login]
        value: "{{ record.get('author', {}).get('login') }}"
    - type: RemoveFields
      field_pointers: [[author], [assets], [reactions]]
    schema:
      $schema: http://json-schema.org/schema#
      type: object
      properties:
        url:
          type:
          - string
          - 'null'
        assets_url:
          type:
          - string
          - 'null'
        upload_url:
          type:
          - string
          - 'null'
        html_url:
          type:
          - string
          - 'null'
        id:
          type: number
        node_id:
          type:
          - string
          - 'null'
        tag_name:
          type:
          - string
          - 'null'
        target_commitish:
          type:
          - string
          - 'null'
        name:
          type:
          - string
          - 'null'
        draft:
          type:
          - boolean
          - 'null'
        immutable:
          type:
          - boolean
          - 'null'
        prerelease:
          type:
          - boolean
          - 'null'
        created_at:
          type:
          - string
          - 'null'
        updated_at:
          type:
          - string
          - 'null'
        published_at:
          type:
          - string
          - 'null'
        tarball_url:
          type:
          - string
          - 'null'
        zipball_url:
          type:
          - string
          - 'null'
        body:
          type:
          - string
          - 'null'
        repository:
          type:
          - string
          - 'null'
        author_id:
          type:
          - number
          - 'null'
        author_login:
          type:
          - string
          - 'null'
      required:
      - id

  workflow_runs_stream:
    type: DeclarativeStream
    name: workflow_runs
    primary_key: [id]
    retriever:
      $ref: "#/definitions/base_repo_retriever"
      requester:
        $ref: "#/definitions/requester"
        path: "/repos/{{ stream_slice.repository }}/actions/runs"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: [workflow_runs]
    incremental_sync:
      $ref: "#/definitions/incremental_sync_workflow_runs"
    transformations:
    - type: AddFields
      fields:
      - path: [repository]
        value: "{{ stream_slice.repository }}"
      - path: [actor_id]
        value: "{{ record.get('actor', {}).get('id') if record.get('actor') else None
          }}"
      - path: [actor_login]
        value: "{{ record.get('actor', {}).get('login') if record.get('actor') else
          None }}"
      - path: [triggering_actor_id]
        value: "{{ record.get('triggering_actor', {}).get('id') if record.get('triggering_actor')
          else None }}"
      - path: [triggering_actor_login]
        value: "{{ record.get('triggering_actor', {}).get('login') if record.get('triggering_actor')
          else None }}"
      - path: [head_commit_message]
        value: "{{ record.get('head_commit', {}).get('message') if record.get('head_commit')
          else None }}"
      - path: [head_commit_timestamp]
        value: "{{ record.get('head_commit', {}).get('timestamp') if record.get('head_commit')
          else None }}"
    - type: RemoveFields
      field_pointers: [[actor], [triggering_actor], [head_commit], [head_repository],
        [repository], [pull_requests]]
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: "http://json-schema.org/draft-07/schema#"
        type: object
        additionalProperties: true
        properties:
          id: {type: integer}
          node_id: {type: [string, "null"]}
          name: {type: [string, "null"]}
          head_branch: {type: [string, "null"]}
          head_sha: {type: [string, "null"]}
          run_number: {type: [integer, "null"]}
          event: {type: [string, "null"]}
          status: {type: [string, "null"]}
          conclusion: {type: [string, "null"]}
          workflow_id: {type: [integer, "null"]}
          created_at: {type: [string, "null"]}
          updated_at: {type: [string, "null"]}
          run_started_at: {type: [string, "null"]}
          run_attempt: {type: [integer, "null"]}
          repository: {type: [string, "null"]}
          actor_id: {type: [integer, "null"]}
          actor_login: {type: [string, "null"]}
          triggering_actor_id: {type: [integer, "null"]}
          triggering_actor_login: {type: [string, "null"]}
          head_commit_message: {type: [string, "null"]}
          head_commit_timestamp: {type: [string, "null"]}
          html_url: {type: [string, "null"]}
          display_title: {type: [string, "null"]}

