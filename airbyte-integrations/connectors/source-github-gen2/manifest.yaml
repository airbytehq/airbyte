        updated_at:
          type: string
        body:
          type:
          - string
          - 'null'
        author_association:
          type:
          - string
          - 'null'
        repository:
          type:
          - string
          - 'null'
        user_id:
          type:
          - number
          - 'null'
        user_login:
          type:
          - string
          - 'null'
        issue_number:
          type:
          - number
          - 'null'
      required:
      - id
      - updated_at

  review_comments_stream:
    type: DeclarativeStream
    name: review_comments
    primary_key: [id]
    retriever:
      $ref: "#/definitions/base_repo_retriever"
      requester:
        $ref: "#/definitions/requester"
        path: "/repos/{{ stream_slice.repository }}/pulls/comments"
        request_parameters:
          sort: updated
          direction: asc
    incremental_sync:
      $ref: "#/definitions/incremental_sync_with_since"
    transformations:
    - type: AddFields
      fields:
      - path: [repository]
        value: "{{ stream_slice.repository }}"
      - path: [user_id]
        value: "{{ record.get('user', {}).get('id') }}"
      - path: [user_login]
        value: "{{ record.get('user', {}).get('login') }}"
      - path: [pull_request_number]
        value: "{{ record.get('pull_request_url', '').split('/')[-1] if record.get('pull_request_url')
          else None }}"
    - type: RemoveFields
      field_pointers: [[user], [_links], [reactions]]
    schema:
