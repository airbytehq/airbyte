        original_commit_id:
          type:
          - string
          - 'null'
        body:
          type:
          - string
          - 'null'
        created_at:
          type:
          - string
          - 'null'
        updated_at:
          type: string
        html_url:
          type:
          - string
          - 'null'
        pull_request_url:
          type:
          - string
