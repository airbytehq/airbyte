version: "6.1.0"
type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
  - repositories

definitions:
  selector:
    type: RecordSelector
    extractor:
      type: DpathExtractor
      field_path: []

  requester:
    type: HttpRequester
    url_base: "https://{{ config.get('api_url', 'api.github.com') }}"
    http_method: GET
    authenticator:
      type: BearerAuthenticator
      api_token: "{{ config['access_token'] }}"
    request_headers:
      Accept: "application/vnd.github+json"
      X-GitHub-Api-Version: "2022-11-28"

  paginator:
    type: DefaultPaginator
    pagination_strategy:
      type: PageIncrement
      page_size: 100
      start_from_page: 1
    page_size_option:
      type: RequestOption
      field_name: per_page
      inject_into: request_parameter
    page_token_option:
      type: RequestOption
      field_name: page
      inject_into: request_parameter

  repository_partition_router:
    type: ListPartitionRouter
    cursor_field: repository
    values: "{{ config['repositories'] }}"

  base_repo_retriever:
    type: SimpleRetriever
    record_selector:
      $ref: "#/definitions/selector"
    requester:
      $ref: "#/definitions/requester"
    paginator:
      $ref: "#/definitions/paginator"
    partition_router:
      $ref: "#/definitions/repository_partition_router"

  incremental_sync_with_since:
    type: DatetimeBasedCursor
    cursor_field: updated_at
    cursor_datetime_formats: ["%Y-%m-%dT%H:%M:%SZ"]
    datetime_format: "%Y-%m-%dT%H:%M:%SZ"
    start_datetime: "{{ config.get('start_date', '2010-01-01T00:00:00Z') }}"
    start_time_option:
      type: RequestOption
      field_name: since
      inject_into: request_parameter

  incremental_sync_commits:
    type: DatetimeBasedCursor
    cursor_field: commit_committer_date
    cursor_datetime_formats: ["%Y-%m-%dT%H:%M:%SZ"]
    datetime_format: "%Y-%m-%dT%H:%M:%SZ"
    start_datetime: "{{ config.get('start_date', '2010-01-01T00:00:00Z') }}"
    start_time_option:
      type: RequestOption
      field_name: since
      inject_into: request_parameter

  incremental_sync_workflow_runs:
    type: DatetimeBasedCursor
    cursor_field: updated_at
    cursor_datetime_formats: ["%Y-%m-%dT%H:%M:%SZ"]
    datetime_format: "%Y-%m-%dT%H:%M:%SZ"
    start_datetime: "{{ config.get('start_date', '2010-01-01T00:00:00Z') }}"
    start_time_option:
      type: RequestOption
      field_name: created
      inject_into: request_parameter

  repositories_stream:
    type: DeclarativeStream
    name: repositories
    primary_key: [id]
    retriever:
      type: SimpleRetriever
      record_selector:
        $ref: "#/definitions/selector"
      requester:
        $ref: "#/definitions/requester"
        path: "/repos/{{ stream_slice.repository }}"
      paginator:
        type: NoPagination
      partition_router:
        $ref: "#/definitions/repository_partition_router"
    transformations:
    - type: AddFields
      fields:
      - path: [owner_id]
        value: "{{ record.get('owner', {}).get('id') }}"
      - path: [owner_login]
        value: "{{ record.get('owner', {}).get('login') }}"
      - path: [owner_type]
        value: "{{ record.get('owner', {}).get('type') }}"
      - path: [license_key]
        value: "{{ record.get('license', {}).get('key') if record.get('license') else
          None }}"
      - path: [license_name]
        value: "{{ record.get('license', {}).get('name') if record.get('license')
          else None }}"
      - path: [organization_id]
        value: "{{ record.get('organization', {}).get('id') if record.get('organization')
          else None }}"
      - path: [organization_login]
        value: "{{ record.get('organization', {}).get('login') if record.get('organization')
          else None }}"
    - type: RemoveFields
      field_pointers: [[owner], [license], [organization], [permissions]]
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: "http://json-schema.org/draft-07/schema#"
        type: object
        additionalProperties: true
        properties:
          id: {type: integer}
          node_id: {type: [string, "null"]}
          name: {type: [string, "null"]}
          full_name: {type: [string, "null"]}
          private: {type: [boolean, "null"]}
          owner_id: {type: [integer, "null"]}
          owner_login: {type: [string, "null"]}
          owner_type: {type: [string, "null"]}
          description: {type: [string, "null"]}
          fork: {type: [boolean, "null"]}
          created_at: {type: [string, "null"]}
          updated_at: {type: [string, "null"]}
          pushed_at: {type: [string, "null"]}
          homepage: {type: [string, "null"]}
          size: {type: [integer, "null"]}
          stargazers_count: {type: [integer, "null"]}
          watchers_count: {type: [integer, "null"]}
          language: {type: [string, "null"]}
          forks_count: {type: [integer, "null"]}
          open_issues_count: {type: [integer, "null"]}
          default_branch: {type: [string, "null"]}
          archived: {type: [boolean, "null"]}
          disabled: {type: [boolean, "null"]}
          visibility: {type: [string, "null"]}
          license_key: {type: [string, "null"]}
          license_name: {type: [string, "null"]}
          topics: {type: [array, "null"], items: {type: string}}
          organization_id: {type: [integer, "null"]}
          organization_login: {type: [string, "null"]}

  pull_requests_stream:
    type: DeclarativeStream
    name: pull_requests
    primary_key: [id]
    retriever:
      $ref: "#/definitions/base_repo_retriever"
      requester:
        $ref: "#/definitions/requester"
        path: "/repos/{{ stream_slice.repository }}/pulls"
        request_parameters:
          state: all
          sort: updated
          direction: desc
    incremental_sync:
      $ref: "#/definitions/incremental_sync_with_since"
    transformations:
    - type: AddFields
      fields:
      - path: [repository]
        value: "{{ stream_slice.repository }}"
      - path: [user_id]
        value: "{{ record.get('user', {}).get('id') }}"
      - path: [user_login]
        value: "{{ record.get('user', {}).get('login') }}"
      - path: [head_ref]
        value: "{{ record.get('head', {}).get('ref') }}"
      - path: [head_sha]
        value: "{{ record.get('head', {}).get('sha') }}"
      - path: [head_repo_id]
        value: "{{ record.get('head', {}).get('repo', {}).get('id') if record.get('head',
          {}).get('repo') else None }}"
      - path: [head_repo_full_name]
        value: "{{ record.get('head', {}).get('repo', {}).get('full_name') if record.get('head',
          {}).get('repo') else None }}"
      - path: [base_ref]
        value: "{{ record.get('base', {}).get('ref') }}"
      - path: [base_sha]
        value: "{{ record.get('base', {}).get('sha') }}"
      - path: [base_repo_id]
        value: "{{ record.get('base', {}).get('repo', {}).get('id') if record.get('base',
          {}).get('repo') else None }}"
      - path: [base_repo_full_name]
        value: "{{ record.get('base', {}).get('repo', {}).get('full_name') if record.get('base',
          {}).get('repo') else None }}"
      - path: [milestone_id]
        value: "{{ record.get('milestone', {}).get('id') if record.get('milestone')
          else None }}"
      - path: [milestone_number]
        value: "{{ record.get('milestone', {}).get('number') if record.get('milestone')
          else None }}"
      - path: [milestone_title]
        value: "{{ record.get('milestone', {}).get('title') if record.get('milestone')
          else None }}"
      - path: [assignee_id]
        value: "{{ record.get('assignee', {}).get('id') if record.get('assignee')
          else None }}"
      - path: [assignee_ids]
        value: "{{ record.get('assignees', []) | map(attribute='id') | list }}"
      - path: [requested_reviewer_ids]
        value: "{{ record.get('requested_reviewers', []) | map(attribute='id') | list
          }}"
      - path: [label_names]
        value: "{{ record.get('labels', []) | map(attribute='name') | list }}"
      - path: [merged_by_id]
        value: "{{ record.get('merged_by', {}).get('id') if record.get('merged_by')
          else None }}"
      - path: [_review_key]
        value: "{{ stream_slice.repository }}::{{ record['number'] }}"
    - type: RemoveFields
      field_pointers: [[user], [head], [base], [milestone], [assignee], [assignees],
        [requested_reviewers], [requested_teams], [labels], [merged_by], [_links],
        [auto_merge]]
    schema:
      $schema: http://json-schema.org/schema#
      type: object
      properties:
        url:
          type:
          - string
          - 'null'
        id:
          type: number
        node_id:
          type:
          - string
          - 'null'
        html_url:
          type:
          - string
          - 'null'
        diff_url:
          type:
          - string
          - 'null'
        patch_url:
          type:
          - string
          - 'null'
        issue_url:
          type:
          - string
          - 'null'
        number:
          type:
          - number
          - 'null'
        state:
          type:
          - string
          - 'null'
        locked:
          type:
          - boolean
          - 'null'
        title:
          type:
          - string
          - 'null'
        body:
          type:
          - string
          - 'null'
        created_at:
          type:
          - string
          - 'null'
        updated_at:
          type: string
        closed_at:
          type:
          - string
          - 'null'
        merged_at:
          type:
          - string
          - 'null'
        merge_commit_sha:
          type:
          - string
          - 'null'
        draft:
          type:
          - boolean
          - 'null'
        commits_url:
          type:
          - string
          - 'null'
        review_comments_url:
          type:
          - string
          - 'null'
        review_comment_url:
          type:
          - string
          - 'null'
        comments_url:
          type:
          - string
          - 'null'
        statuses_url:
          type:
          - string
          - 'null'
        author_association:
          type:
          - string
          - 'null'
        repository:
          type:
          - string
          - 'null'
        user_id:
          type:
          - number
          - 'null'
        user_login:
          type:
          - string
          - 'null'
        head_ref:
          type:
          - string
          - 'null'
        head_sha:
          type:
          - string
          - 'null'
        head_repo_id:
          type:
          - number
          - 'null'
        head_repo_full_name:
          type:
          - string
          - 'null'
        base_ref:
          type:
          - string
          - 'null'
        base_sha:
          type:
          - string
          - 'null'
        base_repo_id:
          type:
          - number
          - 'null'
        base_repo_full_name:
          type:
          - string
          - 'null'
        assignee_id:
          type:
          - number
          - 'null'
        assignee_ids:
          type:
          - array
          - 'null'
          items:
            type:
            - number
            - 'null'
        requested_reviewer_ids:
          type:
          - array
          - 'null'
          items:
            type:
            - number
            - 'null'
        label_names:
          type:
          - array
          - 'null'
          items:
            type:
            - string
            - 'null'
      required:
      - id
      - updated_at

  issues_stream:
    type: DeclarativeStream
    name: issues
    primary_key: [id]
    retriever:
      $ref: "#/definitions/base_repo_retriever"
      requester:
