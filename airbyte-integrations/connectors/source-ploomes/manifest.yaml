    - tags
    - task_email_reminders

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: ApiKeyAuthenticator
        header: User-Key
        api_token: "{{ config['api_key'] }}"
      request_parameters:
        $expand: OtherProperties
        $filter: LastUpdateDate gt {{ stream_interval['start_time'] }}
        $orderby: LastUpdateDate asc
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: $top
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: $skip
          inject_into: request_parameter
        pagination_strategy:
          type: OffsetIncrement
          page_size: 300

