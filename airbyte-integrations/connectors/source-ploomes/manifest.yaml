version: 7.10.0

type: DeclarativeSource

description: Connector to the Brazilian CRM Ploomes

check:
  type: CheckStream
  stream_names:
    - contacts
    - deals
    - quotes
    - tasks
    - fields
    - fields_options_tables
    - fields_options_tables_options
