  page_stream:
    $ref: "#/definitions/base_stream"
    $parameters:
      name: "page"
      primary_key: "id"
      path: "/{{ config['page_id'] }}"
    retriever:
      $ref: "#/definitions/retriever"
      record_selector:
        extractor:
          field_path: []
      requester:
        $ref: "#/definitions/requester"
        request_parameters:
          fields: "#/definitions/page_query_properties"

  post_stream:
    $ref: "#/definitions/base_stream"
    $parameters:
      name: "post"
      primary_key: "id"
      path: "/{{ config['page_id'] }}/posts"
    retriever:
      $ref: "#/definitions/retriever"
      paginator:
        $ref: "#/definitions/facebook_post_paginator"
      requester:
        $ref: "#/definitions/requester"
        request_parameters:
          fields: "#/definitions/post_query_properties"

  post_insights_stream:
    $ref: "#/definitions/base_stream"
    $parameters:
      name: "post_insights"
      primary_key: "id"
      path: "/{{ config['page_id'] }}/posts"
    retriever:
      $ref: "#/definitions/retriever"
      paginator:
        $ref: "#/definitions/facebook_post_paginator"
      record_selector:
        type: RecordSelector
        extractor:
          field_path: ["data", "*", "insights", "data", "*"]
      requester:
        $ref: "#/definitions/requester"
        request_parameters:
          fields: |
            {{ 
              'insights.metric(%s)' % ','.join([
              'post_media_view',
              'post_impressions_unique',
              'post_impressions_paid_unique',
              'post_impressions_fan_unique',
              'post_impressions_organic_unique',
              'post_impressions_viral_unique',
              'post_impressions_nonviral_unique',
              'post_clicks',
              'post_clicks_by_type',
              'post_reactions_by_type_total',
              ])
            }}

  page_insights_stream:
    $ref: "#/definitions/base_stream"
    $parameters:
      name: "page_insights"
      primary_key: "id"
      path: "/{{ config['page_id'] }}/insights"
    retriever:
      $ref: "#/definitions/retriever"
      requester:
        $ref: "#/definitions/requester"
        request_parameters:
          metric: |
            {{
              ','.join([
              'page_total_actions',
              'page_post_engagements',
              'page_fan_adds_by_paid_non_paid_unique',
              'page_media_view',
              'page_impressions_unique',
              'page_impressions_paid_unique',
              'page_impressions_viral_unique',
              'page_impressions_nonviral_unique',
              ])
            }}
streams:
  - "#/definitions/page_stream"
  - "#/definitions/post_stream"
  - "#/definitions/post_insights_stream"
  - "#/definitions/page_insights_stream"

check:
  stream_names:
    - "post"
