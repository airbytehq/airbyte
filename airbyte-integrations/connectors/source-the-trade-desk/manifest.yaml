        additionalProperties: true
        properties:
          CampaignId:
            type: string
          CampaignName:
            type:
              - string
              - "null"
          AdvertiserId:
            type:
              - string
              - "null"
          Description:
            type:
              - string
              - "null"
          Budget:
            type:
              - object
              - "null"
          StartDate:
            type:
              - string
              - "null"
          EndDate:
            type:
              - string
              - "null"
          CampaignConversionReportingColumns:
