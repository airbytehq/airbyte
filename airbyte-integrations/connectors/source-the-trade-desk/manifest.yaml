version: "6.44.0"
type: DeclarativeSource

definitions:
  # Session Token Authenticator: POST /authentication with Login+Password
  # Returns token used in TTD-Auth header for all subsequent requests
  authenticator:
    type: SessionTokenAuthenticator
    login_requester:
      type: HttpRequester
      url_base: "{{ 'https://ext-api.sb.thetradedesk.com/v3' if config.get('environment', 'production') == 'sandbox' else 'https://api.thetradedesk.com/v3' }}"
      path: /authentication
      http_method: POST
      authenticator:
        type: NoAuth
      request_headers: {}
      request_body_json:
        Login: "{{ config['login'] }}"
        Password: "{{ config['password'] }}"
    session_token_path:
      - Token
    expiration_duration: PT20M
    request_authentication:
      type: ApiKey
      inject_into:
        type: RequestOption
        inject_into: header
        field_name: TTD-Auth

  # Base requester shared across all streams
  base_requester:
    type: HttpRequester
    url_base: "{{ 'https://ext-api.sb.thetradedesk.com/v3' if config.get('environment', 'production') == 'sandbox' else 'https://api.thetradedesk.com/v3' }}"
    http_method: POST
    authenticator:
      $ref: "#/definitions/authenticator"
    request_headers:
      Content-Type: application/json

  # Offset-based paginator using PageStartIndex/PageSize in request body
  offset_paginator:
    type: DefaultPaginator
    page_size_option:
      type: RequestOption
      inject_into: body_json
      field_name: PageSize
    page_token_option:
      type: RequestOption
      inject_into: body_json
      field_name: PageStartIndex
    pagination_strategy:
      type: OffsetIncrement
      page_size: 100
      inject_on_first_request: true

  # ==================== STREAMS ====================

  advertisers_stream:
    type: DeclarativeStream
    name: advertisers
    primary_key:
      - AdvertiserId
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: /advertiser/query/partner
        request_body_json:
          PartnerId: "{{ config['partner_id'] }}"
          PageStartIndex: "{{ next_page_token.get('next_page_token', 0) if next_page_token else 0 }}"
          PageSize: 100
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - Result
      paginator:
        $ref: "#/definitions/offset_paginator"
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        additionalProperties: true
        properties:
          AdvertiserId:
            type: string
          AdvertiserName:
            type:
              - string
              - "null"
          PartnerId:
            type:
              - string
              - "null"
          Description:
            type:
              - string
              - "null"
          CurrencyCode:
            type:
              - string
              - "null"
          IndustryCategoryId:
            type:
              - integer
              - "null"
          DomainAddress:
            type:
              - string
              - "null"
          CreatedAtUtc:
            type:
              - string
              - "null"
          UpdatedAtUtc:
            type:
              - string
              - "null"

  campaigns_stream:
    type: DeclarativeStream
    name: campaigns
    primary_key:
      - CampaignId
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: /campaign/query/advertiser
        request_body_json:
          AdvertiserId: "{{ stream_slice.advertiser_id }}"
          PageStartIndex: "{{ next_page_token.get('next_page_token', 0) if next_page_token else 0 }}"
          PageSize: 100
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - Result
      paginator:
        $ref: "#/definitions/offset_paginator"
      partition_router:
        type: SubstreamPartitionRouter
        parent_stream_configs:
          - type: ParentStreamConfig
            stream:
              $ref: "#/definitions/advertisers_stream"
            parent_key: AdvertiserId
            partition_field: advertiser_id
    transformations:
      - type: AddFields
        fields:
          - path:
              - _partition_advertiser_id
            value: "{{ stream_slice.advertiser_id }}"
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
