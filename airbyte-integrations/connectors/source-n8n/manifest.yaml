version: 7.0.4

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - executions

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: ApiKeyAuthenticator
        header: X-N8N-API-KEY
        api_token: "{{ config['api_key'] }}"
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: limit
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: cursor
          inject_into: request_parameter
        pagination_strategy:
          type: CursorPagination
          page_size: 250
          cursor_value: "{{ response.get(\"nextCursor\", {}) }}"
          stop_condition: "{{ not response.get(\"nextCursor\", {}) }}"
    DeclarativeStream:
      transformations:
        - type: AddFields
          fields:
            - type: AddedFieldDefinition
              path:
                - table_id
              value: "{{ stream_slice.table_id }}"
              value_type: string

streams:
  - type: DeclarativeStream
    name: executions
    retriever:
      type: SimpleRetriever
      paginator:
        $ref: "#/definitions/linked/SimpleRetriever/paginator"
      requester:
        type: HttpRequester
        url: "{{ config['host'] }}/api/v1/executions"
        http_method: GET
        authenticator:
          $ref: "#/definitions/linked/HttpRequester/authenticator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
    primary_key:
      - id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        required:
          - id
          - startedAt
        properties:
          id:
            type: string
          mode:
            type:
              - string
              - "null"
          status:
            type:
              - string
              - "null"
          finished:
            type:
              - boolean
              - "null"
          startedAt:
            type: string
          stoppedAt:
            type:
              - string
              - "null"
          workflowId:
            type:
              - string
              - "null"
        additionalProperties: true
    incremental_sync:
      type: DatetimeBasedCursor
      cursor_field: startedAt
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"
      datetime_format: "%Y-%m-%dT%H:%M:%SZ"
      cursor_datetime_formats:
        - "%Y-%m-%dT%H:%M:%S.%fZ"
  - type: DeclarativeStream
    name: users
    retriever:
      type: SimpleRetriever
      paginator:
        $ref: "#/definitions/linked/SimpleRetriever/paginator"
      requester:
        type: HttpRequester
        url: "{{ config['host'] }}/api/v1/users"
        http_method: GET
        authenticator:
          $ref: "#/definitions/linked/HttpRequester/authenticator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
    primary_key:
      - id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        required:
          - id
          - updatedAt
        properties:
          id:
            type: string
          email:
            type:
              - string
              - "null"
          lastName:
            type:
              - string
              - "null"
          createdAt:
            type:
              - string
              - "null"
          firstName:
            type:
              - string
              - "null"
          isPending:
            type:
              - boolean
              - "null"
          updatedAt:
            type: string
        additionalProperties: true
    incremental_sync:
      type: DatetimeBasedCursor
      cursor_field: updatedAt
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"
