version: 7.17.1

type: DeclarativeSource

description: >-
  Designed for organizations on the Claude Platform, this API provides
  programmatic access to daily aggregated usage metrics.

check:
  type: CheckStream
  stream_names:
    - summaries

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: ApiKeyAuthenticator
        api_token: "{{ config['api_key'] }}"
        inject_into:
          type: RequestOption
          field_name: x-api-key
          inject_into: header
      error_handler:
        type: DefaultErrorHandler
        max_retries: 3
        response_filters:
          - type: HttpResponseFilter
            action: RETRY
            http_codes:
              - 401
              - 429
              - 500
              - 502
              - 503
              - 504
        backoff_strategies:
          - type: ConstantBackoffStrategy
            backoff_time_in_seconds: 10
      request_headers:
        accept: application/json
        anthropic-version: "2023-06-01"
    CursorPaginator:
      type: DefaultPaginator
      page_size_option:
        type: RequestOption
        field_name: limit
        inject_into: request_parameter
      page_token_option:
        type: RequestOption
        field_name: page
        inject_into: request_parameter
      pagination_strategy:
        type: CursorPagination
        page_size: 1000
        cursor_value: "{{ response.get('next_page') }}"
        stop_condition: "{{ not response.get('next_page') }}"
    AnalyticsEndDatetime:
      type: MinMaxDatetime
      datetime: >-
        {{ config.get('end_date') or (today_utc() -
        duration('P3D')).strftime('%Y-%m-%d') }}
      max_datetime: "{{ (today_utc() - duration('P3D')).strftime('%Y-%m-%d') }}"
      min_datetime: "2026-01-01"
      datetime_format: "%Y-%m-%d"
      max_datetime_format: "%Y-%m-%d"
      min_datetime_format: "%Y-%m-%d"
    DailyBucketPaginator:
      type: DefaultPaginator
      page_size_option:
        type: RequestOption
        field_name: limit
        inject_into: request_parameter
      page_token_option:
        type: RequestOption
        field_name: page
        inject_into: request_parameter
      pagination_strategy:
        type: CursorPagination
        page_size: 31
        cursor_value: "{{ response.get('next_page') }}"
        stop_condition: "{{ not response.get('next_page') }}"
    AnalyticsStartDatetime:
      type: MinMaxDatetime
      datetime: >-
        {{ config.get('start_date') or (today_utc() -
        duration('P7D')).strftime('%Y-%m-%d') }}
      max_datetime: "{{ (today_utc() - duration('P3D')).strftime('%Y-%m-%d') }}"
      min_datetime: "2026-01-01"
      datetime_format: "%Y-%m-%d"
      max_datetime_format: "%Y-%m-%d"
      min_datetime_format: "%Y-%m-%d"
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: limit
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: page
          inject_into: request_parameter
        pagination_strategy:
          type: CursorPagination
          page_size: 1000
          cursor_value: "{{ response.get('next_page') }}"
          stop_condition: "{{ not response.get('next_page') }}"

streams:
  - type: DeclarativeStream
    name: users
    retriever:
      type: SimpleRetriever
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: limit
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: page
          inject_into: request_parameter
        pagination_strategy:
          type: CursorPagination
          page_size: 1000
          cursor_value: "{{ response.get('next_page') }}"
          stop_condition: "{{ not response.get('next_page') }}"
      requester:
        type: HttpRequester
        url: https://api.anthropic.com/v1/organizations/analytics/users
        http_method: GET
        authenticator:
          type: ApiKeyAuthenticator
          api_token: "{{ config['api_key'] }}"
          inject_into:
            type: RequestOption
            field_name: x-api-key
            inject_into: header
        error_handler:
          type: DefaultErrorHandler
          max_retries: 3
          response_filters:
            - type: HttpResponseFilter
              action: RETRY
              http_codes:
                - 401
                - 429
                - 500
                - 502
                - 503
                - 504
              error_message_contains: ""
          backoff_strategies:
            - type: ConstantBackoffStrategy
              backoff_time_in_seconds: 10
        request_headers:
          accept: application/json
          anthropic-version: "2023-06-01"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
    primary_key:
      - user_id
      - date
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/draft-07/schema#
        required:
          - user_id
          - date
        properties:
          date:
            type: string
          user:
            type:
              - object
              - "null"
            additionalProperties: true
          user_id:
            type: string
          chat_metrics:
            type:
              - object
              - "null"
            additionalProperties: true
          cowork_metrics:
            type:
              - object
              - "null"
            additionalProperties: true
          design_metrics:
            type:
              - object
              - "null"
            additionalProperties: true
          office_metrics:
            type:
              - object
              - "null"
            additionalProperties: true
          web_search_count:
            type:
              - number
              - "null"
          claude_code_metrics:
            type:
              - object
              - "null"
            additionalProperties: true
        additionalProperties: true
    transformations:
      - type: AddFields
        fields:
          - type: AddedFieldDefinition
            path:
              - user_id
            value: "{{ record.get('user', {}).get('id') }}"
            value_type: string
          - type: AddedFieldDefinition
            path:
              - date
            value: "{{ stream_interval.start_time }}"
            value_type: string
    incremental_sync:
      type: DatetimeBasedCursor
      step: P1D
      cursor_field: date
      end_datetime:
        type: MinMaxDatetime
        datetime: >-
          {{ config.get('end_date') or (today_utc() -
          duration('P3D')).strftime('%Y-%m-%d') }}
        max_datetime: "{{ (today_utc() - duration('P3D')).strftime('%Y-%m-%d') }}"
        min_datetime: "2026-01-01"
        datetime_format: "%Y-%m-%d"
        max_datetime_format: "%Y-%m-%d"
        min_datetime_format: "%Y-%m-%d"
      start_datetime:
        type: MinMaxDatetime
        datetime: >-
          {{ config.get('start_date') or (today_utc() -
          duration('P7D')).strftime('%Y-%m-%d') }}
        max_datetime: "{{ (today_utc() - duration('P3D')).strftime('%Y-%m-%d') }}"
        min_datetime: "2026-01-01"
        datetime_format: "%Y-%m-%d"
        max_datetime_format: "%Y-%m-%d"
        min_datetime_format: "%Y-%m-%d"
      datetime_format: "%Y-%m-%d"
      start_time_option:
        type: RequestOption
        field_name: date
        inject_into: request_parameter
      cursor_granularity: P1D
      cursor_datetime_formats:
        - "%Y-%m-%d"
      partition_field_end: ""
      partition_field_start: ""
