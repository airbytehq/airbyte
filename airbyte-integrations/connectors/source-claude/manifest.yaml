spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - api_key
    properties:
      api_key:
        type: string
        description: Claude organization-level Analytics API key (read:analytics scope)
        order: 2
        title: API Key
        airbyte_secret: true
      end_date:
        type: string
        description: >-
          Optional end date override in YYYY-MM-DD format (capped at 3 days ago
          UTC for engagement streams; cost/usage default to today UTC)
        order: 1
        title: End Date
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
      start_date:
        type: string
        description: Start date for data extraction in YYYY-MM-DD format
        order: 0
        title: Start Date
        default: "2026-01-01"
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
    additionalProperties: true

