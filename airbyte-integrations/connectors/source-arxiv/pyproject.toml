[build-system]
requires = [ "poetry-core>=1.0.0",]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
version = "0.1.0"
name = "source-arxiv"
description = "Source implementation for arXiv."
authors = [ "Airbyte <contact@airbyte.io>",]
license = "ELv2"
readme = "README.md"
documentation = "https://docs.airbyte.com/integrations/sources/arxiv"
homepage = "https://airbyte.com"
repository = "https://github.com/airbytehq/airbyte"
[[tool.poetry.packages]]
include = "source_arxiv"

[tool.poetry.dependencies]
python = "^3.10,<3.14"
airbyte-cdk = "^7.12.0"
feedparser = "^6.0.11"

[tool.poetry.scripts]
source-arxiv = "source_arxiv.run:run"

[tool.poetry.group.dev.dependencies]
freezegun = "^1.2"
pytest = "^8.0.0"
pytest-cov = "^5.0.0"
pytest-mock = "^3.6.1"
responses = "^0.23.1"

[tool.poe]
include = [
    "${POE_GIT_DIR}/poe-tasks/poetry-connector-tasks.toml",
]
