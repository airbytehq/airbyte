version: 6.0.0

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - teams

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: BearerAuthenticator
        api_token: "{{ config['access_token'] }}"
      error_handler:
        type: CompositeErrorHandler
        error_handlers:
          - type: DefaultErrorHandler
            max_retries: 5
            response_filters:
              - type: HttpResponseFilter
                action: IGNORE
                http_codes:
                  - 404
                  - 403
                  - 409
              - type: HttpResponseFilter
                action: RETRY
                http_codes:
                  - 429
                  - 502
                  - 503
                  - 504
            backoff_strategies:
              - type: WaitTimeFromHeader
                regex: ([0-9]+)
                header: X-RateLimit-Reset
                min_wait: 1
              - type: ConstantBackoffStrategy
                backoff_time_in_seconds: 5
      request_parameters:
        state: all
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: per_page
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: page
          inject_into: request_parameter
        pagination_strategy:
          type: PageIncrement
          page_size: 100
          start_from_page: 1
          inject_on_first_request: true

streams:
