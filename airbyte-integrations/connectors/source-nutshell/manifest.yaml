version: 7.17.1

type: DeclarativeSource

description: >-
  Nutshell is a CRM tool.

  Using this connector we can extract data from various streams such as contacts
  , events , products and pipelines.

  Docs : https://developers.nutshell.com/docs/getting-started

check:
  type: CheckStream
  stream_names:
    - accounts

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: BasicHttpAuthenticator
        password: "{{ config[\"password\"] }}"
        username: "{{ config[\"username\"] }}"
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: page[limit]
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: page[page]
          inject_into: request_parameter
        pagination_strategy:
          type: PageIncrement
          page_size: 500
          start_from_page: 0
          inject_on_first_request: true

