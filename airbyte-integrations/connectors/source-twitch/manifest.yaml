spec:
  type: Spec
  advanced_auth:
    auth_flow_type: oauth2.0
    oauth_config_specification:
      complete_oauth_output_specification:
        required:
        - refresh_token
        properties:
          refresh_token:
            type: string
            path_in_connector_config:
            - client_refresh_token
      oauth_connector_input_specification:
        consent_url: https://id.twitch.tv/oauth2/authorize?{{client_id_param}}&{{redirect_uri_param}}&{{state_param}}&response_type=code&scope=
        extract_output:
        - access_token
        - refresh_token
        access_token_url: https://id.twitch.tv/oauth2/token
        access_token_headers:
          Content-Type: application/x-www-form-urlencoded
        access_token_params:
          client_id: '{{ client_id_value }}'
          client_secret: '{{ client_secret_value }}'
          code: '{{ auth_code_value }}'
          grant_type: authorization_code
          redirect_uri: '{{ redirect_uri_value }}'
      complete_oauth_server_input_specification:
        required:
        - client_id
        - client_secret
        properties:
          client_id:
            type: string
          client_secret:
            type: string
      complete_oauth_server_output_specification:
        required:
        - client_id
        - client_secret
        properties:
          client_id:
            type: string
            path_in_connector_config:
            - client_id
          client_secret:
            type: string
            path_in_connector_config:
            - client_secret
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
    - client_id
    - client_secret
    - login
    properties:
      login:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          minLength: 1
        order: 3
        title: Twitch Username(s)
        description: Enter a list of twitch usernames you want to sync data for. Note,
          some streams require the streamer to authenticate, see troubleshooting and
          limitations for details.
      client_id:
        type: string
        order: 0
        title: Client ID
        airbyte_secret: true
      start_date:
        type: string
        order: 4
        title: Start Date
        format: date-time
        default: '2011-01-01T00:00:00Z'
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$
        description: The start date to sync data from
      client_secret:
        type: string
        order: 1
        title: Client secret
        airbyte_secret: true
      custom_reports:
        type: object
        order: 6
        title: Custom Reports
        properties:
          clips:
            type: array
            items:
              type: object
              required:
              - name
              - game_name
              properties:
                name:
                  type: string
                  title: Report Name
                  minLength: 1
                  description: Used to generate the stream name as custom_clips_<snake_case(name)>.
                game_name:
                  type: string
                  title: Game Name
                  minLength: 1
                  description: Exact Twitch category name to look up the game ID.
                is_featured:
                  type: boolean
                  title: Featured Clips Only
                  description: When set, filters the report to featured or non-featured
                    clips.
              additionalProperties: false
            title: Custom Clip Reports
            description: Create custom clip streams filtered by an exact Twitch category
              name match.
          videos:
            type: array
            items:
              type: object
              required:
              - name
              - game_name
              properties:
                name:
                  type: string
                  title: Report Name
                  minLength: 1
                  description: Used to generate the stream name as custom_videos_<snake_case(name)>.
                sort:
                  enum:
                  - time
                  - trending
                  - views
                  type: string
                  title: Sort
                type:
                  enum:
                  - all
                  - archive
                  - highlight
                  - upload
                  type: string
                  title: Video Type
                period:
                  enum:
                  - all
                  - day
                  - month
                  - week
                  type: string
                  title: Period
                language:
                  type: string
                  title: Language
                  minLength: 1
                game_name:
                  type: string
                  title: Game Name
                  minLength: 1
                  description: Exact Twitch category name to look up the game ID.
              additionalProperties: false
            title: Custom Video Reports
            description: Create custom video streams filtered by an exact Twitch category
              name match.
        description: Configure custom clip and video streams that resolve a game name
          to Twitch's category ID before reading records.
        additionalProperties: false
      client_refresh_token:
        type: string
        order: 2
        title: Refresh token
        airbyte_hidden: true
        airbyte_secret: true
    additionalProperties: true
  config_normalization_rules:
    type: ConfigNormalizationRules
    validations:
    - type: DpathValidator
      field_path:
      - login
      validation_strategy:
        type: ValidateAdheresToSchema
        base_schema:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            minLength: 1
    - type: DpathValidator
      field_path:
      - custom_reports
      validation_strategy:
        type: ValidateAdheresToSchema
        base_schema:
          type: object
          properties:
            clips:
              type: array
              items:
                type: object
                required:
                - name
                - game_name
                properties:
                  name:
                    type: string
                    minLength: 1
                  game_name:
                    type: string
                    minLength: 1
                  is_featured:
                    type: boolean
                additionalProperties: false
            videos:
              type: array
              items:
                type: object
                required:
                - name
                - game_name
                properties:
                  name:
                    type: string
                    minLength: 1
                  sort:
                    enum:
                    - time
                    - trending
                    - views
                    type: string
                  type:
                    enum:
                    - all
                    - archive
                    - highlight
                    - upload
                    type: string
                  period:
                    enum:
                    - all
                    - day
                    - month
                    - week
                    type: string
                  language:
                    type: string
                    minLength: 1
                  game_name:
                    type: string
                    minLength: 1
                additionalProperties: false
          additionalProperties: false
