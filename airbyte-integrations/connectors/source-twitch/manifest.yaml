definitions:
  linked:
    HttpRequester:
      authenticator:
        type: OAuthAuthenticator
        scopes: []
        client_id: '{{ config["client_id"] }}'
        grant_type: refresh_token
        client_secret: '{{ config["client_secret"] }}'
        refresh_token: '{{ config["client_refresh_token"] }}'
        refresh_token_updater:
          refresh_token_name: refresh_token
          refresh_token_config_path:
          - client_refresh_token
        token_refresh_endpoint: https://id.twitch.tv/oauth2/token
      error_handler:
        type: DefaultErrorHandler
        max_retries: 5
      request_headers:
        Client-Id: '{{ config[''client_id''] }}'
      request_parameters:
        login: '{{ stream_partition[''username''] }}'
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: first
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: after
          inject_into: request_parameter
        pagination_strategy:
          type: CursorPagination
          page_size: 100
          cursor_value: '{{ response.get("pagination", {}).get("cursor", {}) }}'
          stop_condition: '{{ not response.get("pagination", {}).get("cursor", {})
            }}'
  custom_category_lookup_stream:
    name: game_id_resolver
    type: DeclarativeStream
    retriever:
      type: SimpleRetriever
      decoder:
        type: JsonDecoder
      paginator:
        type: NoPagination
      requester:
        url: https://api.twitch.tv/helix/games
        type: HttpRequester
        http_method: GET
        authenticator:
          $ref: '#/definitions/linked/HttpRequester/authenticator'
        error_handler:
          $ref: '#/definitions/linked/HttpRequester/error_handler'
        request_headers:
          $ref: '#/definitions/linked/HttpRequester/request_headers'
        request_parameters:
          name: '{{ parameters["game_name"] }}'
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
          - data
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        properties:
          id:
            type: string
          name:
            type: string
