data:
  ab_internal:
    ql: 200
    sl: 100
  allowedHosts:
    hosts:
      - ${host}
      - ${tunnel_method.tunnel_host}
  connectorSubtype: database
  connectorType: source
  definitionId: b5ea17b1-f170-46dc-bc31-cc744ca984c1
  dockerImageTag: 5.0.0
  dockerRepository: airbyte/source-mssql
  documentationUrl: https://docs.airbyte.com/integrations/sources/mssql
  githubIssueLabel: source-mssql
  icon: icon.svg
  license: ELv2
  maxSecondsBetweenMessages: 7200
  name: Microsoft SQL Server (MSSQL)
  connectorBuildOptions:
    baseImage: docker.io/airbyte/java-connector-base:2.0.1@sha256:ec89bd1a89e825514dd2fc8730ba299a3ae1544580a078df0e35c5202c2085b3
  connectorIPCOptions:
    dataChannel:
      version: "0.0.2"
      supportedSerialization: ["JSONL", "PROTOBUF"]
      supportedTransport: ["SOCKET", "STDIO"]
  registryOverrides:
    cloud:
      enabled: true
    oss:
      enabled: true
  releaseStage: alpha
  supportLevel: certified
  tags:
    - language:java
  releases:
    breakingChanges:
      5.0.0:
        message:
          "NUMERIC and DECIMAL columns with scale 0 are now mapped to the Airbyte `integer` type
          instead of `number`, so downstream destinations preserve integral semantics (e.g. Snowflake
          NUMBER vs FLOAT). Customers whose streams contain at least one NUMERIC or DECIMAL column with
          scale 0 must take action with their connections by refreshing the source schema and refreshing
          the affected streams. To determine whether you are affected before upgrading, check the
          connector logs while running version 4.4.12 (or any later 4.4.x) for a discovery line such as
          'Discovered DECIMAL column with scale 0 (precision=10). A future connector version will map
          such columns to Airbyte integer instead of number.' — one such line is logged per affected
          column at discovery/schema-refresh time. If no such line appears in your logs, your streams
          contain no affected columns and the upgrade requires no action."
        upgradeDeadline: "2026-08-24"
        deadlineAction: "auto_upgrade"
      4.0.0:
        message: "We have overhauled our MSSQL source connector and it is now supported by the Airbyte team! To benefit from new features, including terabyte-sized table support, reliability improvements, expanded datetime data types, and various bug fixes, please opt in to the 4.0.0 version."
        upgradeDeadline: "2024-04-07"
      3.0.0:
        message: "Remapped columns of types: date, datetime, datetime2, datetimeoffset, smalldatetime, and time from `String` to their appropriate Airbyte types. Customers whose streams have columns with the affected data types must take action with their connections."
        upgradeDeadline: "2023-12-07"
      2.0.0:
        message: "Add default cursor for cdc"
        upgradeDeadline: "2023-08-23"
  connectorTestSuitesOptions:
    - suite: unitTests
    - suite: integrationTests
    - suite: acceptanceTests
  externalDocumentationUrls:
    - title: SQL Server documentation
      url: https://learn.microsoft.com/en-us/sql/sql-server/
      type: api_reference
    - title: SQL Server 2022 release notes
      url: https://learn.microsoft.com/en-us/sql/sql-server/sql-server-2022-release-notes
      type: api_release_history
    - title: SQL Server authentication
      url: https://learn.microsoft.com/en-us/sql/relational-databases/security/choose-an-authentication-mode
      type: authentication_guide
metadataSpecVersion: "1.0"
