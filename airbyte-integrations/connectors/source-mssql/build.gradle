plugins {
    id 'airbyte-bulk-connector'
    id "io.airbyte.gradle.docker"
    id 'airbyte-connector-docker-convention'
}

application {
    mainClass = 'io.airbyte.integrations.source.mssql.MsSqlServerSource'
}

airbyteBulkConnector {
    core = 'extract'
    toolkits = ['extract-jdbc', 'extract-cdc']
}

dependencies {
    implementation 'com.microsoft.sqlserver:mssql-jdbc:13.4.0.jre11'
    implementation 'com.azure:azure-identity:1.18.2'
    implementation 'io.debezium:debezium-embedded:3.4.3.Final'
    implementation 'io.debezium:debezium-connector-sqlserver:3.4.3.Final'
    implementation 'org.apache.commons:commons-lang3:3.18.0'

    testFixturesImplementation 'org.testcontainers:mssqlserver:1.19.0'
    testImplementation("io.mockk:mockk:1.12.0")
}
