documentationUrl: https://docs.airbyte.com/integrations/sources/salesforce
connectionSpecification:
  $schema: http://json-schema.org/draft-07/schema#
  title: Salesforce Source Spec
  type: object
  required:
    - client_id
  additionalProperties: true
  allOf:
    - if:
        anyOf:
          - not:
              required:
                - auth_type
          - properties:
              auth_type:
                const: Client
            required:
              - auth_type
      then:
        required:
          - client_id
          - client_secret
          - refresh_token
    - if:
        properties:
          auth_type:
            const: JWT
        required:
          - auth_type
      then:
        required:
          - client_id
          - username
          - private_key
  properties:
    is_sandbox:
      title: Sandbox
      description: >-
        Toggle if you're using a <a
        href="https://help.salesforce.com/s/articleView?id=sf.deploy_sandboxes_parent.htm&type=5">Salesforce Sandbox</a>
      type: boolean
      default: false
      order: 1
    auth_type:
      title: Authentication Type
      description: >-
        The authentication method to use. <b>Client (OAuth)</b> uses a refresh token
        (the default; obtained via the "Authenticate" button on Airbyte Cloud).
        <b>JWT</b> uses the Salesforce <a
        href="https://help.salesforce.com/s/articleView?id=sf.remoteaccess_oauth_jwt_flow.htm&type=5">OAuth
        2.0 JWT Bearer Flow</a> — sign a token with your connected app's private key,
        no refresh token required. Fill in the fields that match the selected type.
      type: string
      enum:
        - Client
        - JWT
      default: Client
      order: 0
    client_id:
      title: Client ID
      description: Enter your Salesforce developer application's <a
        href="https://developer.salesforce.com/forums/?id=9062I000000DLgbQAG">Client ID</a>
        (the connected app's Consumer Key). Required for both authentication types.
      type: string
      order: 2
    client_secret:
      title: Client Secret
      description: Enter your Salesforce developer application's <a
        href="https://developer.salesforce.com/forums/?id=9062I000000DLgbQAG">Client secret</a>.
        Required for <b>Client (OAuth)</b> authentication.
      type: string
      airbyte_secret: true
      order: 3
    refresh_token:
      title: Refresh Token
      description: >-
        Enter your application's <a
        href="https://developer.salesforce.com/docs/atlas.en-us.mobile_sdk.meta/mobile_sdk/oauth_refresh_token_flow.htm">Salesforce Refresh Token</a> used for Airbyte to access your Salesforce account.
        Required for <b>Client (OAuth)</b> authentication.
      type: string
      airbyte_secret: true
      order: 4
    username:
      title: Username
      description: >-
        The Salesforce username (the <code>sub</code> claim) the JWT assertion is issued for.
        This user must be pre-authorized for the connected app. Required for <b>JWT</b> authentication.
      type: string
      order: 5
    private_key:
      title: Private Key
      description: >-
        The RSA private key (PEM format) whose matching certificate is uploaded to the connected
        app's "Use digital signatures" setting. Used to sign the JWT assertion. Required for
        <b>JWT</b> authentication.
      type: string
      airbyte_secret: true
      multiline: true
      order: 6
    start_date:
      title: Start Date
      description: >-
        Enter the date (or date-time) in the YYYY-MM-DD or YYYY-MM-DDTHH:mm:ssZ format. Airbyte will replicate the data updated on and after this date. If this field is blank, Airbyte will replicate the data for last two years.
      type: string
      pattern: >-
        ^([0-9]{4}-[0-9]{2}-[0-9]{2}(T[0-9]{2}:[0-9]{2}:[0-9]{2}Z)?)$
      pattern_descriptor: "YYYY-MM-DD or YYYY-MM-DDTHH:mm:ssZ"
      examples:
        - "2021-07-25"
        - "2021-07-25T00:00:00Z"
      format: date-time
      order: 7
    force_use_bulk_api:
      title: Force to use BULK API
      type: boolean
      description: Toggle to use Bulk API (this might cause empty fields for some streams)
      default: false
      order: 8
    stream_slice_step:
      title: Stream Slice Step for Incremental sync
      type: string
      description: The size of the time window (ISO8601 duration) to slice requests.
      default: P30D
      order: 9
      examples:
        - PT12H
        - P7D
        - P30D
        - P1M
        - P1Y
    lookback_window:
      title: Lookback Window for Incremental sync
      type: string
      description: >-
        The duration (ISO8601 duration) to re-read data from the source when running incremental syncs.
        This compensates for records that may not be immediately available when querying the Salesforce API
        due to eventual consistency delays.
        The connector will re-query this amount of time before the last cursor position on each sync.
        Increase this value if you observe missing records in your destination.
        See <a href="https://docs.airbyte.com/integrations/sources/salesforce#limitations--troubleshooting">Limitations & Troubleshooting</a> for details.
      default: PT10M
      order: 10
      examples:
        - PT10M
        - PT30M
        - PT1H
    streams_criteria:
      type: array
      order: 11
      items:
        type: object
        required:
          - criteria
          - value
        properties:
          criteria:
            type: string
            title: Search criteria
            enum:
              - starts with
              - ends with
              - contains
              - exacts
              - starts not with
              - ends not with
              - not contains
              - not exacts
            order: 1
            default: contains
          value:
            type: string
            title: Search value
            order: 2
      title: Filter Salesforce Objects
      description: Add filters to select only required stream based on `SObject` name. Use this field to filter which tables are displayed by this connector. This is useful if your Salesforce account has a large number of tables (>1000), in which case you may find it easier to navigate the UI and speed up the connector's performance if you restrict the tables displayed by this connector.
advanced_auth:
  auth_flow_type: oauth2.0
  predicate_key:
    - auth_type
  predicate_value: Client
  oauth_config_specification:
    oauth_connector_input_specification:
      scopes:
        - scope: "api"
        - scope: "web"
        - scope: "refresh_token"
        - scope: "lightning"
      consent_url: "https://{% if is_sandbox %}test{% else %}login{% endif %}.salesforce.com/services/oauth2/authorize?{{client_id_param}}&{{redirect_uri_param}}&response_type=code&{{scopes_param}}&{{state_param}}"
      access_token_url: "https://{% if is_sandbox %}test{% else %}login{% endif %}.salesforce.com/services/oauth2/token"
      access_token_headers:
        Content-Type: "application/x-www-form-urlencoded"
      access_token_params:
        grant_type: "authorization_code"
        code: "{{ auth_code_value }}"
        client_id: "{{ client_id_value }}"
        client_secret: "{{ client_secret_value }}"
        redirect_uri: "{{ redirect_uri_value }}"
      extract_output:
        - refresh_token
    oauth_user_input_from_connector_config_specification:
      type: object
      additionalProperties: false
      properties:
        is_sandbox:
          type: boolean
          path_in_connector_config:
            - is_sandbox
    complete_oauth_output_specification:
      type: object
      additionalProperties: false
      properties:
        refresh_token:
          type: string
          path_in_connector_config:
            - refresh_token
    complete_oauth_server_input_specification:
      type: object
      additionalProperties: false
      properties:
        client_id:
          type: string
        client_secret:
          type: string
    complete_oauth_server_output_specification:
      type: object
      additionalProperties: false
      properties:
        client_id:
          type: string
          path_in_connector_config:
            - client_id
        client_secret:
          type: string
          path_in_connector_config:
            - client_secret
