data:
  ab_internal:
    ql: 200
    sl: 200
  allowedHosts:
    hosts:
      - "*"
  connectorBuildOptions:
    baseImage: docker.io/airbyte/source-declarative-manifest:7.23.5@sha256:e18095bba3f7852bb7ae0a50d13fe532cee803cf8f273f5e8faf51fd93e401e4
  connectorSubtype: api
  connectorType: source
  definitionId: cdaf146a-9b75-49fd-9dd2-9d64a0bb4781
  dockerImageTag: 1.0.2
  dockerRepository: airbyte/source-sentry
  documentationUrl: https://docs.airbyte.com/integrations/sources/sentry
  externalDocumentationUrls:
    - title: API Reference
      url: https://docs.sentry.io/api/
      type: api_reference
    - title: Changelog
      url: https://sentry.io/changelog/
      type: api_release_history
    - title: Sentry API OpenAPI specification
      url: https://github.com/getsentry/sentry-api-schema
      type: openapi_spec
    - title: Sentry API Deprecation Policy
      url: https://develop.sentry.dev/backend/api/deprecation-policy/
      type: api_deprecations
  githubIssueLabel: source-sentry
  icon: sentry.svg
  license: ELv2
  # Rate limit windows are returned in the response headers of the API requests.
  # Senty docs (https://docs.sentry.io/api/ratelimits/) state a per-second rate limit,
  # but the `x-rate-limit-reset` header has been observed to return a value of up to the next full minute from a request
  # (e.g. request sent: 12:00:15, `x-rate-limit-reset` header value: 12:01:00).
  maxSecondsBetweenMessages: 60
  name: Sentry
  remoteRegistries:
    pypi:
      enabled: false
      packageName: airbyte-source-sentry
  registryOverrides:
    cloud:
      enabled: true
    oss:
      enabled: true
  releaseStage: generally_available
  suggestedStreams:
    streams:
      - issues
      - events
      - projects
      - releases
  supportLevel: certified
  tags:
    - cdk:low-code
    - language:manifest-only
  connectorTestSuitesOptions:
    - suite: liveTests
      testConnections:
        - name: sentry_config_dev_null
          id: 54bf1bc8-404c-4e4c-b253-7d8b4c4ffacb
        - name: sentry_config_limited_scopes_dev_null
          id: aa4573bd-4681-4906-9877-d6afe4060a28
    - suite: unitTests
    - suite: acceptanceTests
      testSecrets:
        - name: SECRET_SOURCE-SENTRY_LIMITED_SCOPE__CREDS
          fileName: config_limited_scopes.json
          secretStore:
            type: GSM
            alias: airbyte-connector-testing-secret-store
        - name: SECRET_SOURCE-SENTRY__CREDS
          fileName: config.json
          secretStore:
            type: GSM
            alias: airbyte-connector-testing-secret-store
  releases:
    breakingChanges:
      1.0.0:
        message: >-
          The `projects` stream now uses Sentry's organization-scoped projects
          endpoint (`/api/0/organizations/{organization}/projects/`) because
          Sentry deprecated the legacy `/api/0/projects/` endpoint. As a result,
          the stream returns only the projects that belong to the organization
          configured in the connector setup, instead of every project the token
          could access across all organizations. The org-scoped endpoint does
          not return the `avatar`, `color`, `isInternal`, `isPublic`,
          `organization`, and `status` fields; these are now available in the
          new `all_projects_detail` stream, which returns full project details
          for every project in the organization.
        upgradeDeadline: "2026-07-15"
        deadlineAction: disable
        scopedImpact:
          - scopeType: stream
            impactedScopes: ["projects"]
    rolloutConfiguration:
      enableProgressiveRollout: false
metadataSpecVersion: "1.0"
