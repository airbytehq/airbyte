data:
  allowedHosts:
    hosts:
      - "cloudtrail.*.amazonaws.com"
  registryOverrides:
    oss:
      enabled: true
    cloud:
      enabled: true
  releases:
    breakingChanges:
      1.0.0:
        upgradeDeadline: "2024-07-30"
        message:
          "The verison migrates the Aws CloudTrail connector to the low-code
          framework for greater maintainability. !! Important: The management_events
          stream changed it's EventTime field from integer to float. The `start_date`
          parameter is now optional and the connector now takes current date as default
          start date "
  remoteRegistries:
    pypi:
      enabled: false
      packageName: airbyte-source-aws-cloudtrail
  connectorBuildOptions:
    baseImage: docker.io/airbyte/source-declarative-manifest:7.6.0@sha256:9c0ea900af7e20d119da0446fc1679ca4015c5c5f7a3b022d321071570a78749
  connectorSubtype: api
  connectorType: source
  definitionId: 6ff047c0-f5d5-4ce5-8c81-204a830fa7e1
  dockerImageTag: 1.1.1
  dockerRepository: airbyte/source-aws-cloudtrail
  githubIssueLabel: source-aws-cloudtrail
  icon: aws-cloudtrail.svg
  license: ELv2
  name: Aws Cloudtrail
  releaseStage: alpha
  releaseDate: 2021-06-23
  supportLevel: community
  documentationUrl: https://docs.airbyte.com/integrations/sources/aws-cloudtrail
  tags:
    - cdk:low-code
    - language:manifest-only
  connectorTestSuitesOptions:
    - suite: liveTests
      testConnections:
        - name: aws-cloudtrail_config_dev_null
          id: aa6731d0-9c6f-4b32-bdd4-1c14f0cf0119
    - suite: unitTests
    - suite: acceptanceTests
      testSecrets:
        - name: SECRET_SOURCE-AWS-CLOUDTRAIL__CREDS
          fileName: config.json
          secretStore:
            type: GSM
            alias: airbyte-connector-testing-secret-store
  externalDocumentationUrls:
    - title: CloudTrail API reference
      url: https://docs.aws.amazon.com/awscloudtrail/latest/APIReference/
      type: api_reference
    - title: Authentication
      url: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-authentication.html
      type: authentication_guide
    - title: Service quotas
      url: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/WhatIsCloudTrail-Limits.html
      type: rate_limits
metadataSpecVersion: "1.0"
