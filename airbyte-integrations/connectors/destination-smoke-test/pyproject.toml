[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "destination-smoke-test"
version = "0.1.0"
description = "Smoke test destination using PyAirbyte caches as backends"
authors = ["Airbyte <contact@airbyte.io>"]
license = "ELv2"
readme = "README.md"
packages = [{include = "destination_smoke_test"}]

[tool.poetry.dependencies]
python = "^3.10"
airbyte = ">=0.20.0"

[tool.poetry.scripts]
destination-smoke-test = "destination_smoke_test.run:run"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
