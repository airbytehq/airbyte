[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
version = "0.1.0"
name = "source-smoke-test"
description = "Smoke test source for destination regression testing, backed by PyAirbyte."
authors = ["Airbyte <contact@airbyte.io>"]
license = "ELv2"
readme = "README.md"
documentation = "https://docs.airbyte.com/integrations/sources/smoke-test"
homepage = "https://airbyte.com"
repository = "https://github.com/airbytehq/airbyte"

[[tool.poetry.packages]]
include = "source_smoke_test"

[tool.poetry.dependencies]
python = ">=3.10,<3.13"
airbyte = ">=0.41.0"
airbyte-cdk = ">=6.0.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=8.0.0"

[tool.poetry.scripts]
source-smoke-test = "source_smoke_test.run:run"

[tool.poe]
include = [
    "${POE_GIT_DIR}/poe-tasks/poetry-connector-tasks.toml",
]
