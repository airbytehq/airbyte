[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "airbyte-destination-dewey"
version = "0.1.0"
description = "Airbyte destination for Dewey, the managed RAG service."
authors = ["Airbyte <contact@airbyte.io>"]
license = "ELv2"
readme = "README.md"
documentation = "https://docs.airbyte.com/integrations/destinations/dewey"
homepage = "https://airbyte.com"
repository = "https://github.com/airbytehq/airbyte"

[[tool.poetry.packages]]
include = "destination_dewey"

[tool.poetry.dependencies]
python = "^3.9,<3.12"
airbyte-cdk = "0.81.6"
backoff = "^2.2.1"
dpath = "^2.0.8"
requests = "^2.31.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.2"
pytest-mock = "^3.12.0"
ruff = "^0.3.2"
mypy = "^1.9.0"
responses = "^0.25.0"

[tool.poetry.scripts]
destination-dewey = "destination_dewey.run:run"

[tool.poe]
include = [
    "${POE_GIT_DIR}/poe-tasks/poetry-connector-tasks.toml",
]
