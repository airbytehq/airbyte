version: 4.3.0
type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - users

definitions:
  base_requester:
    type: HttpRequester
    url_base: https://graph.microsoft.com/v1.0/
    http_method: GET
    authenticator:
      type: OAuthAuthenticator
      client_id: "{{ config['credentials']['client_id'] }}"
      client_secret: "{{ config['credentials']['client_secret'] }}"
      refresh_request_body:
        scope: https://graph.microsoft.com/.default
      token_refresh_endpoint: >-
        https://login.microsoftonline.com/{{ config['credentials']['tenant_id']
        }}/oauth2/v2.0/token
      grant_type: client_credentials
      scopes: []
      access_token_name: access_token

  odata_paginator:
    type: DefaultPaginator
    page_token_option:
      type: RequestPath
    pagination_strategy:
      type: CursorPagination
      cursor_value: '{{ response.get("@odata.nextLink", {}) }}'
      stop_condition: '{{ not response.get("@odata.nextLink", {}) }}'

  odata_record_selector:
    type: RecordSelector
    extractor:
      type: DpathExtractor
      field_path:
        - value

  permission_error_handler:
    type: CompositeErrorHandler
    error_handlers:
      - type: DefaultErrorHandler
        response_filters:
          - type: HttpResponseFilter
            action: IGNORE
            http_codes:
              - 403
            error_message: Insufficient permissions for this resource
          - type: HttpResponseFilter
            action: IGNORE
            http_codes:
              - 404
            error_message: Resource not found

  streams:
    # =========================================================================
    # Tier 1 — Primary data an agent would search
    # =========================================================================

    users:
      type: DeclarativeStream
      name: users
      primary_key:
        - id
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $schema: http://json-schema.org/draft-07/schema#
          type: object
          additionalProperties: true
          properties:
            id:
              type:
                - "null"
                - string
            displayName:
              type:
                - "null"
                - string
            givenName:
              type:
                - "null"
                - string
            surname:
              type:
                - "null"
                - string
            mail:
              type:
                - "null"
                - string
            userPrincipalName:
              type:
                - "null"
                - string
            jobTitle:
              type:
                - "null"
                - string
            officeLocation:
              type:
                - "null"
                - string
            mobilePhone:
              type:
                - "null"
                - string
            businessPhones:
              type:
                - "null"
                - array
              items:
                type:
                  - "null"
                  - string
            preferredLanguage:
              type:
                - "null"
                - string
            department:
              type:
                - "null"
                - string
            accountEnabled:
              type:
                - "null"
                - boolean
            createdDateTime:
              type:
                - "null"
                - string
              format: date-time
              airbyte_type: timestamp_without_timezone
      retriever:
        type: SimpleRetriever
        requester:
          $ref: "#/definitions/base_requester"
          path: users?$top=100
        record_selector:
          $ref: "#/definitions/odata_record_selector"
        paginator:
          $ref: "#/definitions/odata_paginator"

    teams:
      type: DeclarativeStream
