spec:
  type: Spec
  documentation_url: https://docs.airbyte.com/integrations/sources/microsoft-teams
  connection_specification:
    $schema: http://json-schema.org/draft-07/schema#
    title: Microsoft Teams Spec
    type: object
    required: []
    additionalProperties: true
    properties:
      period:
        type: string
        title: Period
        description: >-
          Deprecated. Previously used for the Team Device Usage Report stream
          which has been removed in v2.0.0. This field is ignored.
        examples:
          - D7
        airbyte_hidden: true
      credentials:
        title: Authentication mechanism
        description: Choose how to authenticate to Microsoft
        type: object
        oneOf:
          - type: object
            title: Authenticate via Microsoft (OAuth 2.0)
            required:
              - tenant_id
              - client_id
              - client_secret
              - refresh_token
            properties:
              auth_type:
                type: string
                const: Client
                enum:
                  - Client
                default: Client
                order: 0
              tenant_id:
                title: Directory (tenant) ID
                type: string
                description: >-
                  A globally unique identifier (GUID) that is different than
                  your organization name or domain. Follow these steps to
                  obtain: open one of the Teams where you belong inside the
                  Teams Application -> Click on the … next to the Team title
                  -> Click on Get link to team -> Copy the link to the team
                  and grab the tenant ID form the URL
                airbyte_secret: true
              client_id:
                title: Client ID
                type: string
                description: The Client ID of your Microsoft Teams developer application.
              client_secret:
                title: Client Secret
                type: string
                description: The Client Secret of your Microsoft Teams developer application.
                airbyte_secret: true
              refresh_token:
