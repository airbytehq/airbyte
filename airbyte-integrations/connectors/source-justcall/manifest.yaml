            type: number
          call_sid:
            type:
              - string
              - "null"
          contact_number:
            type:
              - string
              - "null"
          contact_name:
            type:
              - string
              - "null"
          contact_email:
            type:
              - string
              - "null"
          justcall_number:
            type:
              - string
              - "null"
          justcall_line_name:
            type:
              - string
              - "null"
