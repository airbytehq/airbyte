version: 7.10.0

type: DeclarativeSource

description: >-
  JustCall v2.1 connector syncs call logs, SMS, contacts, phone numbers, and
  users from JustCall into your data warehouse.

check:
  type: CheckStream
  stream_names:
    - phone_numbers

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: ApiKeyAuthenticator
        header: Authorization
        api_token: "{{ config['api_key'] }}:{{ config['api_secret'] }}"
      request_parameters:
        order: asc
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: per_page
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: page
          inject_into: request_parameter
        pagination_strategy:
          type: PageIncrement
          page_size: 100
          start_from_page: 0
          inject_on_first_request: true

streams:
  - type: DeclarativeStream
    name: calls
