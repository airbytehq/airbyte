        type: HttpRequester
        authenticator:
          type: ApiKeyAuthenticator
          header: Authorization
          api_token: "{{ config['api_key'] }}:{{ config['api_secret'] }}"
        http_method: GET
        request_parameters:
          order: asc
          sort: datetime
        url: https://api.justcall.io/v2.1/calls
