version: 7.17.1

type: DeclarativeSource

description: >-
  CJ Affiliate (formerly known as Commission Junction) is one of the world's
  largest and most established affiliate marketing networks.

check:
  type: CheckStream
  stream_names:
    - AdvertiserCommissions

streams:
  - type: DeclarativeStream
    name: AdvertiserCommissions
    retriever:
      type: SimpleRetriever
      paginator:
        type: DefaultPaginator
        pagination_strategy:
          type: CursorPagination
          cursor_value: >-
            {{ response.get('data', {}).get('advertiserCommissions',
            {}).get('maxCommissionId') }}
          stop_condition: >-
            {{ response.get('data', {}).get('advertiserCommissions',
            {}).get('payloadComplete') == True }}
      requester:
        type: HttpRequester
        url: https://commissions.api.cj.com/query
        http_method: POST
        request_body:
          type: RequestBodyGraphQL
          value:
            query: |
              query {
                advertiserCommissions(
                  forAdvertisers: ["{{ config['cid'] }}"],
                  sincePostingDate: "{{ stream_interval.start_time }}",
                  beforePostingDate: "{{ stream_interval.end_time }}"{% if next_page_token and next_page_token['next_page_token'] %},
                  sinceCommissionId: "{{ next_page_token['next_page_token'] }}"{% endif %}
                ) {
                  count
                  payloadComplete
                  maxCommissionId
                  records {
                    actionStatus
                    actionTrackerId
                    actionTrackerName
                    actionType
                    adOwner
                    advCommissionAmountAdvCurrency
                    advCommissionAmountUsd
                    advertiserId
                    advertiserName
                    aid
                    cjFeeAdvCurrency
                    cjFeeUsd
                    clickDate
                    clickReferringURL
                    commissionId
                    concludingBrowser
                    concludingDeviceName
                    concludingDeviceType
                    correctionReason
                    country
                    coupon
                    eventDate
                    initiatingBrowser
                    initiatingDeviceName
                    initiatingDeviceType
                    isCrossDevice
                    lockingDate
                    lockingMethod
                    newToFile
                    orderDiscountAdvCurrency
                    orderDiscountOrigCurrency
                    orderDiscountPubCurrency
                    orderDiscountUsd
                    orderId
                    original
                    originalActionId
                    postingDate
                    pubCommissionAmountPubCurrency
                    pubCommissionAmountUsd
                    publisherId
                    publisherName
                    reviewedStatus
                    saleAmountAdvCurrency
                    saleAmountPubCurrency
                    saleAmountUsd
                    siteToStoreOffer
                    source
                    websiteId
                    websiteName
                  }
                }
              }
        authenticator:
          type: BearerAuthenticator
          api_token: "{{ config[\"personal_access_token\"] }}"
        error_handler:
          type: DefaultErrorHandler
          max_retries: 5
          backoff_strategies:
            - type: ExponentialBackoffStrategy
              factor: 5
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
            - advertiserCommissions
            - records
    primary_key:
      - commissionId
      - originalActionId
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        required:
          - commissionId
          - eventDate
        properties:
          aid:
            type:
              - string
              - "null"
          coupon:
            type:
              - string
              - "null"
          source:
            type:
              - string
              - "null"
          adOwner:
            type:
              - string
              - "null"
          country:
            type:
              - string
              - "null"
          orderId:
            type:
              - string
              - "null"
          cjFeeUsd:
            type:
              - string
              - "null"
          original:
            type:
              - boolean
              - "null"
          clickDate:
            type:
              - string
              - "null"
          eventDate:
            type: string
          newToFile:
            type:
              - boolean
              - "null"
          websiteId:
            type:
              - string
              - "null"
          actionType:
            type:
              - string
              - "null"
          lockingDate:
            type:
