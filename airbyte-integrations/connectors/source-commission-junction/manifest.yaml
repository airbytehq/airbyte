              - "null"
          advertiserId:
            type:
              - string
              - "null"
          commissionId:
            type: string
          isCrossDevice:
            type:
              - boolean
              - "null"
          lockingMethod:
            type:
              - string
              - "null"
          publisherName:
            type:
              - string
              - "null"
          saleAmountUsd:
            type:
              - string
              - "null"
          advertiserName:
            type:
              - string
              - "null"
          reviewedStatus:
            type:
              - string
