              - "null"
        additionalProperties: true
    incremental_sync:
      type: DatetimeBasedCursor
      step: P30D
      cursor_field: postingDate
      end_datetime:
        type: MinMaxDatetime
        datetime: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ config['start_date'] }}"
      datetime_format: "%Y-%m-%dT%H:%M:%SZ"
      lookback_window: P60D
      cursor_granularity: PT1S
      cursor_datetime_formats:
        - "%Y-%m-%dT%H:%M:%SZ"
        - "%Y-%m-%dT%H:%M:%S%z"

spec:
  type: Spec
  documentation_url: https://developers.cj.com/graphql/reference/Commission%20Detail
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - personal_access_token
      - cid
      - start_date
    properties:
      cid:
        type: string
        order: 1
        title: CID
        airbyte_secret: true
      start_date:
        type: string
        order: 2
        title: start_date
        default: "2025-02-01T00:00:00Z"
      personal_access_token:
        type: string
        description: >-
          Your CJ API personal access token. You can create and manage tokens at
          https://developers.cj.com/account/personal-access-tokens. Make sure to
          keep this token secure and do not share it publicly.
        name: personal_access_token
        order: 0
        title: Personal Access Token
        airbyte_secret: true
    additionalProperties: true

metadata:
  assist:
    docsUrl: https://developers.cj.com/graphql/reference/Commission%20Detail
  testedStreams:
    AdvertiserCommissions:
      isStale: false
      hasRecords: true
      streamHash: d4306188b2fe68e64c6288e46d7f96f59722a338
      hasResponse: true
      primaryKeysAreUnique: true
      primaryKeysArePresent: true
      responsesAreSuccessful: true
  autoImportSchema:
