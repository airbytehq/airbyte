documentationUrl: https://docs.comfy.org/api-reference/cloud
connectionSpecification:
  $schema: http://json-schema.org/draft-07/schema#
  title: ComfyUI Cloud Source Spec
  type: object
  required:
    - api_key
  properties:
    api_key:
      type: string
      title: API Key
      description: ComfyUI Cloud API key from platform.comfy.org/profile/api-keys
      airbyte_secret: true
      order: 0
    base_url:
      type: string
      title: Base URL
      description: ComfyUI Cloud API base URL
      default: https://cloud.comfy.org
      order: 1
