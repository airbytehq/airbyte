[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
version = "0.1.0"
name = "source-comfyui"
description = "Source connector for the ComfyUI Cloud API."
authors = ["3act <vincent.lange@3act.ai>"]
license = "MIT"
readme = "README.md"

[[tool.poetry.packages]]
include = "source_comfyui"

[tool.poetry.dependencies]
python = ">=3.10,<3.13"
airbyte-cdk = ">=6.61.6,<7.0"
requests = ">=2.28.0"

[tool.poetry.scripts]
source-comfyui = "source_comfyui.run:run"

[tool.poetry.group.dev.dependencies]
requests-mock = ">=1.9.3"
pytest-mock = ">=3.6.1"
pytest = ">=8.0.0"

[tool.poe]
include = [
    "${POE_GIT_DIR}/poe-tasks/poetry-connector-tasks.toml",
]
