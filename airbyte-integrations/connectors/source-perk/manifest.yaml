version: 6.41.5

type: DeclarativeSource

description: >-
  Sync travel and spend data from Perk into your data warehouse.

  This source connector syncs users, trips, bookings, cost centers, invoices,
  invoice lines, and profiles.

  Configuration requires your Perk API key and a start date from which to sync
  data.

check:
  type: CheckStream
  stream_names:
    - users

definitions:
  streams:
    trips:
      type: DeclarativeStream
      name: trips
      retriever:
        type: SimpleRetriever
        decoder:
