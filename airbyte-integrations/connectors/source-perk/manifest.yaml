          page_token_option:
            type: RequestOption
            field_name: offset
            inject_into: request_parameter
          pagination_strategy:
            type: OffsetIncrement
            page_size: 50
        requester:
          $ref: "#/definitions/base_requester"
          path: trips
          http_method: GET
          request_headers:
            Api-Version: "1"
          request_parameters:
            limit: "50"
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - trips
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: "#/schemas/trips"
      incremental_sync:
        type: DatetimeBasedCursor
        cursor_field: modified
        end_datetime:
          type: MinMaxDatetime
          datetime: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"
