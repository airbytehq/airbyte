          type: CursorPagination
          cursor_value: "{{response['result']['summary_info']['page']+1}}"
          stop_condition: >-
            {{ ('32017' in response.error.code if response.error and
            response.error.code else False) or  
            (response.result.summary_info.page if response.result and
            response.result.summary_info and response.result.summary_info.page
            is not none else 0) > config['pages_to_fetch'] - 1 }}
          page_size: null
      requester:
        type: HttpRequester
        authenticator:
          type: ApiKeyAuthenticator
          api_token: "{{ config[\"api_key\"] }}"
          inject_into:
            type: RequestOption
            field_name: token
            inject_into: header
        http_method: POST
        error_handler:
          type: CompositeErrorHandler
          error_handlers:
            - type: DefaultErrorHandler
              response_filters:
                - type: HttpResponseFilter
                  action: RETRY
                  predicate: "{{response.error.code == 32000}}"
                  error_message: >-
                    You are sending more requests per second then available for
                    your Serpstat plan
                  error_message_contains: ""
              backoff_strategies:
                - type: ExponentialBackoffStrategy
                  factor: 2
              max_retries: null
        request_headers:
          X-request-sender: Airbyte
        url: https://api.serpstat.com/v4/
        request_body:
          type: RequestBodyJsonObject
          value:
            id: "{{ now_utc() }}"
            method: SerpstatDomainProcedure.getDomainsHistory
            params:
              se: "{{config['region_id']}}"
              page: "{{next_page_token['next_page_token']}}"
              size: "{{config['page_size']}}"
              sort:
                date: desc
              domain: "{{config['domain']}}"
              during_all_time: true
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - result
            - data
    primary_key:
      - date
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        properties:
          domain:
            type:
              - string
              - "null"
