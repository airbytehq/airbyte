version: 7.0.4

type: DeclarativeSource

description: Search marketing data via Serpstat API

check:
  type: CheckStream
  stream_names:
    - Domain history

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: ApiKeyAuthenticator
        api_token: "{{ config[\"api_key\"] }}"
        inject_into:
          type: RequestOption
          field_name: token
          inject_into: header
      error_handler:
        type: CompositeErrorHandler
        error_handlers:
          - type: DefaultErrorHandler
            response_filters:
              - type: HttpResponseFilter
                action: RETRY
                predicate: "{{response.error.code == 32000}}"
                error_message: >-
                  You are sending more requests per second then available for
                  your Serpstat plan
            backoff_strategies:
              - type: ExponentialBackoffStrategy
                factor: 2
      request_headers:
        X-request-sender: Airbyte
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_token_option:
          type: RequestOption
          field_name: X-page
          inject_into: header
        pagination_strategy:
          type: CursorPagination
          cursor_value: "{{response['result']['summary_info']['page']+1}}"
          stop_condition: >-
            {{ ('32017' in response.error.code if response.error and
            response.error.code else False) or  
            (response.result.summary_info.page if response.result and
            response.result.summary_info and response.result.summary_info.page
            is not none else 0) > config['pages_to_fetch'] - 1 }}

streams:
  - type: DeclarativeStream
    npt: "{{next_page_token['next_page_token']}}"
    name: Domain history
    retriever:
      type: SimpleRetriever
      paginator:
        type: DefaultPaginator
        page_token_option:
