  releases:
    breakingChanges:
      1.0.0:
        message: "This release updates incremental syncs for the invoices, expenses, creditnotes, customer_payments, purchase_orders, and sales_orders streams to use `last_modified_time` instead of `date` as the cursor. Users syncing these streams must refresh the source schema and reset the affected streams after upgrading so Airbyte can rebuild state with the new cursor."
