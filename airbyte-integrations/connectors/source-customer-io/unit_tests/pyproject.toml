[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "source-customer-io-tests"
version = "0.0.1"
description = "Unit tests for source-customer-io"
authors = ["Airbyte <contact@airbyte.io>"]
package-mode = false

[tool.poetry.dependencies]
python = "^3.10,<3.13"
airbyte-cdk = "6.48.10"
pytest = "^8"
requests-mock = "^1"

[tool.pytest.ini_options]
filterwarnings = [
    "ignore:This class is experimental*",
]
