          $ref: "#/schemas/numbers"
    contacts:
      type: DeclarativeStream
      name: contacts
      retriever:
        type: SimpleRetriever
        paginator:
          type: DefaultPaginator
          page_size_option:
            type: RequestOption
            field_name: per_page
            inject_into: request_parameter
          page_token_option:
            type: RequestOption
            field_name: page
            inject_into: request_parameter
          pagination_strategy:
            type: PageIncrement
            page_size: 50
            start_from_page: 1
            inject_on_first_request: true
        requester:
          $ref: "#/definitions/base_requester"
          path: /contacts
          http_method: GET
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - contacts
      primary_key:
        - id
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: "#/schemas/contacts"
      incremental_sync:
        type: DatetimeBasedCursor
        step: P1W
        cursor_field: created_at
        end_datetime:
          type: MinMaxDatetime
          datetime: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"
          datetime_format: "%Y-%m-%dT%H:%M:%SZ"
        start_datetime:
          type: MinMaxDatetime
          datetime: "{{ config[\"start_date\"] }}"
          datetime_format: "%Y-%m-%dT%H:%M:%SZ"
        datetime_format: "%s"
        end_time_option:
          type: RequestOption
          field_name: to
          inject_into: request_parameter
        lookback_window: P0D
        start_time_option:
          type: RequestOption
          field_name: from
          inject_into: request_parameter
        cursor_granularity: PT1S
        cursor_datetime_formats:
          - "%s"
    webhooks:
      type: DeclarativeStream
      name: webhooks
      retriever:
        type: SimpleRetriever
        paginator:
          type: DefaultPaginator
          page_size_option:
            type: RequestOption
            field_name: per_page
            inject_into: request_parameter
          page_token_option:
            type: RequestOption
            field_name: page
            inject_into: request_parameter
          pagination_strategy:
            type: PageIncrement
            page_size: 50
        requester:
          $ref: "#/definitions/base_requester"
          path: /webhooks
          http_method: GET
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - webhooks
      primary_key:
        - id
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: "#/schemas/webhooks"
    user_availability:
      type: DeclarativeStream
      name: user_availability
      retriever:
        type: SimpleRetriever
        requester:
          $ref: "#/definitions/base_requester"
          path: /users/availabilities
          http_method: GET
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - users
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: "#/schemas/user_availability"
  base_requester:
    type: HttpRequester
    url_base: https://api.aircall.io/v1
    authenticator:
      type: BasicHttpAuthenticator
      password: "{{ config[\"api_token\"] }}"
      username: "{{ config[\"api_id\"] }}"

streams:
  - $ref: "#/definitions/streams/calls"
  - $ref: "#/definitions/streams/company"
  - $ref: "#/definitions/streams/contacts"
  - $ref: "#/definitions/streams/numbers"
  - $ref: "#/definitions/streams/tags"
  - $ref: "#/definitions/streams/user_availability"
  - $ref: "#/definitions/streams/users"
  - $ref: "#/definitions/streams/teams"
  - $ref: "#/definitions/streams/webhooks"

spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - api_id
      - api_token
      - start_date
    properties:
      api_id:
        type: string
        description: >-
          App ID found at settings
          https://dashboard.aircall.io/integrations/api-keys
        order: 0
        title: API ID
        airbyte_secret: true
      api_token:
        type: string
        description: >-
          App token found at settings (Ref-
          https://dashboard.aircall.io/integrations/api-keys)
        order: 1
        title: API Token
        airbyte_secret: true
      start_date:
        type: string
        order: 2
        title: Start date
        format: date-time
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$
    additionalProperties: true

