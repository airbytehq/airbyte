version: 7.0.4

type: DeclarativeSource

description: >-
  Get ad analytics from all Mercado Ads placements. Follow [this
  guide](https://developers.mercadolibre.com.ar/en_us/authentication-and-authorization)
  to get the OAuth credentials. Make sure to give the ["Publicidad de un
  producto"](https://developers.mercadolibre.com.ar/es_ar/permisos-funcionales?nocache=true&password=permisos#Publicidad)
  read permission to fetch ad data.

check:
  type: CheckStream
  stream_names: []

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: OAuthAuthenticator
        scopes: []
        client_id: '{{ config["client_id"] }}'
        grant_type: refresh_token
        client_secret: '{{ config["client_secret"] }}'
        refresh_token: '{{ config["client_refresh_token"] }}'
        access_token_value: A
        refresh_request_body: {}
        token_refresh_endpoint: https://api.mercadolibre.com/oauth/token
      error_handler:
        type: CompositeErrorHandler
        error_handlers:
          - type: DefaultErrorHandler
            response_filters:
              - type: HttpResponseFilter
                action: IGNORE
                http_codes:
                  - 404
                error_message: No campaigns found for advertiser
      request_headers:
        Api-Version: "1"
      request_parameters:
        product_id: DISPLAY
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: limit
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: offset
          inject_into: request_parameter
        pagination_strategy:
          type: OffsetIncrement
          page_size: 1000

streams:
  - type: DeclarativeStream
    name: brand_advertisers
    retriever:
      type: SimpleRetriever
      decoder:
        type: JsonDecoder
      requester:
        type: HttpRequester
        url: https://api.mercadolibre.com/advertising/advertisers
        http_method: GET
        authenticator:
          type: OAuthAuthenticator
          scopes: []
          client_id: '{{ config["client_id"] }}'
          grant_type: refresh_token
          client_secret: '{{ config["client_secret"] }}'
          refresh_token: '{{ config["client_refresh_token"] }}'
          refresh_request_body: {}
          token_refresh_endpoint: https://api.mercadolibre.com/oauth/token
        request_headers:
          $ref: "#/definitions/linked/HttpRequester/request_headers"
        request_parameters:
          product_id: BADS
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - advertisers
    primary_key:
      - advertiser_id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        required:
          - advertiser_id
        properties:
          site_id:
            type:
              - string
              - "null"
          account_name:
            type:
              - string
              - "null"
          advertiser_id:
            type: number
          advertiser_name:
            type:
              - string
              - "null"
        additionalProperties: true
  - type: DeclarativeStream
    name: brand_campaigns
    retriever:
      type: SimpleRetriever
      decoder:
        type: JsonDecoder
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: limit
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: offset
          inject_into: request_parameter
        pagination_strategy:
          type: OffsetIncrement
          page_size: 1000
          inject_on_first_request: true
      requester:
        type: HttpRequester
        url: >-
          https://api.mercadolibre.com/advertising/advertisers/{{
          stream_partition.advertiser_id }}/brand_ads/campaigns
        http_method: GET
        authenticator:
          $ref: "#/definitions/linked/HttpRequester/authenticator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - campaigns
      partition_router:
        type: SubstreamPartitionRouter
        parent_stream_configs:
          - type: ParentStreamConfig
            stream:
              $ref: "#/streams/0"
            parent_key: advertiser_id
            partition_field: advertiser_id
    primary_key:
      - advertiser_id
      - campaign_id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        required:
          - advertiser_id
          - campaign_id
        properties:
          cpc:
            type:
              - number
              - "null"
          name:
            type:
              - string
              - "null"
          items:
            type:
              - array
              - "null"
            items:
              type:
                - object
                - "null"
              properties:
                status:
                  type:
                    - string
                    - "null"
                item_id:
                  type:
                    - string
                    - "null"
                campaign_id:
                  type:
                    - number
                    - "null"
          budget:
