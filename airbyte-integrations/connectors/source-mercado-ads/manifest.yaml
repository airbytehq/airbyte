              - string
              - "null"
          official_store_id:
            type:
              - number
              - "null"
          advertiser_campaign_id:
            type:
              - string
              - "null"
        additionalProperties: true
    transformations:
      - type: AddFields
        fields:
          - type: AddedFieldDefinition
            path:
              - advertiser_campaign_id
            value: '{{ record["advertiser_id"] }}-{{ record["campaign_id"] }}'
  - type: DeclarativeStream
