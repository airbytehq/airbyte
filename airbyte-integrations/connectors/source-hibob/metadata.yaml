data:
  allowedHosts:
    hosts:
      - api.hibob.com
      - api.sandbox.hibob.com
  registryOverrides:
    oss:
      enabled: true
    cloud:
      enabled: true
  releases:
    breakingChanges:
      1.0.0:
        message: "This version replaces the existing HiBob implementation with the current public API, removes the payroll stream, and changes available streams and schemas. Refresh the source schema and reset affected streams after upgrading. See https://docs.airbyte.com/integrations/sources/hibob-migrations for full migration details."
        upgradeDeadline: "2026-05-28"
        scopedImpact:
          - scopeType: stream
            impactedScopes:
              - employees
              - profiles
              - payroll
    rolloutConfiguration:
      enableProgressiveRollout: false
  suggestedStreams:
    streams:
      - employees
      - profiles
      - employee_fields
      - company_named_lists
      - work_history
      - lifecycle_history
      - employment_history
      - time_off_request_changes
      - job_roles
  remoteRegistries:
    pypi:
      enabled: false
      packageName: airbyte-source-hibob
  connectorBuildOptions:
    baseImage: docker.io/airbyte/source-declarative-manifest:7.17.4@sha256:f85ae668c118cc9a42dae007325b916d63c2df72d6809677582b4fa8a1c65bbb
  connectorSubtype: api
  connectorType: source
  definitionId: 4dc991ed-3dcc-4c40-ac28-9402836709f1
  dockerImageTag: 1.0.0
  dockerRepository: airbyte/source-hibob
  githubIssueLabel: source-hibob
  icon: icon.svg
  license: ELv2
  name: Hibob
  releaseDate: 2024-08-06
  releaseStage: alpha
  supportLevel: community
  documentationUrl: https://docs.airbyte.com/integrations/sources/hibob
  tags:
    - cdk:low-code
    - language:manifest-only
  externalDocumentationUrls:
    - title: HiBob API documentation
      url: https://apidocs.hibob.com/
      type: api_reference
    - title: HiBob authentication
      url: https://apidocs.hibob.com/docs/authentication
      type: authentication_guide
  connectorTestSuitesOptions:
    - suite: unitTests
    - suite: acceptanceTests
      testSecrets:
        - name: SECRET_SOURCE-HIBOB__CREDS
          fileName: config.json
          secretStore:
            type: GSM
            alias: airbyte-connector-testing-secret-store
metadataSpecVersion: "1.0"
