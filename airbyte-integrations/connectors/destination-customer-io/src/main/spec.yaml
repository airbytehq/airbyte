documentationUrl: https://docs.airbyte.com/integrations/enterprise-connectors/destination-customer-io
connectionSpecification:
  $schema: http://json-schema.org/draft-07/schema#
  title: CustomerIO Destination Spec
  type: object
  required:
    - credentials
  additionalProperties: true
  properties:
    credentials:
      title: Credentials used to authenticate
      description: Enter the site_id and api_key to authenticate
      type: object
      required:
        - site_id
        - api_key
      properties:
        site_id:
          type: string
          airbyte_secret: true
          order: 1
        api_key:
          type: string
          airbyte_secret: true
          order: 2
    identifier_type:
      title: Person Identifier Type
      description: >-
        The identifier type to use for matching people in Customer.io.
        'email' uses the person's email address (default).
        'id' uses a case-sensitive unique identifier you assign (e.g. backend user ID).
        'cio_id' uses the immutable identifier generated by Customer.io.
      type: string
      enum:
        - email
        - id
        - cio_id
      default: email
      order: 3
