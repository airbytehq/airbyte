      - api-m.sandbox.paypal.com
  connectorBuildOptions:
    baseImage: docker.io/airbyte/source-declarative-manifest:7.6.0@sha256:9c0ea900af7e20d119da0446fc1679ca4015c5c5f7a3b022d321071570a78749
  connectorSubtype: api
