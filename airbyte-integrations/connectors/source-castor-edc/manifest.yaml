version: 7.10.0

type: DeclarativeSource

description: "Documentation: https://uk.castoredc.com/api#/"

concurrency_level:
  type: ConcurrencyLevel
  default_concurrency: 2

check:
  type: CheckStream
  stream_names:
    - user

definitions:
  linked:
    HttpRequester:
      url_base: https://{{ config['url_region'] }}.castoredc.com/api/
      authenticator:
        type: OAuthAuthenticator
        client_id: "{{ config[\"client_id\"] }}"
        grant_type: client_credentials
        client_secret: "{{ config[\"client_secret\"] }}"
        refresh_request_body: {}
        token_refresh_endpoint: https://{{ config['url_region'] }}.castoredc.com/oauth/token
      error_handler:
        type: CompositeErrorHandler
        error_handlers:
          - type: DefaultErrorHandler
            max_retries: 15
            response_filters:
              - type: HttpResponseFilter
                action: RATE_LIMITED
                http_codes:
                  - 429
                error_message: Rate limits has been hit
              - type: HttpResponseFilter
                action: IGNORE
                http_codes:
                  - 404
            backoff_strategies:
              - type: WaitUntilTimeFromHeader
                header: X-RateLimit-Retry-After
              - type: WaitTimeFromHeader
                header: Retry-After
              - type: ExponentialBackoffStrategy
                factor: 5
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: page_size
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: page
          inject_into: request_parameter
        pagination_strategy:
          type: PageIncrement
          page_size: 50
          start_from_page: 1
          inject_on_first_request: true

streams:
  - type: DeclarativeStream
    name: user
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        path: user
        url_base:
          $ref: "#/definitions/linked/HttpRequester/url_base"
        http_method: GET
        authenticator:
          $ref: "#/definitions/linked/HttpRequester/authenticator"
        error_handler:
          $ref: "#/definitions/linked/HttpRequester/error_handler"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - _embedded
            - user
    primary_key:
      - id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        required:
          - id
          - last_login
        properties:
          id:
            type: string
          _links:
            type:
              - object
              - "null"
            properties:
              self:
                type:
                  - object
                  - "null"
                properties:
                  href:
                    type:
                      - string
                      - "null"
          user_id:
            type:
              - string
              - "null"
          entity_id:
            type:
              - string
              - "null"
          full_name:
            type:
              - string
              - "null"
          name_last:
            type:
              - string
              - "null"
          last_login:
            type: string
          name_first:
            type:
              - string
              - "null"
          email_address:
            type:
              - string
              - "null"
        additionalProperties: true
    incremental_sync:
      type: DatetimeBasedCursor
      cursor_field: last_login
      end_datetime:
        type: MinMaxDatetime
        datetime: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"
        datetime_format: "%Y-%m-%dT%H:%M:%SZ"
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ config[\"start_date\"] }}"
        datetime_format: "%Y-%m-%dT%H:%M:%SZ"
      datetime_format: "%Y-%m-%d %H:%M:%S"
      cursor_datetime_formats:
        - "%Y-%m-%d %H:%M:%S"
  - type: DeclarativeStream
    name: study
    retriever:
      type: SimpleRetriever
      paginator:
        $ref: "#/definitions/linked/SimpleRetriever/paginator"
      requester:
        type: HttpRequester
