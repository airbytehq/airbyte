spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - url_region
      - client_id
      - client_secret
      - start_date
    properties:
      study_id:
        type: string
        description: "The study ID to sync (e.g. F034C516-752E-4272-B32B-C39CC94CFBE7). If left empty, all studies will be synced."
        order: 6
        title: Study ID
      client_id:
        type: string
        description: Visit `https://YOUR_REGION.castoredc.com/account/settings`
        order: 1
        title: Client ID
        airbyte_secret: true
      start_date:
        type: string
        order: 3
        title: Start date
        format: date-time
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$
      url_region:
        type: string
        description: The url region given at time of registration
        enum:
          - uk
          - nl
          - us
          - data
        order: 0
        title: URL Region
        default: uk
      client_secret:
        type: string
        description: Visit `https://YOUR_REGION.castoredc.com/account/settings`
        order: 2
        title: Client secret
        airbyte_secret: true
      client_access_token:
        type: string
        order: 5
        title: Access token
        airbyte_secret: true
      client_refresh_token:
        type: string
        order: 4
        title: Refresh token
        airbyte_secret: true
    additionalProperties: true

