version: 6.0.0

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - deals

streams:
  - type: DeclarativeStream
    name: deals
    retriever:
      type: SimpleRetriever
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: size
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: page
          inject_into: request_parameter
        pagination_strategy:
          type: PageIncrement
          page_size: 20
          start_from_page: 2
      requester:
        type: HttpRequester
        url: https://supplier.ziftone.com/api/dealregistration/deals/
        http_method: GET
        authenticator:
          type: SessionTokenAuthenticator
          login_requester:
            type: HttpRequester
            url: https://supplier.ziftone.com/api/authorization/login
            http_method: POST
            request_body:
              type: RequestBodyJsonObject
              value:
                password: "{{ config['ziftone_password'] }}"
                userType: SUPPLIER
                username: "{{ config['ziftone_username'] }}"
          session_token_path:
            - token
          request_authentication:
            type: ApiKey
            inject_into:
              type: RequestOption
              field_name: Authorization
              inject_into: header
        error_handler:
          type: CompositeErrorHandler
          error_handlers:
            - type: DefaultErrorHandler
              max_retries: 10
              response_filters:
                - type: HttpResponseFilter
                  action: RETRY
                  http_codes:
                    - 429
                    - 500
              backoff_strategies:
                - type: ExponentialBackoffStrategy
                  factor: 5
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - content
    primary_key: dealId
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        required:
          - dealId
          - updateDate
