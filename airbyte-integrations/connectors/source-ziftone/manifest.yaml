        type: MinMaxDatetime
        datetime: "{{ config.get('start_time') or '2000-01-01T00:00:00Z' }}"
      datetime_format: "%Y-%m-%dT%H:%M:%SZ"
      start_time_option:
        type: RequestOption
        field_name: updateDateFrom
        inject_into: request_parameter

spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - ziftone_username
      - ziftone_password
    properties:
      start_time:
        type: string
        order: 2
        title: Start time
        format: date-time
        default: "2026-01-01T00:00:00Z"
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$
      ziftone_password:
        type: string
        order: 1
        title: ZiftONE Password
        airbyte_secret: true
      ziftone_username:
        type: string
        description: An email address
        order: 0
        title: ZiftONE Username
    additionalProperties: true

metadata:
  testedStreams:
    deals:
      isStale: false
      hasRecords: true
      streamHash: 1db6b6cb4e0b6ced414aa9a60ecbf146c14d5e97
      hasResponse: true
      primaryKeysAreUnique: true
      primaryKeysArePresent: true
      responsesAreSuccessful: true
    stream_0:
      streamHash: ad11f9fa446b445a056b0f48d54e74059e0bc977
  autoImportSchema:
