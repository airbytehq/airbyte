version: 7.4.2

type: DeclarativeSource

description: >-
  Interzoid is an AI-powered API platform providing data quality, data matching,
  and data enrichment capabilities that help Airbyte pipelines deliver higher
  data ROI. This connector enables you to call Interzoid's APIs directly from
  your Airbyte workflows to match records, enrich attributes, normalize and
  standardize fields, or verify data as part of your extraction and loading
  processes. The result is cleaner, more consistent, and more actionable
  datasets flowing through your Airbyte integrations—without additional
  engineering overhead.

check:
  type: CheckStream
  stream_names:
    - Company Name Matching
    - Individual Name Matching
    - Street Address Matching
    - Standardize Company Names

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: ApiKeyAuthenticator
        api_token: "{{ config['api_key'] }}"
        inject_into:
          type: RequestOption
          field_name: license
          inject_into: request_parameter

streams:
  - type: DeclarativeStream
    name: Company Name Matching
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url: https://api.interzoid.com/getcompanymatchadvanced
        http_method: GET
        authenticator:
          type: ApiKeyAuthenticator
          api_token: "{{ config['api_key'] }}"
          inject_into:
            type: RequestOption
            field_name: license
            inject_into: request_parameter
        request_parameters:
          company: "{{ config['company'] }}"
          algorithm: "{{ config['company_match_algorithm'] }}"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: []
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        properties:
          Code:
            type:
              - string
              - "null"
          SimKey:
            type:
              - string
              - "null"
          Credits:
            type:
              - string
              - "null"
        additionalProperties: true
  - type: DeclarativeStream
    name: Individual Name Matching
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url: https://api.interzoid.com/getfullnamematch
        http_method: GET
        authenticator:
          type: ApiKeyAuthenticator
          api_token: "{{ config['api_key'] }}"
          inject_into:
            type: RequestOption
            field_name: license
            inject_into: request_parameter
        request_parameters:
          fullname: "{{ config['fullname'] }}"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: []
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        properties:
          Code:
            type:
              - string
              - "null"
          SimKey:
            type:
              - string
              - "null"
          Credits:
            type:
              - string
              - "null"
        additionalProperties: true
  - type: DeclarativeStream
    name: Street Address Matching
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url: https://api.interzoid.com/getaddressmatchadvanced
        http_method: GET
        authenticator:
          type: ApiKeyAuthenticator
          api_token: "{{ config['api_key'] }}"
          inject_into:
            type: RequestOption
            field_name: license
            inject_into: request_parameter
        request_parameters:
          address: "{{ config['address'] }}"
          algorithm: "{{ config['address_match_algorithm'] }}"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: []
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        properties:
          Code:
            type:
              - string
              - "null"
          SimKey:
            type:
              - string
              - "null"
          Credits:
            type:
              - string
              - "null"
        additionalProperties: true
  - type: DeclarativeStream
    name: Standardize Company Names
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url: https://api.interzoid.com/getorgstandard
        http_method: GET
        authenticator:
          type: ApiKeyAuthenticator
          api_token: "{{ config['api_key'] }}"
          inject_into:
            type: RequestOption
            field_name: license
            inject_into: request_parameter
        request_parameters:
          org: "{{ config['org'] }}"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: []
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        properties:
          Code:
            type:
              - string
              - "null"
          Credits:
            type:
              - string
              - "null"
          Standard:
            type:
              - string
              - "null"
        additionalProperties: true

spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - api_key
    properties:
      api_key:
        type: string
        order: 0
        title: API Key
        description: Your Interzoid API key.
        airbyte_secret: true
      company:
        type: string
        order: 1
        title: Company Name
        description: Company name for the Company Name Matching stream.
      company_match_algorithm:
        type: string
        order: 2
        title: Company Match Algorithm
        description: Algorithm for company name matching (e.g. model-v4-wide).
        default: "model-v4-wide"
      fullname:
        type: string
        order: 3
        title: Full Name
        description: Full name for the Individual Name Matching stream.
      address:
        type: string
        order: 4
        title: Street Address
        description: Street address for the Street Address Matching stream.
      address_match_algorithm:
        type: string
        order: 5
        title: Address Match Algorithm
        description: Algorithm for address matching (e.g. model-v3-narrow).
        default: "model-v3-narrow"
      org:
        type: string
        order: 6
        title: Organization Name
        description: Organization name for the Standardize Company Names stream.
    additionalProperties: true

