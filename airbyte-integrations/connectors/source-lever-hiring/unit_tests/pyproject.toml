[build-system]
requires = [ "poetry-core>=1.0.0",]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "source-lever-hiring-tests"
version = "0.0.0"
description = "Unit tests for source-lever-hiring"
authors = ["Airbyte <contact@airbyte.io>"]

[tool.poetry.dependencies]
python = "^3.10,<3.13"
airbyte-cdk = "^6"
pytest = "^8"
requests-mock = "^1"
pyyaml = "^6"

[tool.pytest.ini_options]
filterwarnings = [
    "ignore:This class is experimental*"
]
