        - name: SECRET_SOURCE-GOOGLE-SEARCH-CONSOLE_SERVICE_ACCOUNT__CREDS
          fileName: service_account_config.json
          secretStore:
            type: GSM
            alias: airbyte-connector-testing-secret-store
