spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - api_key
    properties:
      api_key:
        type: string
        title: Api Key
        airbyte_secret: true
        description: >-
          Your API Access Key. See <a
          href="https://docs.secoda.co/api/authentication">here</a>. The
          key is case sensitive.
        order: 0
      api_host:
        type: string
        title: API Host
        description: >-
          The API host for your Secoda workspace. Standard regions:
          api.secoda.co (US), eapi.secoda.co (EU), aapi.secoda.co (APAC).
          For on-premise or managed instances, use your custom domain.
        examples:
          - api.secoda.co
          - eapi.secoda.co
          - aapi.secoda.co
        default: api.secoda.co
        order: 1
    additionalProperties: true
