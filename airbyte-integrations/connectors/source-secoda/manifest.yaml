version: 6.48.0
type: DeclarativeSource
check:
  type: CheckStream
  stream_names:
    - collections
definitions:
  base_requester:
    type: HttpRequester
    url_base: "https://{{ config.get('api_host', 'api.secoda.co') }}"
    authenticator:
      type: BearerAuthenticator
      api_token: "{{ config['api_key'] }}"
    error_handler:
      type: CompositeErrorHandler
      error_handlers:
        - type: DefaultErrorHandler
          response_filters:
            - type: HttpResponseFilter
              http_codes:
                - 429
              action: RETRY
          backoff_strategies:
            - type: WaitTimeFromHeader
              header: Retry-After
        - type: DefaultErrorHandler
          response_filters:
            - type: HttpResponseFilter
              http_codes:
                - 500
              action: FAIL
  base_paginator:
    type: DefaultPaginator
    page_token_option:
      type: RequestPath
    pagination_strategy:
      type: CursorPagination
      cursor_value: "{{ response.get('links', {}).get('next') }}"
      stop_condition: "{{ response.get('links', {}).get('next') is none }}"
  ai_offset_paginator:
    type: DefaultPaginator
    page_token_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: offset
    page_size_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: limit
    pagination_strategy:
      type: OffsetIncrement
      page_size: 20
  incremental_sync_updated_at:
    type: DatetimeBasedCursor
    cursor_field: updated_at
    cursor_datetime_formats:
      - "%Y-%m-%dT%H:%M:%S.%fZ"
      - "%Y-%m-%dT%H:%M:%SZ"
    datetime_format: "%Y-%m-%dT%H:%M:%SZ"
    start_datetime:
      type: MinMaxDatetime
      datetime: "2020-01-01T00:00:00Z"
      datetime_format: "%Y-%m-%dT%H:%M:%SZ"
    is_client_side_incremental: true
  incremental_sync_created_at:
    type: DatetimeBasedCursor
    cursor_field: created_at
    cursor_datetime_formats:
      - "%Y-%m-%dT%H:%M:%S.%fZ"
      - "%Y-%m-%dT%H:%M:%SZ"
    datetime_format: "%Y-%m-%dT%H:%M:%SZ"
    start_datetime:
      type: MinMaxDatetime
      datetime: "2020-01-01T00:00:00Z"
      datetime_format: "%Y-%m-%dT%H:%M:%SZ"
    is_client_side_incremental: true
  streams:
