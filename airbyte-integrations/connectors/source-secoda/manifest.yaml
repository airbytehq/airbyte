      type: DeclarativeStream
      name: tables
      primary_key:
        - id
      retriever:
        type: SimpleRetriever
        requester:
          $ref: "#/definitions/base_requester"
          path: /api/v1/table/tables
          http_method: GET
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - results
        paginator:
          $ref: "#/definitions/base_paginator"
      incremental_sync:
        $ref: "#/definitions/incremental_sync_updated_at"
      schema_loader:
        type: InlineSchemaLoader
