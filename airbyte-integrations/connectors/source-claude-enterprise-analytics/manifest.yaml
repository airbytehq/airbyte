version: 7.0.4

type: DeclarativeSource

description: Claude Enterprise Analytics API endpoints

check:
  type: CheckStream
  stream_names:
    - user_activity

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: ApiKeyAuthenticator
        header: x-api-key
        api_token: "{{ config['admin_api_key'] }}"
      error_handler:
        type: DefaultErrorHandler
        max_retries: 5
        response_filters:
          - type: HttpResponseFilter
            http_codes:
              - 429
        backoff_strategies:
          - type: WaitTimeFromHeader
            header: retry-after
            max_waiting_time_in_seconds: 60
      request_headers:
        anthropic-version: "2023-06-01"
      request_parameters:
        bucket_width: 1d
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_token_option:
          type: RequestOption
          field_name: page
          inject_into: request_parameter
        pagination_strategy:
          type: CursorPagination
          cursor_value: "{{ response.next_page }}"
          stop_condition: "{{ response.has_more == False }}"

streams:
  - type: DeclarativeStream
    name: user_activity
    retriever:
      type: SimpleRetriever
      paginator:
        $ref: "#/definitions/linked/SimpleRetriever/paginator"
      requester:
        type: HttpRequester
        url: https://api.anthropic.com/v1/organizations/analytics/users
