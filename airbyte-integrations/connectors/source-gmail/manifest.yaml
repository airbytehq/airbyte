                - object
                - "null"
              properties:
                name:
                  type:
                    - string
                    - "null"
                value:
                  type:
                    - string
                    - "null"
          mimeType:
            type:
              - string
              - "null"
          partId:
            type:
              - string
              - "null"
          parts:
            type:
              - array
              - "null"
            items:
              type:
                - object
                - "null"
              properties:
                body:
                  type:
                    - object
                    - "null"
                  properties:
                    data:
                      type:
                        - string
                        - "null"
                    size:
                      type:
                        - number
                        - "null"
                filename:
                  type:
                    - string
                    - "null"
                headers:
                  type:
