            - string
            - "null"
      payload:
        type:
          - object
          - "null"
        properties:
          body:
            type:
              - object
              - "null"
            properties:
              data:
                type:
                  - string
                  - "null"
              size:
                type:
                  - number
                  - "null"
          filename:
            type:
              - string
              - "null"
          headers:
            type:
              - array
              - "null"
            items:
