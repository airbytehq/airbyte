      type: permissions_scopes
    - title: Azure Storage - Scalability and performance
      url: https://learn.microsoft.com/en-us/azure/storage/blobs/scalability-targets
      type: rate_limits
    - title: Azure status
      url: https://status.azure.com/
      type: status_page
