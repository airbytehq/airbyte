  releases:
    rolloutConfiguration:
      enableProgressiveRollout: false
    breakingChanges:
      1.0.0:
        message: Version 1.0.0 removes the primary keys from the geographic performance report streams. This will prevent the connector from losing data in the incremental append+dedup sync mode because of deduplication and incorrect primary keys. A data reset and schema refresh of all the affected streams is required for the changes to take effect.
        upgradeDeadline: "2023-10-25"
      2.0.0:
        message: >
          Version 2.0.0 updates schemas for all hourly reports (end in report_hourly),
          and the following streams: Accounts, Campaigns, Search Query Performance
          Report, AppInstallAds, AppInstallAdLabels, Labels, Campaign Labels, Keyword
          Labels, Ad Group Labels, Keywords, and Budget Summary Report.
          Users will need to refresh the source schema and reset affected streams
          after upgrading.
        upgradeDeadline: "2023-12-11"
      3.0.0:
        message: >
          Version 3.0.0 expands the primary keys of all report streams to include every
          attribute (dimension) column the connector requests from Microsoft's reporting
          API. Microsoft returns one row per unique combination of all requested attribute
          columns, so when the previous (narrower) primary keys were used for
          incremental append+dedup, destinations silently collapsed rows that differed
          only on a requested-but-not-in-PK attribute, causing significant data loss
          (see https://github.com/airbytehq/oncall/issues/12253). Users must refresh the
          source schema and reset the affected report streams after upgrading for the
          new primary keys to take effect and previously-collapsed rows to be backfilled.
        upgradeDeadline: "2026-07-16"
        scopedImpact:
          - scopeType: stream
            impactedScopes:
