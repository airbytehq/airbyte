                  - string
                  - "null"
              length:
                type:
                  - number
                  - "null"
              encoding:
                type:
                  - string
                  - "null"
              messagePartCount:
                type:
                  - number
                  - "null"
          from:
            type:
              - string
              - "null"
          href:
