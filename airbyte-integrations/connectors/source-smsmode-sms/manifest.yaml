      type: SimpleRetriever
      decoder:
        type: JsonDecoder
      paginator:
        type: DefaultPaginator
        pagination_strategy:
          type: PageIncrement
          page_size: 100
          start_from_page: 1
      requester:
        type: HttpRequester
        url: https://rest.smsmode.com/commons/v1/consumptions
        http_method: GET
        authenticator:
          type: ApiKeyAuthenticator
