spec:
  type: Spec
  documentation_url: >-
    https://dev.smsmode.com/sms/v1/#tag/Callback/operation/receive-sms-mo-message
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - api_key
    properties:
      api_key:
        type: string
        description: >-
          Your smsmode API key. You can generate and manage API keys in the
          smsmode dashboard under the 'Credentials' section:
          https://dev.smsmode.com/commons/v1/#tag/Credential. Make sure the key
          is active and has the required permissions for your use case.
        name: api_key
        order: 0
        title: API Key
        airbyte_secret: true
    additionalProperties: true

