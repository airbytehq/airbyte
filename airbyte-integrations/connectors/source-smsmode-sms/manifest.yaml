version: 7.17.1

type: DeclarativeSource

description: >-
  A source connector for the smsmode API dedicated to standard SMS services,
  supporting message logs and general consumption data synchronization.

check:
  type: CheckStream
  stream_names:
    - messages

definitions:
  linked:
    HttpRequester:
      request_headers:
        Accept: application/json

streams:
  - type: DeclarativeStream
    name: messages
    retriever:
      type: SimpleRetriever
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: pageSize
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: page
          inject_into: request_parameter
        pagination_strategy:
          type: PageIncrement
          page_size: 100
          start_from_page: 1
      requester:
        type: HttpRequester
        url: https://rest.smsmode.com/sms/v1/messages
        http_method: GET
        authenticator:
          type: ApiKeyAuthenticator
          api_token: "{{ config[\"api_key\"] }}"
          inject_into:
            type: RequestOption
            field_name: X-Api-Key
            inject_into: header
        request_headers:
          Accept: application/json
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - items
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
