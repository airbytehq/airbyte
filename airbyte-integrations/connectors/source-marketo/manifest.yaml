          - "null"
          - integer
      createdAt:
        type:
          - "null"
          - string
        format: date-time
      updatedAt:
        type:
          - "null"
          - string
        format: date-time
      active:
        type:
          - "null"
          - boolean
      description:
        type:
          - "null"
          - string
      name:
        type:
          - "null"
          - string
      programId:
        type:
          - "null"
          - integer
      programName:
        type:
          - "null"
          - string
      type:
        type:
          - "null"
          - string
      workspaceName:
        type:
          - "null"
          - string

  lists:
    $schema: http://json-schema.org/draft-07/schema#
    type:
      - object
      - "null"
    additionalProperties: true
    properties:
      id:
        type:
          - integer
          - "null"
      name:
        type:
          - string
          - "null"
      createdAt:
        type:
          - string
          - "null"
        format: date-time
      updatedAt:
        type:
          - string
          - "null"
        format: date-time
      description:
        type:
          - string
          - "null"
      programName:
        type:
          - string
          - "null"
      workspaceName:
        type:
          - string
          - "null"
      workspaceId:
        type:
          - integer
          - "null"

  programs:
    $schema: http://json-schema.org/draft-07/schema#
    type:
      - object
      - "null"
    additionalProperties: true
    properties:
      id:
        type:
          - integer
          - "null"
      createdAt:
        type:
          - string
          - "null"
        format: date-time
      updatedAt:
        type:
          - string
          - "null"
        format: date-time
      name:
        type:
          - string
          - "null"
      description:
        type:
          - "null"
          - string
      url:
        type:
          - "null"
          - string
      type:
        type:
          - "null"
          - string
      channel:
        type:
          - "null"
          - string
      status:
        type:
          - "null"
          - string
      workspace:
        type:
          - "null"
          - string
      headStart:
        type:
          - "null"
          - boolean
      isHeadStart:
        type:
          - "null"
          - boolean
      folder:
        type:
          - object
          - "null"
        properties:
          type:
            type:
              - "null"
              - string
          value:
            type:
              - "null"
              - integer
          folderName:
            type:
              - "null"
              - string

  segmentations:
    $schema: http://json-schema.org/draft-07/schema#
    type:
      - object
      - "null"
    additionalProperties: true
    properties:
      createdAt:
        type:
          - string
          - "null"
        format: date-time
      updatedAt:
        type:
          - string
          - "null"
        format: date-time
      id:
        type:
          - integer
          - "null"
      description:
        type:
          - "null"
          - string
      name:
        type:
          - "null"
          - string
      url:
        type:
          - "null"
          - string
      status:
        type:
          - "null"
          - string
      folder:
        type:
          - "null"
          - object
        properties:
          type:
