data:
  ab_internal:
    ql: 200
    sl: 100
  allowedHosts:
    hosts:
      - "*.mktorest.com"
  connectorBuildOptions:
    baseImage: docker.io/airbyte/python-connector-base:4.0.2@sha256:9fdb1888c4264cf6fee473649ecb593f56f58e5d0096a87ee0b231777e2e3e73
  connectorSubtype: api
  connectorType: source
  definitionId: 9e0556f4-69df-4522-a3fb-03264d36b348
  dockerImageTag: 2.0.0
  dockerRepository: airbyte/source-marketo
  documentationUrl: https://docs.airbyte.com/integrations/sources/marketo
  githubIssueLabel: source-marketo
  icon: marketo.svg
  license: ELv2
  maxSecondsBetweenMessages: 86400
  name: Marketo
  remoteRegistries:
    pypi:
      enabled: true
      packageName: airbyte-source-marketo
  registryOverrides:
    cloud:
      enabled: true
    oss:
      enabled: true
  releaseStage: generally_available
  releases:
    breakingChanges:
      2.0.0:
        message: >
          This release migrates the Leads and Activities bulk export streams to the
          low-code framework. Six activity stream names change due to the new naming
          convention: activities_add_to_list (was activities_addto_list),
          activities_push_lead_to_marketo (was activities_push_leadto_marketo),
          activities_remove_from_list (was activities_removefrom_list),
          activities_change_status_in_progression (was activities_change_statusin_progression),
          activities_add_to_opportunity (was activities_addto_opportunity),
          activities_remove_from_opportunity (was activities_removefrom_opportunity).
          After upgrading, refresh your schema and reset the affected activity streams.
        upgradeDeadline: "2026-04-16"
        scopedImpact:
          - scopeType: stream
            impactedScopes:
              - activities_addto_list
              - activities_push_leadto_marketo
              - activities_removefrom_list
              - activities_change_statusin_progression
              - activities_addto_opportunity
              - activities_removefrom_opportunity
  supportLevel: community
  tags:
    - language:python
    - cdk:low-code
  connectorTestSuitesOptions:
    - suite: liveTests
      testConnections:
        - name: marketo_config_dev_null
          id: 4df9fc18-4d29-44c5-aa52-c74d8066d0bd
    - suite: unitTests
    - suite: acceptanceTests
      testSecrets:
        - name: SECRET_SOURCE-MARKETO__CREDS
          fileName: config.json
          secretStore:
            type: GSM
            alias: airbyte-connector-testing-secret-store
  externalDocumentationUrls:
    - title: Marketo REST API
      url: https://developers.marketo.com/rest-api/
      type: api_reference
    - title: Marketo authentication
      url: https://developers.marketo.com/rest-api/authentication/
      type: authentication_guide
    - title: Marketo rate limits
      url: https://developers.marketo.com/rest-api/marketo-integration-best-practices/#api_limits
      type: rate_limits
metadataSpecVersion: "1.0"
