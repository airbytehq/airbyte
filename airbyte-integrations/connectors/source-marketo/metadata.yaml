data:
  ab_internal:
    ql: 200
    sl: 100
  allowedHosts:
    hosts:
      - "*.mktorest.com"
  connectorBuildOptions:
    baseImage: docker.io/airbyte/python-connector-base:4.0.2@sha256:9fdb1888c4264cf6fee473649ecb593f56f58e5d0096a87ee0b231777e2e3e73
  connectorSubtype: api
  connectorType: source
  definitionId: 9e0556f4-69df-4522-a3fb-03264d36b348
  dockerImageTag: 2.0.0
  dockerRepository: airbyte/source-marketo
  documentationUrl: https://docs.airbyte.com/integrations/sources/marketo
  githubIssueLabel: source-marketo
  icon: marketo.svg
  license: ELv2
  maxSecondsBetweenMessages: 86400
  name: Marketo
  releases:
    breakingChanges:
      2.0.0:
        message: >-
          The `leads` stream now filters Marketo's Bulk Lead Extract on `updatedAt`
          instead of `createdAt`, so incremental syncs capture updates to
          pre-existing leads (previously silently dropped). Users syncing the
          `leads` stream in incremental mode should refresh the source schema
          and reset the stream after upgrading to backfill historical updates
          missed by earlier versions. Full refresh syncs of `leads` are not
          affected. See the migration guide for details.
        upgradeDeadline: "2026-05-22"
        deadlineAction: "auto_upgrade"
        scopedImpact:
          - scopeType: stream
            impactedScopes:
              - leads
  remoteRegistries:
    pypi:
      enabled: true
      packageName: airbyte-source-marketo
  registryOverrides:
    cloud:
      enabled: true
    oss:
      enabled: true
  releaseStage: generally_available
  supportLevel: community
  tags:
    - language:python
    - cdk:low-code
  connectorTestSuitesOptions:
    - suite: liveTests
      testConnections:
        - name: marketo_config_dev_null
          id: 4df9fc18-4d29-44c5-aa52-c74d8066d0bd
    - suite: unitTests
    - suite: acceptanceTests
      testSecrets:
        - name: SECRET_SOURCE-MARKETO__CREDS
          fileName: config.json
          secretStore:
            type: GSM
            alias: airbyte-connector-testing-secret-store
  externalDocumentationUrls:
    - title: Marketo REST API
      url: https://developers.marketo.com/rest-api/
      type: api_reference
    - title: Marketo authentication
      url: https://developers.marketo.com/rest-api/authentication/
      type: authentication_guide
    - title: Marketo rate limits
      url: https://developers.marketo.com/rest-api/marketo-integration-best-practices/#api_limits
      type: rate_limits
metadataSpecVersion: "1.0"
