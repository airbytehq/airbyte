      requester:
        type: HttpRequester
        url: https://api.ramp.com/developer/v1/transactions
        http_method: GET
        authenticator:
          type: SessionTokenAuthenticator
          login_requester:
            type: HttpRequester
            url: https://api.ramp.com/developer/v1/token
            http_method: POST
            authenticator:
              type: BasicHttpAuthenticator
              password: "{{ config['client_secret'] }}"
              username: "{{ config['client_id'] }}"
            error_handler:
              type: DefaultErrorHandler
              max_retries: 5
            request_headers:
              Content-Type: application/x-www-form-urlencoded
            request_body:
              type: RequestBodyUrlEncodedForm
              value:
                scope: transactions:read cards:read reimbursements:read
                grant_type: client_credentials
          session_token_path:
            - access_token
          expiration_duration: PT240H
          request_authentication:
            type: Bearer
        error_handler:
          type: DefaultErrorHandler
          max_retries: 5
          response_filters:
            - type: HttpResponseFilter
              action: RETRY
              http_codes:
                - 429
                - 500
                - 502
                - 503
                - 504
          backoff_strategies:
            - type: ExponentialBackoffStrategy
              factor: 2
        request_headers:
          Content-Type: application/json
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
    primary_key:
      - id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/draft-07/schema#
        required:
          - id
        properties:
          id:
            type: string
            description: Ramp transaction UUID
          memo:
            type:
              - string
              - "null"
          state:
            type:
              - string
              - "null"
            description: e.g. PENDING
          amount:
            type:
              - number
              - "null"
          card_id:
            type:
              - string
              - "null"
            description: Join key to cards stream
          trip_id:
            type:
              - string
              - "null"
          disputes:
            type:
              - array
              - "null"
          limit_id:
            type:
              - string
              - "null"
          receipts:
            type:
              - array
              - "null"
          entity_id:
            type:
              - string
              - "null"
          synced_at:
            type:
              - string
              - "null"
            description: >-
              ERP sync time. Null if not yet synced. Candidate substitute for
              `updated_at` in eventual incremental design.
          trip_name:
            type:
              - string
              - "null"
          line_items:
            type:
              - array
              - "null"
          card_holder:
            type:
              - object
              - "null"
            description: Nested - first_name, employee_id, location_name, etc.
          merchant_id:
            type:
              - string
              - "null"
          sync_status:
            type:
              - string
              - "null"
            description: e.g. NOT_SYNC_READY
          card_present:
            type:
              - boolean
              - "null"
          currency_code:
            type:
              - string
              - "null"
            description: e.g. USD
          merchant_name:
            type:
              - string
              - "null"
          sk_category_id:
            type:
              - integer
              - "null"
          accounting_date:
            type:
              - string
              - "null"
          settlement_date:
            type:
              - string
              - "null"
          sk_category_name:
            type:
              - string
              - "null"
          spend_program_id:
            type:
              - string
              - "null"
          merchant_location:
            type:
              - object
              - "null"
          policy_violations:
            type:
              - array
              - "null"
          merchant_descriptor:
            type:
              - string
              - "null"
          network_merchant_id:
            type:
              - string
              - "null"
          accounting_categories:
            type:
              - array
              - "null"
          user_transaction_time:
            type:
              - string
              - "null"
            description: >-
              When the transaction occurred. Candidate for `from_date` filter
              for incremental.
          merchant_category_code:
            type:
              - string
              - "null"
          minor_unit_conversion_rate:
            type:
              - integer
              - "null"
          accounting_field_selections:
            type:
              - array
              - "null"
          original_transaction_amount:
            type:
              - object
              - "null"
            description: Nested - amount, minor_unit_conversion_rate, currency
          merchant_category_code_description:
            type:
              - string
              - "null"
        additionalProperties: true
    transformations:
      - type: KeysToSnakeCase
  - type: DeclarativeStream
    name: reimbursements
    retriever:
