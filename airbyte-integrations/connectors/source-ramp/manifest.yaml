spec:
  type: Spec
  documentation_url: https://docs.airbyte.com/integrations/sources/ramp
  connection_specification:
    $schema: http://json-schema.org/draft-07/schema#
    title: Ramp Source Spec
    type: object
    required:
    - start_date
    - credentials
    properties:
      start_date:
        type: string
        format: date-time
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$
        title: Start date
        description: UTC date-time in YYYY-MM-DDTHH:MM:SSZ. Earliest record fetched on first sync.
        examples:
        - '2023-01-01T00:00:00Z'
        order: 0
      use_sandbox:
        type: boolean
        title: Use sandbox
        description: Use Ramp's demo-api.ramp.com sandbox instead of production.
        default: false
        order: 1
      lookback_window_days:
        type: integer
        title: Lookback window (days)
        description: Re-fetches records from the past N days on every incremental sync. Most Ramp date filters are based on
          event date, not updated_at, so a lookback is required to capture late edits. Default 30.
        default: 30
        minimum: 0
        order: 2
      credentials:
        type: object
        title: Authentication
        order: 3
        required:
        - auth_type
        - client_id
        - client_secret
        properties:
          auth_type:
            type: string
            const: oauth2.0
            default: oauth2.0
            order: 0
          client_id:
            type: string
            title: Client ID
            description: The client ID of your Ramp Developer App.
            airbyte_secret: true
            order: 1
          client_secret:
            type: string
            title: Client secret
            description: The client secret of your Ramp Developer App.
            airbyte_secret: true
            order: 2
  advanced_auth:
    auth_flow_type: oauth2.0
    predicate_key:
    - credentials
    - auth_type
    predicate_value: oauth2.0
    oauth_config_specification:
      complete_oauth_server_input_specification:
        type: object
        additionalProperties: false
        properties:
          client_id:
            type: string
          client_secret:
            type: string
      complete_oauth_server_output_specification:
        type: object
        additionalProperties: false
        properties:
          client_id:
            type: string
            path_in_connector_config:
            - credentials
            - client_id
          client_secret:
            type: string
            path_in_connector_config:
            - credentials
            - client_secret
