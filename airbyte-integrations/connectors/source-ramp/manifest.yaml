                      QUASI_CASH: Cash-equivalent transactions not supported
                      ROUTED_TO_TERMINATED_SPEND_ALLOCATION: Spending limit has been terminated
                      STRIPE_WEBHOOK_TIMEOUT: Temporary processing error
                      SUSPECTED_BIN_ATTACK: Transaction declined for security reasons
                      SUSPECTED_FRAUD: Transaction flagged for suspected fraud
                      THREE_D_SECURE_REQUIRED: 3D Secure authentication required
                      USER_BLOCKED: User account is blocked
                      USER_TERMINATED: User account has been terminated
                      WRONG_ADDRESS: Incorrect billing address
                      WRONG_CVV: Incorrect CVV entered
                      WRONG_EXPIRATION: Incorrect expiration date entered
                      WRONG_POSTAL_CODE: Incorrect postal code entered
                type: object
              description: Details about a transaction decline.
            disputes:
              description: A list of disputes sorted in descending order by their creation time.
              items:
                properties:
                  created_at:
                    description: Time at which the dispute is created, presented in ISO8601 format.
                    format: date-time
                    type: string
                  id:
                    description: Uniquely identifies a transaction dispute.
                    format: uuid
                    type: string
                  memo:
                    description: Free form text regarding the dispute.
                    type: string
                  type:
                    description: 'The dispute type; It could be one of the following values: RESOLVED_BY_RAMP, CANCELLED_BY_CUSTOMER,
                      CANCELLED_BY_RAMP, CREATED_MERCHANT_ERROR and CREATED_UNRECOGNIZED_CHARGE.'
                    type: string
                type: object
              type: array
            entity_id:
              description: Unique identifier of business entity associated with the transaction.
              format: uuid
              type:
              - 'null'
              - string
              x-relationship:
                inverse_field_name: null
                reference_field_name: id
                target_resource: entities
                type: many-to-one
            id:
              format: uuid
              type: string
            limit_id:
              description: Unique identifier of the spend limit associated with the transaction
              format: uuid
              type: string
              x-relationship:
                inverse_field_name: null
                reference_field_name: id
                target_resource: limits
                type: many-to-one
            line_items:
              description: List of line items related to the transaction.
              items:
                properties:
                  accounting_field_selections:
                    description: List of accounting field options selected to code the line item.
                    items:
                      properties:
                        category_info:
                          allOf:
                          - properties:
                              external_id:
                                description: External ID of accounting field; It should uniquely identify an accounting field
                                  on the ERP.
                                type: string
                              id:
                                description: ID that uniquely identifies an accounting field within Ramp
                                format: uuid
                                type: string
                                x-relationship:
                                  inverse_field_name: null
                                  reference_field_name: ramp_id
                                  target_resource: accounting_fields
                                  type: many-to-many
                              name:
                                description: Name of accounting field
                                type: string
                              type:
                                description: Accounting field type
                                enum:
                                - AMORTIZATION_TEMPLATE
                                - BILLABLE
                                - COST_CENTER
                                - CUSTOMERS_JOBS
                                - DEFERRAL_CODE
                                - EXPENSE_ENTITY
                                - GL_ACCOUNT
                                - INVENTORY_ITEM
                                - JOURNAL
                                - MERCHANT
                                - NON_ERP
                                - OTHER
                                - PROJECT
                                - REPORTING_TAG
                                - SUBSIDIARY
                                - TAX_CODE
                                - UNIT_OF_MEASURE
                                type: string
                            type: object
                          description: Information about the accounting category (or accounting field).
                        external_code:
                          description: External code of accounting field option; Code field displayed on the ERP.
                          type: string
                        external_id:
                          description: External ID of accounting field option; It should uniquely identify an accounting field
                            option on the ERP.
                          type: string
                        id:
                          description: ID that uniquely identifies an accounting field option within Ramp
                          format: uuid
                          type: string
                          x-relationship:
                            inverse_field_name: null
                            reference_field_name: ramp_id
                            target_resource: custom_field_options
                            type: many-to-many
                        name:
                          description: Name of accounting field option
                          type: string
                        provider_name:
                          description: Name of accounting field provider
                          type: string
                        source:
                          allOf:
                          - properties:
                              type:
                                description: Describes the type of source that added this selection.
                                type: string
                            type: object
                          description: Describes the source of the accounting coding selection.
                        type:
                          description: Accounting field type
                          enum:
                          - AMORTIZATION_TEMPLATE
                          - BILLABLE
                          - COST_CENTER
                          - CUSTOMERS_JOBS
                          - DEFERRAL_CODE
                          - EXPENSE_ENTITY
                          - GL_ACCOUNT
                          - INVENTORY_ITEM
                          - JOURNAL
                          - MERCHANT
                          - NON_ERP
                          - OTHER
                          - PROJECT
                          - REPORTING_TAG
                          - SUBSIDIARY
                          - TAX_CODE
                          - UNIT_OF_MEASURE
                          type: string
                      required:
                      - provider_name
                      type: object
                    type: array
                  amount:
                    allOf:
                    - properties:
                        amount:
                          description: the amount of money represented in the smallest denomination of the currency. For example,
                            when the currency is USD, then the amount is expressed in cents.
                          type: integer
                        currency_code:
                          default: USD
                          description: The type of currency, in ISO 4217 format. e.g. USD for US dollars
                          type: string
                        minor_unit_conversion_rate:
                          description: The conversion factor to convert from the integer amount to the actual currency value.
                            Divide amount by this value to get the real currency amount. For USD, this is 100 (e.g., 12034
                            / 100 = 120.34 USD). See https://docs.ramp.com/developer-api/v1/monetary-values for more information.
                          type:
                          - 'null'
                          - integer
                      required:
                      - amount
                      - currency_code
                      - minor_unit_conversion_rate
                      type: object
                    description: Amount of the line item, denominated in the currency that the transaction was settled in.
                  converted_amount:
                    allOf:
                    - properties:
                        amount:
                          description: the amount of money represented in the smallest denomination of the currency. For example,
                            when the currency is USD, then the amount is expressed in cents.
                          type: integer
                        currency_code:
                          default: USD
                          description: The type of currency, in ISO 4217 format. e.g. USD for US dollars
                          type: string
                        minor_unit_conversion_rate:
                          description: The conversion factor to convert from the integer amount to the actual currency value.
                            Divide amount by this value to get the real currency amount. For USD, this is 100 (e.g., 12034
                            / 100 = 120.34 USD). See https://docs.ramp.com/developer-api/v1/monetary-values for more information.
                          type:
                          - 'null'
                          - integer
                      required:
                      - amount
                      - currency_code
                      - minor_unit_conversion_rate
                      type: object
                    description: Amount of the split line item, converted to the currency of the card on which the transaction
                      occurred.
                  memo:
                    description: Memo associated with the line item.
                    type: string
                required:
                - amount
                - converted_amount
                type: object
              type: array
            memo:
              maxLength: 255
              type:
              - 'null'
              - string
            merchant_category_code:
              description: Merchant category code is a four-digit number in ISP 18245 used to classify a business by the types
                of goods and services it provides.
              type: string
            merchant_category_code_description:
              description: Description about the merchant category code.
              type: string
            merchant_data:
              allOf:
              - properties:
                  auto_rental:
                    allOf:
                    - properties:
