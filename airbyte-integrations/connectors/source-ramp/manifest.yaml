        request_headers:
          Content-Type: application/json
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
    primary_key:
      - id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/draft-07/schema#
        required:
          - id
        properties:
          type:
            type:
              - string
              - "null"
            description: e.g. OUT_OF_POCKET
          id:
            type: string
            description: Ramp reimbursement UUID
          memo:
            type:
              - string
              - "null"
            description: Often marketing-relevant (e.g. "R&D Leads Offsite - Uber Ride")
          state:
            type:
              - string
              - "null"
