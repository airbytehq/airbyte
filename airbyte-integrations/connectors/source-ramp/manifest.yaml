version: 6.4.0
type: DeclarativeSource
check:
  type: CheckStream
  stream_names:
  - users
definitions:
  authenticator:
    type: CustomAuthenticator
    class_name: source_declarative_manifest.components.RampOauthAuthenticator
    grant_type: client_credentials
    client_id: '{{ config[''credentials''][''client_id''] }}'
    client_secret: '{{ config[''credentials''][''client_secret''] }}'
    token_refresh_endpoint: https://{{ 'demo-api' if config.get('use_sandbox') else 'api' }}.ramp.com/developer/v1/token
    scopes:
    - transactions:read
    - reimbursements:read
    - bills:read
    - transfers:read
    - cashbacks:read
    - statements:read
    - audit_logs:read
    - vendors:read
    - purchase_orders:read
    - unified_requests:read
    - trips:read
    - repayments:read
    - memos:read
    - receipts:read
    - limits:read
    - users:read
    - departments:read
    - locations:read
    - entities:read
    - cards:read
    - merchants:read
    - spend_programs:read
    - bank_accounts:read
    - item_receipts:read
    access_token_name: access_token
    expires_in_name: expires_in
  base_requester:
    type: HttpRequester
    url_base: https://{{ 'demo-api' if config.get('use_sandbox') else 'api' }}.ramp.com/developer/v1/
    http_method: GET
    authenticator:
      $ref: '#/definitions/authenticator'
  base_paginator:
    type: DefaultPaginator
    pagination_strategy:
      type: CursorPagination
      cursor_value: '{{ response.get(''page'', {}).get(''next'') }}'
      stop_condition: '{{ not response.get(''page'', {}).get(''next'') }}'
      page_size: 100
    page_token_option:
      type: RequestPath
    page_size_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: page_size
  base_record_selector:
    type: RecordSelector
    extractor:
      type: DpathExtractor
      field_path:
      - data
  streams:
    transactions:
      type: DeclarativeStream
      name: transactions
      primary_key:
      - id
      retriever:
        type: SimpleRetriever
        requester:
          $ref: '#/definitions/base_requester'
          path: transactions
        record_selector:
          $ref: '#/definitions/base_record_selector'
        paginator:
          $ref: '#/definitions/base_paginator'
      schema_loader:
        type: InlineSchemaLoader
        schema:
          properties:
            accounting_categories:
              deprecated: true
              description: '[Deprecated - use accounting_field_selections instead] Accounting categories related to the transaction.'
              items:
                properties:
                  category_id:
                    description: User-selected category id for transaction.
                    type: string
                  category_name:
                    description: User-selected category name for transaction.
                    type: string
                  tracking_category_remote_id:
                    type: string
                  tracking_category_remote_name:
                    type: string
                  tracking_category_remote_type:
                    type: string
                type: object
              type: array
            accounting_date:
              description: The date for the transaction for accounting purposes, in ISO8601 format. Based on the cleared date,
                transaction date, or a manually overridden date, depending on your accounting preferences in Ramp.
              format: date-time
              type:
              - 'null'
              - string
            accounting_field_selections:
              description: List of accounting fields selected to code the transaction.
              items:
                properties:
                  category_info:
                    allOf:
                    - properties:
                        external_id:
                          description: External ID of accounting field; It should uniquely identify an accounting field on
                            the ERP.
                          type: string
                        id:
                          description: ID that uniquely identifies an accounting field within Ramp
                          format: uuid
                          type: string
                          x-relationship:
                            inverse_field_name: null
                            reference_field_name: ramp_id
                            target_resource: accounting_fields
                            type: many-to-many
                        name:
                          description: Name of accounting field
                          type: string
                        type:
                          description: Accounting field type
                          enum:
                          - AMORTIZATION_TEMPLATE
                          - BILLABLE
                          - COST_CENTER
                          - CUSTOMERS_JOBS
                          - DEFERRAL_CODE
                          - EXPENSE_ENTITY
                          - GL_ACCOUNT
                          - INVENTORY_ITEM
                          - JOURNAL
                          - MERCHANT
                          - NON_ERP
                          - OTHER
                          - PROJECT
                          - REPORTING_TAG
                          - SUBSIDIARY
                          - TAX_CODE
                          - UNIT_OF_MEASURE
                          type: string
                      type: object
                    description: Information about the accounting category (or accounting field).
                  external_code:
                    description: External code of accounting field option; Code field displayed on the ERP.
                    type: string
                  external_id:
                    description: External ID of accounting field option; It should uniquely identify an accounting field option
                      on the ERP.
                    type: string
                  id:
                    description: ID that uniquely identifies an accounting field option within Ramp
                    format: uuid
                    type: string
                    x-relationship:
                      inverse_field_name: null
                      reference_field_name: ramp_id
                      target_resource: custom_field_options
                      type: many-to-many
                  name:
                    description: Name of accounting field option
                    type: string
                  provider_name:
                    description: Name of accounting field provider
                    type: string
                  source:
                    allOf:
                    - properties:
                        type:
                          description: Describes the type of source that added this selection.
                          type: string
                      type: object
                    description: Describes the source of the accounting coding selection.
                  type:
                    description: Accounting field type
                    enum:
                    - AMORTIZATION_TEMPLATE
                    - BILLABLE
                    - COST_CENTER
                    - CUSTOMERS_JOBS
                    - DEFERRAL_CODE
                    - EXPENSE_ENTITY
                    - GL_ACCOUNT
                    - INVENTORY_ITEM
                    - JOURNAL
                    - MERCHANT
                    - NON_ERP
                    - OTHER
                    - PROJECT
                    - REPORTING_TAG
                    - SUBSIDIARY
                    - TAX_CODE
                    - UNIT_OF_MEASURE
                    type: string
                required:
                - provider_name
                type: object
              type: array
            amount:
              description: Settled amount of the transaction.
              type: number
            attendees:
              description: List of attendees for the transaction
              items:
                properties:
                  name:
                    description: Full name of the attendee
                    type: string
                  user_id:
                    description: User ID of the attendee, if linked to a Ramp user. Missing if the attendee is not a Ramp
                      user
                    format: uuid
                    type:
                    - 'null'
                    - string
                    x-relationship:
                      inverse_field_name: null
                      reference_field_name: id
                      target_resource: users
                      type: many-to-one
                required:
                - name
                - user_id
                type: object
              type: array
            card_holder:
              allOf:
              - properties:
                  department_id:
                    description: ID of the card holder's department.
                    format: uuid
                    type: string
                    x-relationship:
                      inverse_field_name: null
                      reference_field_name: id
                      target_resource: departments
                      type: many-to-one
                  department_name:
                    description: Name of the card holder's deparment.
                    type: string
                  employee_id:
                    description: User-defined employee ID of the card holder.
                    type: string
                  first_name:
                    description: Card holder's first name.
                    type: string
                  last_name:
                    description: Card holder's last name.
                    type: string
                  location_id:
                    description: ID of the card holder's location.
                    format: uuid
                    type: string
                    x-relationship:
                      inverse_field_name: null
                      reference_field_name: id
                      target_resource: locations
                      type: many-to-one
                  location_name:
                    description: Name of the card holder's location.
                    type: string
                  user_id:
                    description: Card holder's ID.
                    format: uuid
                    type: string
                    x-relationship:
                      inverse_field_name: null
                      reference_field_name: id
                      target_resource: users
                      type: many-to-one
                type: object
              description: Information about the card holder.
            card_id:
              description: Identifier of the physical or virtual card associated with the transaction.
              format: uuid
              type: string
              x-relationship:
                inverse_field_name: null
                reference_field_name: id
                target_resource: cards
                type: many-to-one
            card_present:
              description: Whether the transaction was processed using a card present terminal.
              type: boolean
            currency_code:
              description: Currency that the transaction is settled in.
              type: string
            decline_details:
              allOf:
              - properties:
                  amount:
                    type: number
                  reason:
                    enum:
                    - AUTHORIZER
                    - AUTHORIZER_AP_CARD_VELOCITY_LIMIT
                    - AUTHORIZER_BUSINESS_LIMIT
                    - AUTHORIZER_BUSINESS_SUSPENDED
                    - AUTHORIZER_BUSINESS_VENDOR_BLACKLIST
                    - AUTHORIZER_CARD_AUTO_LOCK_DATE
                    - AUTHORIZER_CARD_CATEGORY_BLACKLIST
                    - AUTHORIZER_CARD_CATEGORY_WHITELIST
                    - AUTHORIZER_CARD_LIMIT
                    - AUTHORIZER_CARD_MCC_BLACKLIST
                    - AUTHORIZER_CARD_MISSING_POLICY_ITEMS
                    - AUTHORIZER_CARD_NOT_ACTIVATED
                    - AUTHORIZER_CARD_PARTIALLY_ACTIVATED
                    - AUTHORIZER_CARD_START_DATE
                    - AUTHORIZER_CARD_SUSPENDED
                    - AUTHORIZER_CARD_TASK_SANCTION
                    - AUTHORIZER_CARD_TOTAL_ACTIVATION_REQUIRED
                    - AUTHORIZER_CARD_VENDOR_BLACKLIST
                    - AUTHORIZER_CARD_VENDOR_WHITELIST
                    - AUTHORIZER_COMMANDO_MODE
                    - AUTHORIZER_FRAUD
                    - AUTHORIZER_FREEZE_TRANSACTIONS_RISK
                    - AUTHORIZER_GLOBAL_MCC_BLACKLIST
                    - AUTHORIZER_MEMBER_LIMIT
                    - AUTHORIZER_NON_AP_CARD_VELOCITY_LIMIT
                    - AUTHORIZER_OOB_BLOCKED_MERCHANT
                    - AUTHORIZER_OOB_DAILY_BUSINESS_BALANCE
                    - AUTHORIZER_OOB_DAILY_CARD_SPEND
                    - AUTHORIZER_RAMP_AUTHORIZATION_METHODS
                    - AUTHORIZER_RAMP_TRANSACTION_AMOUNT_LIMIT
                    - AUTHORIZER_RAMP_VENDOR_RESTRICTIONS
                    - AUTHORIZER_SPEND_ALLOCATION_ARCHIVED_FUNDS
                    - AUTHORIZER_SPEND_ALLOCATION_MEMBER_SUSPENDED
                    - AUTHORIZER_SPEND_ALLOCATION_SUSPENDED
                    - AUTHORIZER_TRANSACTION_AMOUNT_LIMIT
                    - AUTHORIZER_UNAUTHORIZED_USER
                    - AUTHORIZER_USER_LIMIT
                    - AUTHORIZER_USER_SUSPENDED
                    - BLOCKED_COUNTRY
                    - CARD_EXPIRED
                    - CARD_LOST_OR_STOLEN
                    - CARD_TERMINATED
                    - CHIP_FAILURE
                    - FORBIDDEN_CATEGORY
                    - INSECURE_AUTHORIZATION_METHOD
                    - INSUFFICIENT_FUNDS
                    - INVALID_PIN
                    - MISSING_CVV
                    - MISSING_EXPIRATION
                    - MOBILE_WALLET_FAILURE
                    - MOBILE_WALLET_TOKEN_NOT_FOUND
                    - MOBILE_WALLET_TOKEN_TERMINATED
                    - NETWORK_DECLINE_ACCOUNT_VERIFICATION
                    - NETWORK_DECLINE_ADVICE
                    - NETWORK_DECLINE_ADVICE_ACQUIRER_ISSUE
                    - NETWORK_DECLINE_ADVICE_ADDITIONAL_AUTHENTICATION_REQUIRED
                    - NETWORK_DECLINE_ADVICE_FORCED_STIP_BY_ISSUER
                    - NETWORK_DECLINE_ADVICE_ISSUER_LOGGED_OFF
                    - NETWORK_DECLINE_ADVICE_ISSUER_TIMEOUT
                    - NETWORK_DECLINE_ADVICE_ISSUER_UNAVAILABLE
                    - NETWORK_DECLINE_ADVICE_PIN_ERROR
                    - NETWORK_DECLINE_ADVICE_RECURRING_PAYMENT
                    - NETWORK_DECLINE_ADVICE_SELECTIVE_ACCEPTANCE_SERVICE
                    - NETWORK_DECLINE_ADVICE_SUSPECTED_FRAUD_TRANSACTION
                    - NETWORK_DECLINE_ADVICE_TOKEN_PROVISIONING_SERVICE
                    - NETWORK_DECLINE_ADVICE_VISA_PAYMENT_CONTROLS_RULE
                    - NOT_ACTIVE
                    - NOT_ALLOWED
                    - NO_AUTO_ROUTED_LIMITS_AVAILABLE
                    - NO_LINKED_SPEND_ALLOCATION
                    - OFAC_VERIFICATION_NEEDED
                    - OPEN_TO_BUY_LIMIT
                    - OTHER
                    - PIN_BLOCKED
                    - PIN_TRY_LIMIT_EXCEEDED
                    - PROCESSOR_CAP
                    - QUASI_CASH
                    - ROUTED_TO_TERMINATED_SPEND_ALLOCATION
                    - STRIPE_WEBHOOK_TIMEOUT
                    - SUSPECTED_BIN_ATTACK
                    - SUSPECTED_FRAUD
                    - THREE_D_SECURE_REQUIRED
                    - USER_BLOCKED
                    - USER_TERMINATED
                    - WRONG_ADDRESS
                    - WRONG_CVV
                    - WRONG_EXPIRATION
                    - WRONG_POSTAL_CODE
                    type: string
                    x-enum-descriptions:
                      AUTHORIZER: Transaction declined by Ramp
                      AUTHORIZER_AP_CARD_VELOCITY_LIMIT: Transaction limit exceeded
                      AUTHORIZER_BUSINESS_LIMIT: Business spending limit exceeded
                      AUTHORIZER_BUSINESS_SUSPENDED: Business account is suspended
                      AUTHORIZER_BUSINESS_VENDOR_BLACKLIST: Merchant blocked by company policy
                      AUTHORIZER_CARD_AUTO_LOCK_DATE: Card has been auto-locked
                      AUTHORIZER_CARD_CATEGORY_BLACKLIST: Merchant category blocked for this card
                      AUTHORIZER_CARD_CATEGORY_WHITELIST: Merchant category not allowed for this card
                      AUTHORIZER_CARD_LIMIT: Card spending limit exceeded
                      AUTHORIZER_CARD_MCC_BLACKLIST: Merchant category blocked for this card
                      AUTHORIZER_CARD_MISSING_POLICY_ITEMS: Card locked due to missing required items
                      AUTHORIZER_CARD_NOT_ACTIVATED: Card is not activated
                      AUTHORIZER_CARD_PARTIALLY_ACTIVATED: Card requires additional activation
                      AUTHORIZER_CARD_START_DATE: Card spend eligibility has not started
                      AUTHORIZER_CARD_SUSPENDED: Card is locked
                      AUTHORIZER_CARD_TASK_SANCTION: Card locked due to overdue tasks
                      AUTHORIZER_CARD_TOTAL_ACTIVATION_REQUIRED: Card requires delivery confirmation
                      AUTHORIZER_CARD_VENDOR_BLACKLIST: Merchant blocked for this card
                      AUTHORIZER_CARD_VENDOR_WHITELIST: Merchant not allowed for this card
                      AUTHORIZER_COMMANDO_MODE: Temporary processing error
                      AUTHORIZER_FRAUD: Transaction flagged for fraud review
                      AUTHORIZER_FREEZE_TRANSACTIONS_RISK: Account temporarily frozen
                      AUTHORIZER_GLOBAL_MCC_BLACKLIST: Merchant category not supported
                      AUTHORIZER_MEMBER_LIMIT: Member spending limit exceeded
                      AUTHORIZER_NON_AP_CARD_VELOCITY_LIMIT: Transaction limit exceeded
                      AUTHORIZER_OOB_BLOCKED_MERCHANT: Merchant blocked
                      AUTHORIZER_OOB_DAILY_BUSINESS_BALANCE: Daily business balance limit exceeded
                      AUTHORIZER_OOB_DAILY_CARD_SPEND: Daily card spending limit exceeded
                      AUTHORIZER_RAMP_AUTHORIZATION_METHODS: Authorization method not allowed
                      AUTHORIZER_RAMP_TRANSACTION_AMOUNT_LIMIT: Transaction amount didn't match limit
                      AUTHORIZER_RAMP_VENDOR_RESTRICTIONS: Merchant restricted by company policy
                      AUTHORIZER_SPEND_ALLOCATION_ARCHIVED_FUNDS: Funds are currently archived
                      AUTHORIZER_SPEND_ALLOCATION_MEMBER_SUSPENDED: Member access to spending limit is locked
                      AUTHORIZER_SPEND_ALLOCATION_SUSPENDED: Spending limit is suspended
                      AUTHORIZER_TRANSACTION_AMOUNT_LIMIT: Transaction amount didn't match limit
                      AUTHORIZER_UNAUTHORIZED_USER: User account is no longer active
                      AUTHORIZER_USER_LIMIT: User spending limit exceeded
                      AUTHORIZER_USER_SUSPENDED: User account is locked
                      BLOCKED_COUNTRY: Transaction country not supported
                      CARD_EXPIRED: Card has expired
                      CARD_LOST_OR_STOLEN: Card reported as lost or stolen
                      CARD_TERMINATED: Card has been terminated
                      CHIP_FAILURE: Card chip verification failed
                      FORBIDDEN_CATEGORY: Merchant category not allowed
                      INSECURE_AUTHORIZATION_METHOD: Insecure authorization method used
                      INSUFFICIENT_FUNDS: Insufficient funds available
                      INVALID_PIN: Invalid PIN entered
                      MISSING_CVV: CVV is required
                      MISSING_EXPIRATION: Expiration date is required
                      MOBILE_WALLET_FAILURE: Mobile wallet processing error
                      MOBILE_WALLET_TOKEN_NOT_FOUND: Mobile wallet token not found
                      MOBILE_WALLET_TOKEN_TERMINATED: Mobile wallet token has been terminated
                      NETWORK_DECLINE_ACCOUNT_VERIFICATION: Account verification required
                      NETWORK_DECLINE_ADVICE: Transaction declined by network
                      NETWORK_DECLINE_ADVICE_ACQUIRER_ISSUE: Network processing error
                      NETWORK_DECLINE_ADVICE_ADDITIONAL_AUTHENTICATION_REQUIRED: Additional authentication required
                      NETWORK_DECLINE_ADVICE_FORCED_STIP_BY_ISSUER: Transaction declined by network
                      NETWORK_DECLINE_ADVICE_ISSUER_LOGGED_OFF: Network temporarily unavailable
                      NETWORK_DECLINE_ADVICE_ISSUER_TIMEOUT: Network timeout occurred
                      NETWORK_DECLINE_ADVICE_ISSUER_UNAVAILABLE: Network temporarily unavailable
                      NETWORK_DECLINE_ADVICE_PIN_ERROR: PIN verification error
                      NETWORK_DECLINE_ADVICE_RECURRING_PAYMENT: Recurring payment declined
                      NETWORK_DECLINE_ADVICE_SELECTIVE_ACCEPTANCE_SERVICE: Transaction not accepted
                      NETWORK_DECLINE_ADVICE_SUSPECTED_FRAUD_TRANSACTION: Transaction flagged for suspected fraud
                      NETWORK_DECLINE_ADVICE_TOKEN_PROVISIONING_SERVICE: Token provisioning error
                      NETWORK_DECLINE_ADVICE_VISA_PAYMENT_CONTROLS_RULE: Transaction blocked by payment controls
                      NOT_ACTIVE: Card is not active
                      NOT_ALLOWED: Transaction not allowed
                      NO_AUTO_ROUTED_LIMITS_AVAILABLE: No eligible spending limit available
