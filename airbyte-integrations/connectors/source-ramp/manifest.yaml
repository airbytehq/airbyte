                      OFAC_VERIFICATION_NEEDED: Account verification required
                      OPEN_TO_BUY_LIMIT: Available business balance exceeded
                      OTHER: Transaction declined
                      PIN_BLOCKED: PIN has been blocked
                      PIN_TRY_LIMIT_EXCEEDED: PIN attempt limit exceeded
