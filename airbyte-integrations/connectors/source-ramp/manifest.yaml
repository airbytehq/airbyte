version: 7.17.1

type: DeclarativeSource

description: >-
  Ramp is a corporate card and finance automation platform designed to help
  businesses save time and money.

check:
  type: CheckStream
  stream_names:
    - cards

definitions:
  linked:
    Paginator:
      type: DefaultPaginator
      page_size_option:
        type: RequestOption
        field_name: page_size
        inject_into: request_parameter
      page_token_option:
        type: RequestOption
        field_name: start
        inject_into: request_parameter
      pagination_strategy:
        type: CursorPagination
        page_size: 50
        cursor_value: "{{ last_record['id'] }}"
        stop_condition: "{{ not response.get('page', {}).get('next') }}"
    HttpRequester:
      authenticator:
        type: SessionTokenAuthenticator
        login_requester:
          type: HttpRequester
          url: https://api.ramp.com/developer/v1/token
          http_method: POST
          authenticator:
            type: BasicHttpAuthenticator
            password: "{{ config['client_secret'] }}"
            username: "{{ config['client_id'] }}"
          error_handler:
            type: DefaultErrorHandler
            max_retries: 5
          request_headers:
            Content-Type: application/x-www-form-urlencoded
          request_body:
            type: RequestBodyUrlEncodedForm
            value:
              scope: transactions:read cards:read reimbursements:read
              grant_type: client_credentials
        session_token_path:
          - access_token
        expiration_duration: PT240H
        request_authentication:
          type: Bearer
      error_handler:
        type: DefaultErrorHandler
        max_retries: 5
        response_filters:
          - type: HttpResponseFilter
            action: RETRY
            http_codes:
              - 429
              - 500
              - 502
              - 503
              - 504
        backoff_strategies:
          - type: ExponentialBackoffStrategy
            factor: 2
      request_headers:
        Content-Type: application/json
      request_body:
        type: RequestBodyUrlEncodedForm
        value:
          scope: transactions:read cards:read reimbursements:read
          grant_type: client_credentials
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: page_size
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: start
          inject_into: request_parameter
        pagination_strategy:
          type: CursorPagination
          page_size: 50
          cursor_value: "{{ last_record['id'] }}"
          stop_condition: "{{ not response.get('page', {}).get('next') }}"

streams:
  - type: DeclarativeStream
    name: cards
    retriever:
      type: SimpleRetriever
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: page_size
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: start
          inject_into: request_parameter
        pagination_strategy:
          type: CursorPagination
          page_size: 50
          cursor_value: "{{ last_record['id'] }}"
          stop_condition: "{{ not response.get('page', {}).get('next') }}"
      requester:
        type: HttpRequester
        url: https://api.ramp.com/developer/v1/cards
        http_method: GET
        authenticator:
          type: SessionTokenAuthenticator
          login_requester:
            type: HttpRequester
            url: https://api.ramp.com/developer/v1/token
            http_method: POST
            authenticator:
              type: BasicHttpAuthenticator
              password: "{{ config['client_secret'] }}"
              username: "{{ config['client_id'] }}"
            error_handler:
              type: DefaultErrorHandler
              max_retries: 5
            request_headers:
              Content-Type: application/x-www-form-urlencoded
            request_body:
              type: RequestBodyUrlEncodedForm
              value:
                scope: transactions:read cards:read reimbursements:read
                grant_type: client_credentials
          session_token_path:
            - access_token
          expiration_duration: PT240H
          request_authentication:
            type: Bearer
        error_handler:
          type: DefaultErrorHandler
          max_retries: 5
          response_filters:
            - type: HttpResponseFilter
              action: RETRY
              http_codes:
                - 429
                - 500
                - 502
                - 503
                - 504
              error_message_contains: ""
          backoff_strategies:
            - type: ExponentialBackoffStrategy
              factor: 2
        request_headers:
          Content-Type: application/json
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
    primary_key:
      - id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/draft-07/schema#
        required:
          - id
        properties:
          id:
            type: string
            description: Ramp card UUID
          state:
            type:
              - string
              - "null"
            description: e.g. ACTIVE
          entity_id:
            type:
              - string
              - "null"
          last_four:
            type:
              - string
              - "null"
            description: Last 4 of PAN. Not PCI-sensitive but flag in privacy review.
          created_at:
            type:
              - string
              - "null"
          expiration:
            type:
              - string
              - "null"
            description: MMYY format (e.g. "0430")
          fulfillment:
            type:
              - object
              - "null"
            description: Nested object - fulfillment_status, shipping_date, etc.
          is_physical:
            type:
              - boolean
              - "null"
          display_name:
            type:
              - string
              - "null"
            description: >-
              For virtual cards tied to Zip, contains "P-Card: ZIP
              #<request_number> - <vendor>" (verified example: "P-Card: ZIP
              #10216 - Verizon Wireless"). Parseable for Ramp ↔ Zip join.
          cardholder_id:
            type:
              - string
              - "null"
          card_program_id:
            type:
              - string
              - "null"
          cardholder_name:
            type:
              - string
              - "null"
          spending_restrictions:
            type:
              - object
              - "null"
            description: Nested object - interval, auto_lock_date, etc.
          has_program_overridden:
            type:
              - boolean
              - "null"
        additionalProperties: true
    transformations:
      - type: KeysToSnakeCase
  - type: DeclarativeStream
    name: transactions
    retriever:
      type: SimpleRetriever
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: page_size
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: start
          inject_into: request_parameter
        pagination_strategy:
          type: CursorPagination
          page_size: 50
          cursor_value: "{{ last_record['id'] }}"
