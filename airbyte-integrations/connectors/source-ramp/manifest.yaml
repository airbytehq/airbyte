spec:
  type: Spec
  documentation_url: https://docs.ramp.com/developer-api
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - client_id
      - client_secret
    properties:
      client_id:
        type: string
        description: From AWS Secrets Manager ramp_credentials.CLIENT_ID
        order: 0
        title: Ramp Client ID
        airbyte_secret: true
      client_secret:
        type: string
        description: From AWS Secrets Manager ramp_credentials.CLIENT_SECRET
        order: 1
        title: Ramp Client Secret
        airbyte_secret: true
    additionalProperties: true

