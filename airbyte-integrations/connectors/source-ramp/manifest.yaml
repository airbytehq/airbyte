    transfers:
      type: DeclarativeStream
      name: transfers
      primary_key:
      - id
      retriever:
        type: SimpleRetriever
        requester:
          $ref: '#/definitions/base_requester'
          path: transfers
        record_selector:
          $ref: '#/definitions/base_record_selector'
        paginator:
          $ref: '#/definitions/base_paginator'
      schema_loader:
        type: InlineSchemaLoader
        schema:
          properties:
            amount:
              allOf:
              - properties:
                  amount:
                    description: the amount of money represented in the smallest denomination of the currency. For example,
                      when the currency is USD, then the amount is expressed in cents.
                    type: integer
                  currency_code:
                    default: USD
                    description: The type of currency, in ISO 4217 format. e.g. USD for US dollars
                    type: string
                  minor_unit_conversion_rate:
                    description: The conversion factor to convert from the integer amount to the actual currency value. Divide
                      amount by this value to get the real currency amount. For USD, this is 100 (e.g., 12034 / 100 = 120.34
                      USD). See https://docs.ramp.com/developer-api/v1/monetary-values for more information.
                    type:
                    - 'null'
                    - integer
                required:
                - amount
                - currency_code
                - minor_unit_conversion_rate
                type: object
              description: Amount of the transfer.
            bank_account_id:
              description: Unique identifier of the bank account used for this transfer payment.
              format: uuid
              type:
              - 'null'
              - string
            created_at:
              description: Timestamp when the transfer was created.
              format: date-time
              type: string
            entity_id:
              description: Business entity associated with this transfer.
              format: uuid
              type: string
              x-relationship:
                inverse_field_name: null
                reference_field_name: id
                target_resource: entities
                type: many-to-one
            id:
              description: Unique identifier for the transfer.
              format: uuid
              type: string
            payment_id:
              description: Unique payment identifier for the transfer.
              type: string
            status:
              description: Status of the transfer. See [Transfers Guide](/developer-api/v1/guides/transfers) for definitions.
              enum:
              - ACH_CONFIRMED
              - CANCELED
              - COMPLETED
              - ERROR
              - INITIATED
              - NOT_ACKED
              - NOT_ENOUGH_FUNDS
              - PROCESSING_BY_ODFI
              - REJECTED_BY_ODFI
              - RETURNED_BY_RDFI
              - SUBMITTED_TO_FED
              - SUBMITTED_TO_RDFI
              - UNNECESSARY
              - UPLOADED
              type: string
              x-enum-descriptions:
                CANCELED: The transfer has been canceled and will not be processed. This state is terminal and indicates the
                  transfer was intentionally stopped, either by the customer or due to an operational decision.
                COMPLETED: The transfer has successfully settled and reached its final state. Funds have moved as intended,
                  and no further actions are required. Any subsequent issues would require a new transfer or reversal process.
                ERROR: The transfer encountered a terminal error and could not be completed. This can happen due to issues
                  like invalid account information or system errors. The transfer will need to be retried with corrected details.
                INITIATED: A record of the transfer has been created in Ramp's system. The process of moving funds has started,
                  but no external actions have been taken yet.
                NOT_ACKED: Ramp did not receive an acknowledgment from the bank after submitting the transfer. The transfer
                  may need to be retried or investigated for connectivity issues with the bank.
                NOT_ENOUGH_FUNDS: The transfer could not proceed due to insufficient funds in the originating account. Additional
                  funds need to be added to the account before re-attempting the transfer.
                PROCESSING_BY_ODFI: The transfer file has been submitted to the Originating Bank (ODFI), and the cutoff time
                  for same-day processing has passed. The ODFI has accepted the file and will proceed with sending it to the
                  Fed.
                REJECTED_BY_ODFI: The transfer was rejected by the ODFI before it was sent to the Federal Reserve. The rejection
                  usually occurs due to formatting errors or invalid account information in the transfer file.
                RETURNED_BY_RDFI: The transfer failed at the Receiving Bank (RDFI) due to an issue provided by the receiving
                  bank. Common reasons include closed accounts or incorrect account numbers. This requires corrective action
                  to resolve.
                SUBMITTED_TO_FED: The transfer file has been sent to the Federal Reserve and is awaiting routing to the RDFI.
                  The transfer is now in the Fed's hands and will soon be sent to the receiving bank.
                SUBMITTED_TO_RDFI: The transfer has been delivered to the Receiving Bank (RDFI), and we are awaiting the final
                  transfer of funds. This is the final step before the funds are made available to the receiving party.
                UNNECESSARY: The transfer is for $0 and does not require processing through the ACH system. This is a terminal
                  state, indicating no further actions are required.
            sync_status:
              description: Current sync status of the transfer.
              enum:
              - NOT_SYNC_READY
              - SYNCED
              - SYNC_READY
              type: string
          required:
          - bank_account_id
          - sync_status
          type: object
          x-resource-name: transfers
          additionalProperties: true
          $schema: http://json-schema.org/draft-07/schema#
      incremental_sync:
        type: DatetimeBasedCursor
        cursor_field: created_at
        datetime_format: '%Y-%m-%dT%H:%M:%S%z'
        cursor_datetime_formats:
        - '%Y-%m-%dT%H:%M:%S%z'
        - '%Y-%m-%dT%H:%M:%S.%f%z'
        - '%Y-%m-%dT%H:%M:%SZ'
        - '%Y-%m-%dT%H:%M:%S.%fZ'
        lookback_window: P{{ config.get('lookback_window_days', 30) }}D
        start_datetime:
          type: MinMaxDatetime
          datetime: '{{ config[''start_date''] }}'
          datetime_format: '%Y-%m-%dT%H:%M:%SZ'
        end_datetime:
          type: MinMaxDatetime
          datetime: '{{ now_utc().strftime(''%Y-%m-%dT%H:%M:%SZ'') }}'
          datetime_format: '%Y-%m-%dT%H:%M:%SZ'
        start_time_option:
          type: RequestOption
          field_name: from_date
          inject_into: request_parameter
        end_time_option:
          type: RequestOption
          field_name: to_date
          inject_into: request_parameter
