                            address2:
                              type:
                              - 'null'
                              - string
                            city:
                              type: string
                            country:
                              type: string
                            first_name:
                              maxLength: 50
                              type: string
                            last_name:
                              maxLength: 50
                              type: string
                            phone:
                              type:
                              - 'null'
                              - string
                            postal_code:
                              type: string
                            state:
                              type:
                              - 'null'
                              - string
                          required:
                          - address1
                          - city
                          - country
                          - first_name
                          - last_name
