[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
version = "0.1.0"
name = "destination_hugging_face_datasets"
description = "Destination implementation for Hugging Face Datasets"
authors = ["Airbyte <contact@airbyte.io>"]
license = "ELv2"
readme = "README.md"
documentation = "https://docs.airbyte.com/integrations/destinations/hugging-face-datasets"
homepage = "https://airbyte.com"
repository = "https://github.com/airbytehq/airbyte"
[[tool.poetry.packages]]
include = "destination_hugging_face_datasets"

[tool.poetry.dependencies]
python = "^3.10,<3.14"
airbyte-cdk = "^7"
datasets = ">=4.0.0"
pandas = ">=2.0.0"
pyyaml = ">=6.0.0"

[tool.poetry.scripts]
destination-hugging-face-datasets = "destination_hugging_face_datasets.run:run"

[tool.poe]
include = [
    "${POE_GIT_DIR}/poe-tasks/poetry-connector-tasks.toml",
]