version: 7.17.1

type: DeclarativeSource

description: >-
  Dust AI is an enterprise AI platform and "operating system" that allows teams
  to build custom, context-aware AI assistants without writing any code.

check:
  type: CheckStream
  stream_names:
    - usage_metrics

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: BearerAuthenticator
        api_token: "{{ config['bearer_token'] }}"
      error_handler:
        type: CompositeErrorHandler
        error_handlers:
          - type: DefaultErrorHandler
            max_retries: 3
            response_filters:
              - type: HttpResponseFilter
                action: RETRY
                http_codes:
                  - 401
            backoff_strategies:
              - type: ConstantBackoffStrategy
                backoff_time_in_seconds: 30
          - type: DefaultErrorHandler
            max_retries: 5
            response_filters:
              - type: HttpResponseFilter
                action: RETRY
                http_codes:
                  - 429
                  - 500
                  - 502
                  - 503
                  - 504
            backoff_strategies:
              - type: ExponentialBackoffStrategy
                factor: 5
      request_headers:
        accept: application/json

streams:
  - type: DeclarativeStream
    name: usage_metrics
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url: https://dust.tt/api/v1/w/{{ config['workspace_id']}}/analytics/export
        http_method: GET
        authenticator:
          type: BearerAuthenticator
          api_token: "{{ config['bearer_token'] }}"
        error_handler:
          type: CompositeErrorHandler
          error_handlers:
            - type: DefaultErrorHandler
              max_retries: 3
              response_filters:
                - type: HttpResponseFilter
                  action: RETRY
                  http_codes:
                    - 401
                  error_message_contains: ""
              backoff_strategies:
                - type: ConstantBackoffStrategy
                  backoff_time_in_seconds: 30
            - type: DefaultErrorHandler
              max_retries: 5
              response_filters:
                - type: HttpResponseFilter
                  action: RETRY
                  http_codes:
                    - 429
                    - 500
                    - 502
                    - 503
                    - 504
                  error_message_contains: ""
              backoff_strategies:
                - type: ExponentialBackoffStrategy
                  factor: 5
        request_headers:
          accept: application/json
        request_parameters:
          table: usage_metrics
          format: json
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: []
    primary_key: date
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        required:
          - date
        properties:
          date:
            type: string
          messages:
            type:
              - number
              - "null"
          activeUsers:
            type:
              - number
              - "null"
          conversations:
            type:
              - number
              - "null"
        additionalProperties: true
    incremental_sync:
      type: DatetimeBasedCursor
      step: P1D
      cursor_field: date
      end_datetime:
        type: MinMaxDatetime
        datetime: >-
          {{ config['end_date'] or  (today_utc() -
          duration('P1D')).strftime('%Y-%m-%d')  }}
        datetime_format: "%Y-%m-%d"
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ config['start_date'] }}"
        datetime_format: "%Y-%m-%d"
      datetime_format: "%Y-%m-%d"
      end_time_option:
        type: RequestOption
        field_name: endDate
        inject_into: request_parameter
      start_time_option:
        type: RequestOption
        field_name: startDate
        inject_into: request_parameter
      cursor_granularity: P1D
      cursor_datetime_formats:
