spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - bearer_token
    properties:
      end_date:
        type: string
        description: The end date for the extracted data in YYY-MM-DD format
        order: 1
        title: End Date
      start_date:
        type: string
        description: The start date for data extraction in YYY-MM-DD fromat
        order: 0
        title: Start Date
      bearer_token:
        type: string
        description: token needed for authentication to dust
        order: 3
        title: Bearer Token
        airbyte_secret: true
      workspace_id:
        type: string
        description: Unique string identifier for the workspace
        order: 2
        title: workspace ID
    additionalProperties: true

