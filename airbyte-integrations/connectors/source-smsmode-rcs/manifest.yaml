version: 7.17.1

type: DeclarativeSource

description: >-
  A source connector for the smsmode API dedicated to RCS (Rich Communication
  Services), supporting message performance logs and monthly channel-specific
  consumption data tracking.

check:
  type: CheckStream
  stream_names:
    - rcs_messages
    - consumptions_rcs

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: ApiKeyAuthenticator
        api_token: "{{ config[\"api_key\"] }}"
        inject_into:
          type: RequestOption
          field_name: X-Api-Key
          inject_into: header
      request_headers:
        Accept: application/json

streams:
  - type: DeclarativeStream
    name: rcs_messages
    retriever:
      type: SimpleRetriever
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: pageSize
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: page
          inject_into: request_parameter
        pagination_strategy:
          type: PageIncrement
          page_size: 10
          start_from_page: 1
      requester:
        type: HttpRequester
        url: https://rest.smsmode.com/rcs/v1/messages
        http_method: GET
        authenticator:
          type: ApiKeyAuthenticator
          api_token: "{{ config[\"api_key\"] }}"
          inject_into:
            type: RequestOption
            field_name: X-Api-Key
            inject_into: header
        error_handler:
          type: DefaultErrorHandler
          max_retries: 10
          backoff_strategies:
            - type: ExponentialBackoffStrategy
              factor: 2
        request_headers:
          Accept: application/json
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - items
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
