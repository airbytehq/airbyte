  documentation_url: https://dev.smsmode.com/rcs/v1/
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - api_key
      - start_date
    properties:
      api_key:
        type: string
        order: 0
        title: API Key
        airbyte_secret: true
      start_date:
        type: string
        description: "Date de début de récupération de l'historique (Format: YYYY-MM-DD)"
        order: 1
        title: Start Date
        examples:
          - "2025-01-01"
    additionalProperties: true

